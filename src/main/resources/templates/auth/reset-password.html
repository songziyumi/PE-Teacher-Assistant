<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .reset-wrap { max-width: 520px; margin: 56px auto; padding: 0 16px; }
        .reset-card { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); overflow: hidden; }
        .reset-head { padding: 22px 24px; background: linear-gradient(135deg, #2563eb, #60a5fa); color: #fff; }
        .reset-head h2 { margin: 0; }
        .reset-head p { margin: 8px 0 0; opacity: .9; line-height: 1.6; }
        .reset-body { padding: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; }
        .form-group input { width: 100%; box-sizing: border-box; padding: 11px 12px; border: 1px solid #d1d5db; border-radius: 8px; }
        .form-help { color: #6b7280; font-size: 13px; line-height: 1.7; margin: 6px 0 18px; }
        .form-actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .link-muted { color: #4b5563; text-decoration: none; }
    </style>
</head>
<body>
<div class="reset-wrap">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="reset-card">
        <div class="reset-head">
            <h2>设置新密码</h2>
            <p>新密码不少于 8 位，并且需要同时包含字母和数字。</p>
        </div>
        <div class="reset-body">
            <form th:if="${valid == true}" th:action="@{/reset-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="token" th:value="${token}">

                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input id="newPassword" type="password" name="newPassword" required minlength="8" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input id="confirmPassword" type="password" name="confirmPassword" required minlength="8" autocomplete="new-password">
                </div>

                <div class="form-actions">
                    <a class="link-muted" th:href="@{/login}">返回登录</a>
                    <button type="submit" class="btn btn-primary">确认重置</button>
                </div>
            </form>

            <div th:if="${valid != true}">
                <p class="form-help">当前重置链接不可用，可能已经过期或已被使用。</p>
                <div class="form-actions">
                    <a class="link-muted" th:href="@{/login}">返回登录</a>
                    <a class="btn btn-primary" th:href="@{/forgot-password}">重新申请</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
