<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .reset-wrap { max-width: 520px; margin: 56px auto; padding: 0 16px; }
        .reset-card { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); overflow: hidden; }
        .reset-head { padding: 22px 24px; background: linear-gradient(135deg, #2563eb, #60a5fa); color: #fff; }
        .reset-head h2 { margin: 0; }
        .reset-head p { margin: 8px 0 0; opacity: .9; line-height: 1.6; }
        .reset-body { padding: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; }
        .form-group input { width: 100%; box-sizing: border-box; padding: 11px 12px; border: 1px solid #d1d5db; border-radius: 8px; }
        .form-help { color: #6b7280; font-size: 13px; line-height: 1.7; margin: 6px 0 18px; }
        .form-actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .link-muted { color: #4b5563; text-decoration: none; }
    </style>
</head>
<body>
<div class="reset-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="reset-card">
        <div class="reset-head">
            <h2>找回密码</h2>
            <p>请输入账号和已验证邮箱。若信息匹配，系统会生成一封密码重置邮件。</p>
        </div>
        <div class="reset-body">
            <form th:if="${submitted != true}" th:action="@{/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="account">账号</label>
                    <input id="account" type="text" name="account" th:value="${account}" placeholder="系统账号 / 便捷账号 / 教师账号" required autofocus>
                </div>

                <div class="form-group">
                    <label for="email">已验证邮箱</label>
                    <input id="email" type="email" name="email" th:value="${email}" placeholder="name@example.com" required>
                </div>

                <div class="form-help">
                    为保护账号安全，页面不会提示账号是否存在或邮箱是否匹配。
                </div>

                <div class="form-actions">
                    <a class="link-muted" th:href="@{/login}">返回登录</a>
                    <button type="submit" class="btn btn-primary">发送重置邮件</button>
                </div>
            </form>

            <div th:if="${submitted == true}">
                <p class="form-help">请检查邮箱中的重置链接。若没有收到，请稍后再试或联系管理员确认邮箱是否已验证。</p>
                <div class="form-actions">
                    <a class="link-muted" th:href="@{/login}">返回登录</a>
                    <a class="btn btn-outline" th:href="@{/forgot-password}">重新申请</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
