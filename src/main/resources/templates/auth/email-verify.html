<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱验证 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .verify-wrap { max-width: 520px; margin: 64px auto; padding: 0 16px; }
        .verify-card { background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); padding: 28px; text-align: center; }
        .verify-icon { width: 56px; height: 56px; line-height: 56px; border-radius: 50%; margin: 0 auto 16px; color: #fff; font-size: 28px; }
        .verify-icon.ok { background: #16a34a; }
        .verify-icon.fail { background: #dc2626; }
        .verify-card h2 { margin: 0 0 10px; }
        .verify-card p { color: #4b5563; line-height: 1.7; margin-bottom: 22px; }
        .verify-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    </style>
</head>
<body>
<div class="verify-wrap">
    <div class="verify-card">
        <div th:class="${verified} ? 'verify-icon ok' : 'verify-icon fail'" th:text="${verified} ? '✓' : '!'"></div>
        <h2 th:text="${verified} ? '邮箱验证成功' : '邮箱验证失败'"></h2>
        <p th:if="${success}" th:text="${success}"></p>
        <p th:if="${error}" th:text="${error}"></p>
        <div class="verify-actions">
            <a class="btn btn-primary" th:href="@{/login}">返回登录</a>
            <a th:if="${verified != true}" class="btn btn-outline" th:href="@{/forgot-password}">找回密码</a>
        </div>
    </div>
</div>
</body>
</html>
