<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-header">
        <div class="login-icon">体</div>
        <h1>体育教师助手</h1>
        <p>学生可使用系统账号或便捷账号登录</p>
    </div>

    <div th:if="${loginError}" class="alert alert-error">账号或密码错误，请重新输入</div>
    <div th:if="${locked}" class="alert alert-error">账号已锁定，请 15 分钟后再试</div>
    <div th:if="${logoutSuccess}" class="alert alert-success">已安全退出登录</div>
    <div th:if="${resetSuccess}" class="alert alert-success">密码已重置，请使用新密码登录</div>

    <form th:action="@{/login}" method="post" class="login-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label for="username">账号</label>
            <input id="username" type="text" name="username" placeholder="请输入系统账号或便捷账号" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">密码</label>
            <input id="password" type="password" name="password" placeholder="请输入密码" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">登录</button>
        <div style="text-align:right;margin-top:10px;">
            <a th:href="@{/forgot-password}" style="font-size:13px;color:#2563eb;text-decoration:none;">忘记密码？</a>
        </div>
    </form>

    <div class="login-hint">
        <small>系统账号和初始密码请向学校或老师领取；首次登录后可绑定更好记的便捷账号。</small>
    </div>
</div>

<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>&copy; 2026 体育教师助手</span>
</footer>
</body>
</html>
