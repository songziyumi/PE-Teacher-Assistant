<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${teacher.name} + ' - 教师主页'">教师主页</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .student-nav { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:56px; }
        .student-nav .brand { font-weight:700; color:#4a90e2; font-size:1.05rem; }
        .student-nav .nav-right { display:flex; align-items:center; gap:16px; font-size:.9rem; }
        .page-wrap { max-width:960px; margin:24px auto; padding:0 16px; }
        .profile-card { max-width:720px; margin:0 auto; }
        .profile-card { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(15,23,42,.08); overflow:hidden; border:1px solid #e8eef5; }
        .profile-header { background:linear-gradient(135deg,#2563eb,#60a5fa); padding:28px; display:flex; align-items:center; gap:20px; }
        .avatar { width:88px; height:88px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,.65); }
        .avatar-ph { width:88px; height:88px; border-radius:50%; background:rgba(255,255,255,.22); display:flex; align-items:center; justify-content:center; font-size:1.6rem; color:#fff; flex-shrink:0; }
        .hdr-info h2 { color:#fff; margin:0 0 6px; font-size:1.28rem; }
        .hdr-info p { color:rgba(255,255,255,.88); margin:0; font-size:.88rem; }
        .profile-body { padding:24px; }
        .info-row { display:flex; align-items:baseline; gap:10px; padding:12px 0; border-bottom:1px solid #eef2f7; font-size:.92rem; }
        .info-row:last-child { border-bottom:none; }
        .info-label { font-weight:600; color:#64748b; min-width:84px; }
        .info-val { color:#1f2937; flex:1; white-space:pre-wrap; word-break:break-word; }
        .bio-title { font-weight:600; color:#64748b; font-size:.84rem; margin:16px 0 8px; }
        .bio-block { background:#f8fafc; border-radius:10px; padding:14px 16px; font-size:.88rem; color:#475569; line-height:1.7; white-space:pre-wrap; border:1px solid #e8eef5; }
        .msg-btn-wrap { margin-top:20px; display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; }
        @media (max-width: 768px) {
            .student-nav { height:56px; padding:0 12px; align-items:center; gap:10px; flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; }
            .student-nav .brand { flex:0 0 auto; white-space:nowrap; font-size:.95rem; }
            .student-nav .nav-right { width:auto; flex:0 0 auto; flex-wrap:nowrap; gap:12px; white-space:nowrap; }
            .student-nav .nav-right > *, .student-nav .nav-right form { width:auto; flex:0 0 auto; white-space:nowrap; }
            .page-wrap { margin:16px auto; padding:0 12px; }
            .profile-header { padding:20px 16px; flex-direction:column; align-items:flex-start; gap:16px; }
            .profile-body { padding:18px 16px; }
            .info-row { flex-direction:column; gap:4px; align-items:flex-start; }
            .info-label { min-width:0; }
            .msg-btn-wrap { flex-direction:column; }
            .msg-btn-wrap .btn { width:100%; margin-left:0 !important; }
        }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育学生端</div>
    <div class="nav-right">
        <a th:href="@{/student}" style="color:#4a90e2;">首页</a>
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <span th:text="${student?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <div class="profile-card">
        <div class="profile-header">
            <div th:if="${teacher.photoUrl != null and !#strings.isEmpty(#strings.trim(teacher.photoUrl))}">
                <img th:src="@{${teacher.photoUrl}}" alt="头像" class="avatar">
            </div>
            <div th:if="${teacher.photoUrl == null or #strings.isEmpty(#strings.trim(teacher.photoUrl))}" class="avatar-ph">师</div>
            <div class="hdr-info">
                <h2 th:text="${teacher.name}"></h2>
                <p th:text="${teacher.specialty != null ? teacher.specialty : '体育教师'}"></p>
            </div>
        </div>

        <div class="profile-body">
            <div class="info-row" th:if="${teacher.gender != null and !teacher.gender.isBlank()}">
                <span class="info-label">性别</span>
                <span class="info-val" th:text="${teacher.gender}"></span>
            </div>
            <div class="info-row" th:if="${teacher.birthDate != null}">
                <span class="info-label">年龄</span>
                <span class="info-val" th:text="${#dates.year(#dates.createNow()) - #temporals.year(teacher.birthDate)} + ' 岁'"></span>
            </div>
            <div class="info-row" th:if="${teacher.specialty != null and !teacher.specialty.isBlank()}">
                <span class="info-label">专业特长</span>
                <span class="info-val" th:text="${teacher.specialty}"></span>
            </div>
            <div class="info-row" th:if="${teacher.email != null and !teacher.email.isBlank()}">
                <span class="info-label">电子邮箱</span>
                <span class="info-val" th:text="${teacher.email}"></span>
            </div>

            <div th:if="${teacher.bio != null and !teacher.bio.isBlank()}">
                <div class="bio-title">个人简介</div>
                <div class="bio-block" th:text="${teacher.bio}"></div>
            </div>

            <div class="msg-btn-wrap">
                <a th:href="@{/student/messages}" class="btn btn-primary">发送站内消息</a>
                <a th:href="@{/student/courses}" class="btn btn-secondary">返回选课</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
