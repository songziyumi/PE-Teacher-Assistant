<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${teacher.name} + ' - 教师主页'">教师主页</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .student-nav { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; }
        .student-nav .brand { font-weight:700; color:#4a90e2; font-size:1.05rem; }
        .student-nav .nav-right { display:flex; align-items:center; gap:16px; font-size:.9rem; }
        .page-wrap { max-width:640px; margin:28px auto; padding:0 16px; }
        .profile-card { background:#fff; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.09); overflow:hidden; }
        .profile-header { background:linear-gradient(135deg,#4a90e2,#7bb8f5); padding:32px; display:flex; align-items:center; gap:24px; }
        .avatar { width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,.6); }
        .avatar-ph { width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; font-size:2.2rem; flex-shrink:0; }
        .hdr-info h2 { color:#fff; margin:0 0 4px; font-size:1.3rem; }
        .hdr-info p { color:rgba(255,255,255,.85); margin:0; font-size:.88rem; }
        .profile-body { padding:28px 32px; }
        .info-row { display:flex; align-items:baseline; gap:10px; padding:10px 0; border-bottom:1px solid #f0f0f0; font-size:.92rem; }
        .info-row:last-child { border-bottom:none; }
        .info-label { font-weight:600; color:#888; min-width:80px; }
        .info-val { color:#333; flex:1; white-space:pre-wrap; word-break:break-word; }
        .bio-block { background:#f8f9fb; border-radius:8px; padding:14px 16px; font-size:.88rem; color:#555; line-height:1.7; white-space:pre-wrap; }
        .msg-btn-wrap { margin-top:24px; text-align:right; }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">🏃 体育选课</div>
    <div class="nav-right">
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <a th:href="@{/student/messages}" style="color:#4a90e2;">消息</a>
        <span th:text="${student?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <div class="profile-card">
        <div class="profile-header">
            <div th:if="${teacher.photoUrl != null}">
                <img th:src="${teacher.photoUrl}" alt="头像" class="avatar">
            </div>
            <div th:if="${teacher.photoUrl == null}" class="avatar-ph">👤</div>
            <div class="hdr-info">
                <h2 th:text="${teacher.name}"></h2>
                <p th:text="${teacher.specialty != null ? teacher.specialty : '体育教师'}"></p>
            </div>
        </div>

        <div class="profile-body">
            <div class="info-row" th:if="${teacher.gender != null and !teacher.gender.isBlank()}">
                <span class="info-label">性别</span>
                <span class="info-val" th:text="${teacher.gender}"></span>
            </div>
            <div class="info-row" th:if="${teacher.birthDate != null}">
                <span class="info-label">年龄</span>
                <span class="info-val" th:text="${#dates.year(#dates.createNow()) - #temporals.year(teacher.birthDate)} + ' 岁'"></span>
            </div>
            <div class="info-row" th:if="${teacher.specialty != null and !teacher.specialty.isBlank()}">
                <span class="info-label">专业特长</span>
                <span class="info-val" th:text="${teacher.specialty}"></span>
            </div>
            <div class="info-row" th:if="${teacher.email != null and !teacher.email.isBlank()}">
                <span class="info-label">电子邮箱</span>
                <span class="info-val" th:text="${teacher.email}"></span>
            </div>
            <div th:if="${teacher.bio != null and !teacher.bio.isBlank()}" style="margin-top:16px;">
                <div style="font-weight:600;color:#888;font-size:.83rem;margin-bottom:8px;">个人简介</div>
                <div class="bio-block" th:text="${teacher.bio}"></div>
            </div>

            <div class="msg-btn-wrap">
                <a th:href="@{/student/messages}" class="btn btn-primary">发送站内消息</a>
                <a th:href="@{/student/courses}" class="btn btn-secondary" style="margin-left:8px;">返回选课</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
