<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的选课 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .student-nav { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .student-nav .brand { font-weight: 700; color: #4a90e2; font-size: 1.05rem; }
        .student-nav .nav-right { display: flex; align-items: center; gap: 16px; font-size: .9rem; }
        .page-wrap { max-width: 760px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); padding: 24px; margin-bottom: 16px; }
        .sel-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; }
        .sel-row:last-child { border-bottom: none; }
        .sel-course { font-weight: 600; font-size: .95rem; }
        .sel-meta { font-size: .82rem; color: #777; }
        .status { font-size: .82rem; color: #555; }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育选课</div>
    <div class="nav-right">
        <a th:href="@{/student/courses}" style="color:#4a90e2;">返回选课</a>
        <span th:text="${student != null ? student.name : ''}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <h2 style="font-size:1.15rem;margin-bottom:16px;">我的选课记录</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div th:if="${event == null or mySelections == null or #lists.isEmpty(mySelections)}" class="card" style="text-align:center;color:#999;">
        <p>暂无选课记录</p>
        <a th:href="@{/student/courses}" class="btn btn-primary btn-sm">去选课</a>
    </div>

    <div th:if="${mySelections != null and !#lists.isEmpty(mySelections)}" class="card">
        <div th:each="sel : ${mySelections}" class="sel-row">
            <div style="flex:1;">
                <div class="sel-course" th:text="${sel.course.name}"></div>
                <div class="sel-meta">
                    <span th:if="${sel.round == 1}" th:text="${'第一轮 · ' + sel.preference + '志愿'}"></span>
                    <span th:if="${sel.round == 2}">第二轮</span>
                    <span th:if="${sel.round != 1 and sel.round != 2}">手动加入</span>
                    <span th:if="${sel.selectedAt != null}" th:text="${' · ' + #temporals.format(sel.selectedAt, 'MM-dd HH:mm')}"></span>
                </div>
            </div>

            <div class="status" th:text="${sel.status}"></div>

            <form th:if="${sel.status == 'CONFIRMED'}"
                  th:action="@{/student/selections/{id}/drop(id=${sel.id})}"
                  method="post"
                  onsubmit="return confirm('确认退课？')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-danger btn-xs">退课</button>
            </form>
        </div>
    </div>

    <div th:if="${event != null}" style="text-align:center;margin-top:12px;color:#777;font-size:.84rem;">
        <span th:text="${'活动：' + event.name}"></span>
        <span th:text="${' · 状态：' + event.status}"></span>
    </div>
</div>
</body>
</html>
