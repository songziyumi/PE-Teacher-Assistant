<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的选课 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .student-nav { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .student-nav .brand { font-weight: 700; color: #4a90e2; font-size: 1.05rem; }
        .student-nav .nav-right { display: flex; align-items: center; gap: 16px; font-size: .9rem; }
        .page-wrap { max-width: 960px; margin: 24px auto; padding: 0 16px; }
        .page-title { font-size:1.15rem; margin-bottom:16px; color:#1f2937; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); padding: 24px; margin-bottom: 16px; }
        .section-header { display:flex; flex-direction:column; gap:4px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid #eef2f7; }
        .section-title { margin:0; color:#1f2937; font-size:1.02rem; font-weight:700; }
        .section-desc { margin:0; color:#64748b; font-size:.84rem; line-height:1.6; }
        .tip { margin-bottom:12px; padding:10px 12px; border-radius:8px; background:#eef7ff; color:#2c3e50; font-size:.86rem; line-height:1.6; }
        .sel-list { display:flex; flex-direction:column; gap:10px; }
        .sel-row { display: flex; align-items: center; gap: 12px; padding: 14px; border:1px solid #e8edf5; border-radius:12px; background:#fff; flex-wrap: wrap; }
        .sel-course { font-weight: 700; font-size: .95rem; color:#111827; }
        .sel-meta { font-size: .82rem; color: #777; margin-top:6px; }
        .status { display:inline-flex; align-items:center; justify-content:center; min-height:30px; padding:0 11px; border-radius:999px; background:#f3f4f6; color:#4b5563; font-size:.78rem; font-weight:600; white-space:nowrap; }
        .drop-tip { font-size: .8rem; color:#7a7a7a; width:100%; line-height:1.6; }
        .ajax-feedback { display:none; margin-bottom:16px; }
        .ajax-feedback.show { display:block; }
        .empty-state { text-align:center; color:#999; }
        .btn-danger.btn-loading, .btn-danger:disabled { opacity: .7; cursor: not-allowed; }
        @media (max-width: 768px) {
            .student-nav { height: 56px; padding: 0 12px; align-items: center; gap: 10px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .student-nav .brand { flex: 0 0 auto; white-space: nowrap; font-size: .95rem; }
            .student-nav .nav-right { width: auto; flex: 0 0 auto; flex-wrap: nowrap; gap: 12px; white-space: nowrap; }
            .student-nav .nav-right > *, .student-nav .nav-right form { width: auto; flex: 0 0 auto; white-space: nowrap; }
            .page-wrap { margin: 16px auto; padding: 0 12px; }
            .card { padding: 16px; }
            .sel-row { align-items: flex-start; }
            .sel-row > * { width: 100%; }
            .sel-row .btn, .sel-row button { width: 100%; }
        }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育学生端</div>
    <div class="nav-right">
        <a th:href="@{/student}" style="color:#4a90e2;">首页</a>
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <span th:text="${student != null ? student.name : ''}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <h2 class="page-title">我的选课记录</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div id="dropAjaxFeedback" class="ajax-feedback"></div>

    <div th:if="${event == null or mySelections == null or #lists.isEmpty(mySelections)}" class="card empty-state">
        <div class="section-header">
            <h3 class="section-title">当前暂无记录</h3>
            <p class="section-desc">暂时没有可展示的选课信息。</p>
        </div>
        <a th:href="@{/student/courses}" class="btn btn-primary btn-sm">去选课</a>
    </div>

    <div th:if="${mySelections != null and !#lists.isEmpty(mySelections)}" class="card">
        <div class="section-header">
            <h3 class="section-title">我的选课</h3>
            <p class="section-desc">查看已选课程、状态和退课操作。</p>
        </div>

        <div th:if="${droppableSelectionIds != null and !#lists.isEmpty(droppableSelectionIds)}" class="tip">
            第一轮已确认课程可在第二轮期间主动退课。退课后名额将回流第二轮，您需要按第二轮规则重新抢课，系统不会回到第一轮重新分配。
        </div>

        <div class="sel-list">
            <div th:each="sel : ${mySelections}" class="sel-row">
                <div style="flex:1;">
                    <div class="sel-course" th:text="${sel.course.name}"></div>
                    <div class="sel-meta">
                        <span th:if="${sel.round == 1}" th:text="${'第一轮 · ' + sel.preference + '志愿'}"></span>
                        <span th:if="${sel.round == 2}">第二轮</span>
                        <span th:if="${sel.round != 1 and sel.round != 2}">手动加入</span>
                        <span th:if="${sel.selectedAt != null}" th:text="${' · ' + #temporals.format(sel.selectedAt, 'MM-dd HH:mm')}"></span>
                    </div>
                </div>

                <div class="status">
                    <span th:if="${sel.status == 'DRAFT'}">草稿</span>
                    <span th:if="${sel.status == 'PENDING'}">已确认填报</span>
                    <span th:if="${sel.status == 'CONFIRMED'}">已确认选中</span>
                    <span th:if="${sel.status == 'LOTTERY_FAIL'}">未中签</span>
                    <span th:if="${sel.status == 'CANCELLED'}">已取消</span>
                </div>

                <form th:if="${#lists.contains(droppableSelectionIds, sel.id)}"
                      th:action="@{/student/selections/{id}/drop(id=${sel.id})}"
                      th:attr="data-course-name=${sel.course.name}"
                      class="drop-selection-form"
                      method="post"
                      onsubmit="return confirm('确认退课？退课后将失去当前录取结果，并按第二轮规则重新抢课。')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit"
                            class="btn btn-danger btn-xs drop-selection-button"
                            data-default-text="退课"
                            data-loading-text="退课处理中...">退课</button>
                </form>
                <div class="drop-tip" th:if="${#lists.contains(droppableSelectionIds, sel.id)}">退课后名额会回流到第二轮，请尽快重新抢课。</div>
            </div>
        </div>
    </div>

    <div th:if="${event != null}" style="text-align:center;margin-top:12px;color:#777;font-size:.84rem;">
        <span th:text="${'活动：' + event.name}"></span>
        <span th:text="${' · 状态：' + event.status}"></span>
    </div>
</div>
<script>
const dropAjaxFeedback = document.getElementById('dropAjaxFeedback');
const dropSelectionForms = Array.from(document.querySelectorAll('.drop-selection-form'));

function showDropFeedback(type, message) {
    if (!dropAjaxFeedback) {
        return;
    }
    dropAjaxFeedback.className = `ajax-feedback alert ${type === 'success' ? 'alert-success' : 'alert-error'} show`;
    dropAjaxFeedback.textContent = message;
    dropAjaxFeedback.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

if (dropSelectionForms.length > 0) {
    const dropSubmitLocks = new Set();

    dropSelectionForms.forEach(form => {
        form.addEventListener('submit', event => {
            const submitButton = form.querySelector('.drop-selection-button');
            const courseName = form.dataset.courseName || '当前课程';
            const scope = form.action;
            if (dropSubmitLocks.has(scope)) {
                event.preventDefault();
                return;
            }
            dropSubmitLocks.add(scope);
            if (submitButton) {
                submitButton.disabled = true;
                submitButton.classList.add('btn-loading');
                submitButton.textContent = submitButton.dataset.loadingText || '退课处理中...';
            }
            showDropFeedback('success', `正在提交《${courseName}》退课请求，请稍候...`);
        });
    });

    window.addEventListener('pageshow', () => {
        dropSubmitLocks.clear();
        dropSelectionForms.forEach(form => {
            const submitButton = form.querySelector('.drop-selection-button');
            if (!submitButton) {
                return;
            }
            submitButton.disabled = false;
            submitButton.classList.remove('btn-loading');
            submitButton.textContent = submitButton.dataset.defaultText || '退课';
        });
    });
}
</script>
</body>
</html>
