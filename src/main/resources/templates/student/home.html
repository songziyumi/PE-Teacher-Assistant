<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生首页 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .student-nav { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:56px; gap:12px; overflow-x:auto; }
        .student-nav .brand { font-weight:700; color:#4a90e2; white-space:nowrap; }
        .student-nav .nav-right { display:flex; align-items:center; gap:14px; font-size:.9rem; white-space:nowrap; }
        .page-wrap { max-width:960px; margin:24px auto; padding:0 16px; }
        .hero {
            position:relative;
            overflow:hidden;
            background:linear-gradient(135deg,#2563eb,#60a5fa);
            color:#fff;
            border-radius:18px;
            padding:24px;
            margin-bottom:16px;
            box-shadow:0 10px 28px rgba(37,99,235,.18);
        }
        .hero::after {
            content:"";
            position:absolute;
            right:-40px;
            top:-40px;
            width:160px;
            height:160px;
            border-radius:50%;
            background:rgba(255,255,255,.12);
        }
        .hero h2 { margin:0 0 6px; font-size:1.35rem; position:relative; z-index:1; }
        .hero p { margin:0; opacity:.92; font-size:.92rem; line-height:1.7; position:relative; z-index:1; max-width:560px; }
        .card-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
        .home-card {
            display:flex;
            flex-direction:column;
            gap:8px;
            background:#fff;
            border-radius:14px;
            padding:18px;
            text-decoration:none;
            color:#1f2937;
            box-shadow:0 4px 14px rgba(15,23,42,.06);
            border:1px solid #e8eef5;
            transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
        }
        .home-card:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(15,23,42,.1); border-color:#d7e6f7; }
        .card-title { display:flex; align-items:center; gap:8px; font-weight:700; color:#2563eb; }
        .card-icon { font-size:1.15rem; width:24px; text-align:center; }
        .card-desc { color:#64748b; font-size:.88rem; line-height:1.65; }
        .card-stat { margin-top:auto; color:#334155; font-size:.88rem; }
        @media (max-width:640px) {
            .student-nav { padding:0 12px; }
            .student-nav .brand { font-size:.95rem; }
            .student-nav .nav-right { gap:12px; }
            .page-wrap { margin:16px auto; padding:0 12px; }
            .hero { padding:20px 18px; border-radius:16px; }
            .card-grid { grid-template-columns:1fr; gap:12px; }
            .home-card { padding:16px; }
        }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育学生端</div>
    <div class="nav-right">
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <span th:text="${student != null ? student.name : ''}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <section class="hero">
        <h2 th:text="${student != null ? student.name + '，欢迎回来' : '学生首页'}">学生首页</h2>
        <p>查看选课、体测、出勤、成绩和账号安全信息。</p>
    </section>

    <div class="card-grid">
        <a class="home-card" th:href="@{/student/courses}">
            <div class="card-title"><span class="card-icon">选</span><span>选课</span></div>
            <div class="card-desc">查看选课活动、填报志愿、抢课和申请入口。</div>
            <div class="card-stat">查看选课安排</div>
        </a>
        <a class="home-card" th:href="@{/student/physical-tests}">
            <div class="card-title"><span class="card-icon">测</span><span>体质健康测试</span></div>
            <div class="card-desc">查看各学期体测成绩和等级。</div>
            <div class="card-stat" th:if="${latestPhysicalTest != null}"
                 th:text="${latestPhysicalTest.academicYear + ' ' + latestPhysicalTest.semester + ' · ' + (latestPhysicalTest.level != null ? latestPhysicalTest.level : '暂无等级')}"></div>
            <div class="card-stat" th:if="${latestPhysicalTest == null}">当前暂无记录</div>
        </a>
        <a class="home-card" th:href="@{/student/attendance}">
            <div class="card-title"><span class="card-icon">勤</span><span>出勤情况</span></div>
            <div class="card-desc">查看出勤统计和每次课程记录。</div>
            <div class="card-stat"
                 th:text="'出勤率 ' + ${attendanceStats['rate']} + '% · 共 ' + ${attendanceStats['total']} + ' 次'">出勤统计</div>
        </a>
        <a class="home-card" th:href="@{/student/term-grades}">
            <div class="card-title"><span class="card-icon">绩</span><span>学期体育成绩</span></div>
            <div class="card-desc">查看各学期成绩、等级和备注。</div>
            <div class="card-stat" th:if="${latestTermGrade != null}"
                 th:text="${latestTermGrade.academicYear + ' ' + latestTermGrade.semester + ' · ' + (latestTermGrade.totalScore != null ? latestTermGrade.totalScore : '暂无分数')}"></div>
            <div class="card-stat" th:if="${latestTermGrade == null}">当前暂无记录</div>
        </a>
        <a class="home-card" th:href="@{/student/password}">
            <div class="card-title"><span class="card-icon">安</span><span>账号安全</span></div>
            <div class="card-desc">修改密码、设置便捷账号和管理邮箱。</div>
            <div class="card-stat">查看安全设置</div>
        </a>
        <a class="home-card" th:href="@{/student/messages}">
            <div class="card-title"><span class="card-icon">信</span><span>消息</span></div>
            <div class="card-desc">查看通知、提醒和教师回复。</div>
            <div class="card-stat" th:text="'未读 ' + ${unreadMessageCount} + ' 条'">未读 0 条</div>
        </a>
    </div>
</div>
</body>
</html>
