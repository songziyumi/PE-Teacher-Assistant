<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出勤情况 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .student-nav { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:56px; gap:12px; overflow-x:auto; }
        .student-nav .brand,.student-nav .nav-right { white-space:nowrap; }
        .student-nav .brand { font-weight:700; color:#4a90e2; }
        .student-nav .nav-right { display:flex; align-items:center; gap:14px; font-size:.9rem; }
        .page-wrap { max-width:860px; margin:22px auto; padding:0 14px; }
        .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
        .stat { background:#fff; border-radius:12px; padding:14px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.06); }
        .stat b { display:block; font-size:1.2rem; color:#2563eb; }
        .card { background:#fff; border-radius:14px; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.06); overflow-x:auto; }
        @media (max-width:640px) { .page-wrap{margin:16px auto;padding:0 12px;} .summary{grid-template-columns:repeat(2,1fr);} }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">出勤情况</div>
    <div class="nav-right">
        <a th:href="@{/student}" style="color:#4a90e2;">首页</a>
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <span th:text="${student != null ? student.name : ''}"></span>
    </div>
</nav>
<div class="page-wrap">
    <div class="summary">
        <div class="stat"><b th:text="${stats['total']}">0</b><span>总次数</span></div>
        <div class="stat"><b th:text="${stats['present']}">0</b><span>出勤</span></div>
        <div class="stat"><b th:text="${stats['absent']}">0</b><span>缺勤</span></div>
        <div class="stat"><b th:text="${stats['leave']}">0</b><span>请假</span></div>
    </div>
    <div class="card">
        <table class="table">
            <thead><tr><th>日期</th><th>状态</th></tr></thead>
            <tbody>
            <tr th:each="r : ${records}"><td th:text="${r.date}"></td><td th:text="${r.status}"></td></tr>
            <tr th:if="${#lists.isEmpty(records)}"><td colspan="2" style="text-align:center;color:#999;">暂无出勤记录</td></tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
