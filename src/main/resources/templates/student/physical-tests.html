<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体质健康测试 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .student-nav { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:56px; gap:12px; overflow-x:auto; }
        .student-nav .brand,.student-nav .nav-right { white-space:nowrap; }
        .student-nav .brand { font-weight:700; color:#4a90e2; }
        .student-nav .nav-right { display:flex; align-items:center; gap:14px; font-size:.9rem; }
        .page-wrap { max-width:960px; margin:24px auto; padding:0 16px; }
        .card { background:#fff; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
        .section-header { display:flex; flex-direction:column; gap:4px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid #eef2f7; }
        .section-title { margin:0; font-size:1.02rem; color:#1f2937; font-weight:700; }
        .section-desc { margin:0; color:#64748b; font-size:.84rem; line-height:1.6; }
        .desktop-table { overflow-x:auto; }
        .mobile-records { display:none; }
        .mobile-record-list { display:flex; flex-direction:column; gap:10px; }
        .mobile-record { border:1px solid #e8edf5; border-radius:12px; padding:14px; background:#fff; }
        .mobile-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
        .mobile-item { background:#f8fafc; border-radius:10px; padding:10px 12px; }
        .mobile-item span { display:block; color:#64748b; font-size:.76rem; margin-bottom:4px; }
        .mobile-item strong { color:#1f2937; font-size:.9rem; word-break:break-word; }
        .mobile-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
        .mobile-title { font-weight:700; color:#1f2937; }
        .mobile-subtitle { color:#64748b; font-size:.8rem; margin-top:4px; }
        .mobile-badge { display:inline-flex; align-items:center; min-height:30px; padding:0 10px; border-radius:999px; background:#eff6ff; color:#2563eb; font-size:.8rem; font-weight:600; white-space:nowrap; }
        .empty-state { text-align:center; color:#999; padding:12px 0; }
        @media (max-width:640px) {
            .page-wrap { margin:16px auto; padding:0 12px; }
            .card { padding:14px; }
            .desktop-table { display:none; }
            .mobile-records { display:block; }
        }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育学生端</div>
    <div class="nav-right">
        <a th:href="@{/student}" style="color:#4a90e2;">首页</a>
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <span th:text="${student != null ? student.name : ''}"></span>
    </div>
</nav>
<div class="page-wrap">
    <div class="card">
        <div class="section-header">
            <h3 class="section-title">体测记录</h3>
            <p class="section-desc">查看各学期体测成绩与等级。</p>
        </div>

        <div class="desktop-table">
            <table class="table">
                <thead>
                <tr>
                    <th>学年</th><th>学期</th><th>日期</th><th>身高</th><th>体重</th><th>BMI</th><th>肺活量</th><th>50米</th><th>总分</th><th>等级</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${records}">
                    <td th:text="${r.academicYear}"></td><td th:text="${r.semester}"></td><td th:text="${r.testDate}"></td>
                    <td th:text="${r.height}"></td><td th:text="${r.weight}"></td><td th:text="${r.bmi}"></td>
                    <td th:text="${r.lungCapacity}"></td><td th:text="${r.sprint50m}"></td><td th:text="${r.totalScore}"></td><td th:text="${r.level}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(records)}"><td colspan="10" class="empty-state">当前暂无记录</td></tr>
                </tbody>
            </table>
        </div>

        <div class="mobile-records">
            <div th:if="${#lists.isEmpty(records)}" class="empty-state">当前暂无记录</div>
            <div th:if="${!#lists.isEmpty(records)}" class="mobile-record-list">
                <div th:each="r : ${records}" class="mobile-record">
                    <div class="mobile-head">
                        <div>
                            <div class="mobile-title" th:text="${r.academicYear + ' ' + r.semester}"></div>
                            <div class="mobile-subtitle" th:text="${r.testDate}"></div>
                        </div>
                        <div class="mobile-badge" th:text="${r.level}"></div>
                    </div>
                    <div class="mobile-grid">
                        <div class="mobile-item"><span>身高</span><strong th:text="${r.height}"></strong></div>
                        <div class="mobile-item"><span>体重</span><strong th:text="${r.weight}"></strong></div>
                        <div class="mobile-item"><span>BMI</span><strong th:text="${r.bmi}"></strong></div>
                        <div class="mobile-item"><span>肺活量</span><strong th:text="${r.lungCapacity}"></strong></div>
                        <div class="mobile-item"><span>50米</span><strong th:text="${r.sprint50m}"></strong></div>
                        <div class="mobile-item"><span>总分</span><strong th:text="${r.totalScore}"></strong></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
