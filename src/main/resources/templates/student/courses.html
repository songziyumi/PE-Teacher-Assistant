<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .student-nav { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .student-nav .brand { font-weight: 700; color: #4a90e2; font-size: 1.05rem; }
        .student-nav .nav-right { display: flex; align-items: center; gap: 16px; font-size: .9rem; }
        .page-wrap { max-width: 960px; margin: 24px auto; padding: 0 16px; }
        .panel { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); padding: 18px 20px; margin-bottom: 18px; }
        .banner { border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; }
        .banner h3 { margin: 0 0 6px; font-size: 1rem; }
        .banner p { margin: 0; font-size: .88rem; line-height: 1.6; }
        .banner.info { background: linear-gradient(135deg, #2980b9, #5dade2); color: #fff; }
        .banner.success { background: linear-gradient(135deg, #27ae60, #58d68d); color: #fff; }
        .banner.waiting { background: #f8f9fa; border: 1px solid #e5e7eb; color: #555; }
        .banner.request { background: linear-gradient(135deg, #8e44ad, #b07ee8); color: #fff; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .course-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); padding: 18px; display: flex; flex-direction: column; gap: 10px; }
        .course-card h4 { margin: 0; }
        .muted { color: #666; font-size: .88rem; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .actions form { margin: 0; }
        .btn-primary, .btn-secondary, .btn-success, .btn-request {
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            color: #fff;
            cursor: pointer;
        }
        .btn-primary { background: #2980b9; }
        .btn-secondary { background: #8e44ad; }
        .btn-success { background: #27ae60; }
        .btn-request { background: #8e44ad; }
        .selection-list { margin: 0; padding-left: 18px; }
        .selection-list li { margin: 6px 0; }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育选课</div>
    <div class="nav-right">
        <a th:href="@{/student/my-courses}" style="color:#4a90e2;">我的选课</a>
        <a th:href="@{/student/messages}" style="color:#4a90e2;">消息</a>
        <span th:text="${student != null ? student.name : ''}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div th:if="${noEvent}" class="panel" style="text-align:center;color:#666;">
        <h3>暂无进行中的选课活动</h3>
        <p>请等待管理员发布。</p>
    </div>

    <div th:if="${event != null}">
        <div th:if="${inRound1}" class="banner info">
            <h3>第一轮志愿填报进行中</h3>
            <p>截止时间：<span th:text="${#temporals.format(event.round1End, 'MM月dd日 HH:mm')}"></span></p>
        </div>

        <div th:if="${event.status == 'PROCESSING'}" class="banner waiting">
            <h3>正在结算第一轮抽签</h3>
            <p>管理员正在处理，请稍候刷新页面。</p>
        </div>

        <div th:if="${inRound2}" class="banner success">
            <h3>第二轮抢课进行中</h3>
            <p>截止时间：<span th:text="${#temporals.format(event.round2End, 'MM月dd日 HH:mm')}"></span></p>
        </div>

        <div th:if="${event.status == 'ROUND1' and !inRound1}" class="banner waiting">
            <h3>第一轮选课尚未开始</h3>
            <p>开始时间：<span th:text="${#temporals.format(event.round1Start, 'MM月dd日 HH:mm')}"></span></p>
        </div>

        <div th:if="${event.status == 'ROUND2' and !inRound2}" class="banner waiting">
            <h3>第二轮选课尚未开始</h3>
            <p>开始时间：<span th:text="${#temporals.format(event.round2Start, 'MM月dd日 HH:mm')}"></span></p>
        </div>

        <div th:if="${event.status == 'CLOSED' and inRound3}" class="banner request">
            <h3>第三轮选课申请</h3>
            <p>您当前还没有确认课程，可以向课程教师提交申请。</p>
        </div>

        <div th:if="${event.status == 'CLOSED' and !inRound3}" class="banner waiting">
            <h3>选课活动已结束</h3>
        </div>

        <div th:if="${!#lists.isEmpty(mySelections)}" class="panel">
            <h3 style="margin-top:0;">我的选课状态</h3>
            <ul class="selection-list">
                <li th:each="sel : ${mySelections}">
                    <span th:text="${sel.course.name}"></span>
                    -
                    <span th:if="${sel.preference == 1}">第一志愿</span>
                    <span th:if="${sel.preference == 2}">第二志愿</span>
                    <span th:if="${sel.preference == 0}">第二轮/管理员分配</span>
                    -
                    <span th:text="${sel.status}"></span>
                </li>
            </ul>
        </div>

        <div class="course-grid">
            <div th:each="c : ${courses}" class="course-card">
                <h4 th:text="${c.name}"></h4>
                <div class="muted" th:if="${c.teacher != null}">
                    教师：<span th:text="${c.teacher.name}"></span>
                    <a th:href="@{/student/teachers/{id}(id=${c.teacher.id})}" style="margin-left:8px;color:#4a90e2;">查看教师主页</a>
                </div>
                <div class="muted" th:if="${c.description != null and !c.description.isBlank()}" th:text="${c.description}"></div>
                <div class="muted">
                    剩余名额：
                    <span th:text="${remainingMap[c.id]}"></span>
                    /
                    <span th:text="${c.totalCapacity}"></span>
                </div>

                <div class="actions" th:if="${inRound1}">
                    <form th:action="@{/student/courses/{id}/prefer(id=${c.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="preference" value="1">
                        <button type="submit" class="btn-primary">设为第一志愿</button>
                    </form>
                    <form th:action="@{/student/courses/{id}/prefer(id=${c.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="preference" value="2">
                        <button type="submit" class="btn-secondary">设为第二志愿</button>
                    </form>
                </div>

                <div class="actions" th:if="${inRound2}">
                    <form th:action="@{/student/courses/{id}/select(id=${c.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-success" th:disabled="${remainingMap[c.id] == 0}">立即抢课</button>
                    </form>
                </div>

                <div class="actions" th:if="${inRound3 and c.teacher != null}">
                    <form th:action="@{/student/courses/{id}/request(id=${c.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="content" value="">
                        <button type="submit" class="btn-request">提交申请</button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(courses)}" class="panel" style="text-align:center;color:#666;">
            暂无可选课程
        </div>
    </div>
</div>
</body>
</html>
