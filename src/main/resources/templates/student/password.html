<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生账号安全 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .student-nav { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:0 16px; display:flex; align-items:center; justify-content:space-between; height:56px; gap:12px; overflow-x:auto; }
        .student-nav .brand { font-weight:700; color:#4a90e2; white-space:nowrap; }
        .student-nav .nav-right { display:flex; align-items:center; gap:14px; font-size:.9rem; white-space:nowrap; }
        .page-wrap { max-width: 960px; margin: 24px auto; padding: 0 16px; }
        .card { max-width: 640px; margin: 0 auto 18px; background: #fff; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); overflow: hidden; border:1px solid #e8eef5; }
        .section-header { display:flex; flex-direction:column; gap:4px; padding:20px 24px 12px; border-bottom:1px solid #eef2f7; }
        .section-title { margin:0; font-size:1.06rem; font-weight:700; color:#1f2937; }
        .section-desc { margin:0; color:#64748b; font-size:.84rem; line-height:1.6; }
        .card-body { padding: 24px; }
        .hint-box { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; border-radius: 10px; padding: 12px 14px; margin-bottom: 18px; line-height: 1.6; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color:#334155; }
        .form-group input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
        .form-help { font-size: 12px; color: #6b7280; line-height: 1.7; margin-bottom: 16px; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; align-items: center; flex-wrap: wrap; }
        .meta-text { margin-top: 6px; color: #6b7280; font-size: 12px; }
        .status-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; font-size: 13px; color: #4b5563; }
        .status-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .status-badge.ok { background: #dcfce7; color: #166534; }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        @media (max-width: 768px) {
            .student-nav { padding:0 12px; }
            .student-nav .brand { font-size:.95rem; }
            .student-nav .nav-right { gap:12px; }
            .page-wrap { margin: 16px auto; padding: 0 12px; }
            .section-header, .card-body { padding: 16px; }
            .form-actions { flex-direction: column; align-items: stretch; }
            .form-actions .btn, .form-actions a.btn { width: 100%; }
            .status-row { align-items: flex-start; flex-direction: column; gap: 6px; }
        }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育学生端</div>
    <div class="nav-right">
        <a th:href="@{/student}" style="color:#4a90e2;">首页</a>
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <span th:text="${account != null ? account.loginId : ''}"></span>
    </div>
</nav>
<div class="page-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card">
        <div class="section-header">
            <h2 class="section-title">修改密码</h2>
            <p class="section-desc">修改登录密码并设置便捷账号。</p>
        </div>

        <div class="card-body">
            <div class="hint-box" th:if="${force}">
                当前账号尚未完成激活，请先修改密码；完成后才可以正常进入学生功能页面。
            </div>

            <form th:action="@{/student/password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="force" th:value="${force}">

                <div class="form-group">
                    <label for="loginId">当前系统账号</label>
                    <input id="loginId" type="text" th:value="${account != null ? account.loginId : ''}" readonly>
                </div>

                <div class="form-group">
                    <label for="loginAlias">便捷账号</label>
                    <input id="loginAlias" type="text" name="loginAlias"
                           th:value="${account != null ? account.loginAlias : ''}"
                           placeholder="请输入 4-20 位字母或数字"
                           pattern="[A-Za-z0-9]{4,20}">
                    <div class="meta-text" th:if="${account != null && account.loginAliasBoundAt != null}">
                        绑定时间：<span th:text="${#temporals.format(account.loginAliasBoundAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="oldPassword">当前密码</label>
                    <input id="oldPassword" type="password" name="oldPassword" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input id="newPassword" type="password" name="newPassword" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input id="confirmPassword" type="password" name="confirmPassword" required>
                </div>

                <div class="form-help">
                    便捷账号需为 4-20 位字母或数字；密码长度不少于 8 位，且必须同时包含字母和数字。
                </div>

                <div class="form-actions">
                    <a th:if="${!force}" th:href="@{/student}" class="btn btn-outline">返回学生首页</a>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>

            <div th:if="${force}" style="margin-top:12px;text-align:right;">
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline">退出登录</button>
                </form>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-header">
            <h2 class="section-title">邮箱安全</h2>
            <p class="section-desc">管理邮箱绑定、验证码和验证状态。</p>
        </div>

        <div class="card-body">
            <div class="status-row">
                <span>当前邮箱：</span>
                <strong th:text="${account != null && account.email != null ? account.email : '未绑定'}"></strong>
                <span th:class="${account != null && account.emailVerified} ? 'status-badge ok' : 'status-badge pending'"
                      th:text="${account != null && account.emailVerified} ? '已验证' : '待验证'"></span>
            </div>

            <div class="form-help">
                <span th:if="${account != null && account.emailBoundAt != null}">
                    绑定时间：<span th:text="${#temporals.format(account.emailBoundAt, 'yyyy-MM-dd HH:mm')}"></span>；
                </span>
                <span th:if="${account != null && account.emailVerifiedAt != null}">
                    验证时间：<span th:text="${#temporals.format(account.emailVerifiedAt, 'yyyy-MM-dd HH:mm')}"></span>
                </span>
            </div>

            <form th:action="@{/student/email}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input id="email" type="email" name="email" th:value="${account != null ? account.email : ''}" placeholder="请输入邮箱地址">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存邮箱</button>
                </div>
            </form>

            <form th:if="${account != null && account.email != null && !account.email.isBlank()}" th:action="@{/student/email/send-code}" method="post" style="margin-top:14px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-actions">
                    <button type="submit" class="btn btn-secondary">发送验证码</button>
                </div>
            </form>

            <form th:if="${account != null && account.email != null && !account.email.isBlank()}" th:action="@{/student/email/verify}" method="post" style="margin-top:14px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="code">邮箱验证码</label>
                    <input id="code" type="text" name="code" placeholder="请输入收到的验证码">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">验证邮箱</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
