<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .password-wrap {
            max-width: 520px;
            margin: 48px auto;
            padding: 0 16px;
        }
        .password-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
            overflow: hidden;
        }
        .password-head {
            padding: 20px 24px;
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            color: #fff;
        }
        .password-body {
            padding: 24px;
        }
        .hint-box {
            background: #fff7ed;
            border: 1px solid #fdba74;
            color: #9a3412;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 18px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-help {
            font-size: 12px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
<div class="password-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="password-card">
        <div class="password-head">
            <h2 style="margin:0;">学生密码修改</h2>
            <p style="margin:6px 0 0;opacity:.9;">首次登录后必须先完成改密</p>
        </div>
        <div class="password-body">
            <div class="hint-box" th:if="${force}">
                当前账号需要先修改初始密码，修改成功后才能进入学生业务页面。
            </div>

            <form th:action="@{/student/password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="force" th:value="${force}">

                <div class="form-group">
                    <label>当前账号</label>
                    <input type="text" th:value="${account != null ? account.loginId : ''}" readonly>
                </div>
                <div class="form-group">
                    <label>旧密码</label>
                    <input type="password" name="oldPassword" required>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="newPassword" required>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" name="confirmPassword" required>
                </div>
                <div class="form-help">
                    密码规则：不少于 8 位，必须同时包含字母和数字，且不能与当前初始密码相同。
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存新密码</button>
                </div>
            </form>

            <div th:if="${force}" style="margin-top:12px;text-align:right;">
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline">退出登录</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
