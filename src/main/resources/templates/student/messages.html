<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的消息 - 体育选课</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .student-nav { background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; }
        .student-nav .brand { font-weight:700; color:#4a90e2; font-size:1.05rem; }
        .student-nav .nav-right { display:flex; align-items:center; gap:16px; font-size:.9rem; }
        .page-wrap { max-width:760px; margin:24px auto; padding:0 16px; }
        .section-card { background:#fff; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08); padding:22px 26px; margin-bottom:20px; }
        .section-title { font-weight:700; font-size:1rem; margin:0 0 16px; }
        .msg-item { border-left:4px solid #ddd; padding:10px 14px; margin-bottom:10px; border-radius:0 8px 8px 0; background:#f9fafc; font-size:.87rem; }
        .msg-item.unread { border-left-color:#4a90e2; background:#f0f5ff; }
        .msg-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .msg-from { font-weight:600; color:#333; }
        .msg-time { font-size:.75rem; color:#aaa; }
        .msg-subject { color:#555; margin-bottom:4px; }
        .msg-content { color:#777; white-space:pre-wrap; margin-top:6px; display:none; }
        .badge-req { display:inline-block; padding:1px 8px; border-radius:20px; font-size:.73rem; font-weight:600; margin-left:8px; }
        .badge-pending  { background:#fef3e2; color:#c87c0a; }
        .badge-approved { background:#eafaf1; color:#1a6e3a; }
        .badge-rejected { background:#fdf0f0; color:#9b2525; }
        .send-form .form-group { margin-bottom:12px; }
        .send-form label { display:block; font-size:.83rem; font-weight:600; color:#555; margin-bottom:.3rem; }
        .send-form select, .send-form input, .send-form textarea { width:100%; padding:.45rem .7rem; border:1px solid #ddd; border-radius:6px; font-size:.9rem; box-sizing:border-box; font-family:inherit; }
        .send-form textarea { min-height:90px; resize:vertical; }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">🏃 体育选课</div>
    <div class="nav-right">
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <a th:href="@{/student/my-courses}" style="color:#4a90e2;">我的选课</a>
        <span th:text="${student?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- 发送新消息 -->
    <div class="section-card">
        <div class="section-title">发送站内消息给教师</div>
        <form th:action="@{/student/messages/send}" method="post" class="send-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label>收件教师</label>
                <select name="teacherId" required>
                    <option value="">请选择教师</option>
                    <option th:each="t : ${teachers}" th:value="${t.id}"
                            th:text="${t.name} + (${t.specialty != null and !t.specialty.isBlank()} ? ' (' + ${t.specialty} + ')' : '')"></option>
                </select>
            </div>
            <div class="form-group">
                <label>主题</label>
                <input type="text" name="subject" required placeholder="消息主题">
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea name="content" required placeholder="请输入消息内容…"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">发送</button>
        </form>
    </div>

    <!-- 收件箱 -->
    <div class="section-card">
        <div class="section-title">
            我的收件箱
            <span th:if="${unreadCount > 0}"
                  style="font-size:.78rem;background:#e74c3c;color:#fff;border-radius:20px;padding:2px 8px;vertical-align:middle;"
                  th:text="${unreadCount} + ' 未读'"></span>
        </div>

        <div th:if="${#lists.isEmpty(messages)}" style="text-align:center;color:#aaa;padding:20px 0;">暂无消息</div>

        <div th:each="msg : ${messages}" class="msg-item"
             th:classappend="${!msg.isRead} ? ' unread' : ''">
            <div class="msg-meta">
                <span class="msg-from" th:text="${msg.senderName}">
                    <span th:if="${msg.type == 'COURSE_REQUEST'}" class="badge-req"
                          th:classappend="${msg.status == 'PENDING'} ? ' badge-pending' :
                                          (${msg.status == 'APPROVED'} ? ' badge-approved' : ' badge-rejected')"
                          th:text="${msg.status == 'PENDING'} ? '处理中' :
                                    (${msg.status == 'APPROVED'} ? '已通过' : '已拒绝')"></span>
                </span>
                <span class="msg-time" th:text="${#temporals.format(msg.sentAt,'MM-dd HH:mm')}"></span>
            </div>
            <div class="msg-subject" th:text="${msg.subject}"
                 style="cursor:pointer;color:#4a90e2;" th:onclick="|toggleStudentMsg(${msg.id})|"></div>
            <div class="msg-content" th:id="'mc-' + ${msg.id}" th:text="${msg.content}"></div>
            <div th:if="${!msg.isRead}" style="margin-top:6px;">
                <form th:action="@{/student/messages/{id}/read(id=${msg.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-secondary btn-sm">标记已读</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function toggleStudentMsg(id) {
    const el = document.getElementById('mc-' + id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
</script>
</body>
</html>
