<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的消息 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .student-nav { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .student-nav .brand { font-weight: 700; color: #4a90e2; font-size: 1.05rem; }
        .student-nav .nav-right { display: flex; align-items: center; gap: 16px; font-size: .9rem; }
        .page-wrap { max-width: 760px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); padding: 22px 26px; margin-bottom: 20px; }
        .card h3 { margin-top: 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: .85rem; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group select, .form-group input, .form-group textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: .92rem; font-family: inherit; }
        .form-group textarea { min-height: 90px; resize: vertical; }
        .msg-item { border-left: 4px solid #ddd; padding: 12px 14px; margin-bottom: 10px; border-radius: 0 8px 8px 0; background: #f9fafc; }
        .msg-item.unread { border-left-color: #4a90e2; background: #f0f5ff; }
        .msg-meta { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
        .msg-from { font-weight: 600; }
        .msg-time { color: #999; font-size: .78rem; }
        .msg-subject { color: #333; margin-bottom: 6px; }
        .msg-content { color: #666; white-space: pre-wrap; }
    </style>
</head>
<body>
<nav class="student-nav">
    <div class="brand">体育选课</div>
    <div class="nav-right">
        <a th:href="@{/student/courses}" style="color:#4a90e2;">选课</a>
        <a th:href="@{/student/my-courses}" style="color:#4a90e2;">我的选课</a>
        <span th:text="${student != null ? student.name : ''}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.88rem;">退出</button>
        </form>
    </div>
</nav>

<div class="page-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card">
        <h3>给教师发送站内消息</h3>
        <form th:action="@{/student/messages/send}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label>收件教师</label>
                <select name="teacherId" required>
                    <option value="">请选择教师</option>
                    <option th:each="t : ${teachers}"
                            th:value="${t.id}"
                            th:text="${t.displayName}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>主题</label>
                <input type="text" name="subject" required placeholder="消息主题">
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea name="content" required placeholder="请输入消息内容"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">发送</button>
        </form>
    </div>

    <div class="card">
        <h3>
            我的收件箱
            <span th:if="${unreadCount > 0}" th:text="${'（未读 ' + unreadCount + '）'}" style="font-size:.85rem;color:#e74c3c;"></span>
        </h3>

        <div th:if="${#lists.isEmpty(messages)}" style="text-align:center;color:#999;padding:16px 0;">暂无消息</div>

        <div th:each="msg : ${messages}" class="msg-item" th:classappend="${!msg.isRead} ? ' unread' : ''">
            <div class="msg-meta">
                <span class="msg-from" th:text="${msg.senderName}"></span>
                <span class="msg-time" th:text="${msg.sentAt != null ? #temporals.format(msg.sentAt, 'MM-dd HH:mm') : ''}"></span>
            </div>
            <div class="msg-subject" th:text="${msg.subject}"></div>
            <div class="msg-content" th:text="${msg.content}"></div>
            <div th:if="${!msg.isRead}" style="margin-top:8px;">
                <form th:action="@{/student/messages/{id}/read(id=${msg.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-secondary btn-sm">标记已读</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
