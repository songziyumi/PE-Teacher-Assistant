<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体质健康测试录入 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .page { max-width: 1260px; margin: 24px auto; padding: 0 16px 28px; }
        .hero-card {
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            color: #fff;
            border-radius: 18px;
            padding: 22px 24px;
            box-shadow: 0 14px 32px rgba(37, 99, 235, .18);
            margin-bottom: 16px;
        }
        .hero-card h2 { margin: 0; font-size: 1.28rem; }
        .hero-card p { margin: 8px 0 0; font-size: .9rem; line-height: 1.65; opacity: .92; }
        .filter-card,
        .table-card {
            background: #fff;
            border: 1px solid #e8eef5;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
            padding: 16px;
            margin-bottom: 16px;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            align-items: end;
        }
        .filter-grid .form-group {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-grid label,
        .filter-label {
            display: block;
            font-size: .84rem;
            font-weight: 600;
            color: #475569;
            line-height: 1.2;
        }
        .filter-grid select,
        .filter-grid input[type=text] {
            width: 100%;
            min-height: 42px;
            padding: 0 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: .92rem;
            background: #fff;
            box-sizing: border-box;
        }
        .filter-grid .btn {
            width: 100%;
            min-height: 42px;
            padding: 0 14px;
            border-radius: 10px;
        }
        .filter-action { justify-content: flex-end; }
        .table-scroll { overflow-x: auto; }
        .entry-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
        .entry-table th {
            background: #0f172a;
            color: #fff;
            padding: .55rem .45rem;
            text-align: center;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .entry-table td {
            padding: .35rem;
            border-bottom: 1px solid #eef2f7;
            vertical-align: middle;
            background: #fff;
        }
        .entry-table tr:hover td { background: #f8fafc; }
        .entry-table input[type=number],
        .entry-table input[type=date] {
            width: 100%;
            min-width: 74px;
            padding: .34rem .4rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: .82rem;
            text-align: center;
            box-sizing: border-box;
        }
        .entry-table input:focus {
            border-color: #2563eb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        .col-male { background: #eff6ff; }
        .col-female { background: #fdf2f8; }
        .col-name { font-weight: 700; min-width: 76px; }
        .col-no { font-family: monospace; font-size: .8rem; color: #64748b; }
        .level-badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            color: #fff;
            font-size: .72rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .level-优秀 { background: #16a34a; }
        .level-良好 { background: #2563eb; }
        .level-及格 { background: #d97706; }
        .level-不及格 { background: #dc2626; }
        .save-bar {
            position: sticky;
            bottom: 0;
            background: rgba(255, 255, 255, .96);
            backdrop-filter: blur(8px);
            padding: 12px 14px;
            border-top: 1px solid #e8eef5;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 -6px 18px rgba(15, 23, 42, .05);
            margin-top: 12px;
        }
        .info-tip { font-size: .82rem; color: #64748b; line-height: 1.7; }
        .empty-card {
            background: #fff;
            border: 1px dashed #d7e2f0;
            border-radius: 16px;
            color: #64748b;
            text-align: center;
            padding: 34px 20px;
        }
        @media (max-width: 900px) {
            .filter-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 768px) {
            .page { margin: 16px auto 24px; padding: 0 12px 24px; }
            .hero-card,
            .filter-card,
            .table-card { padding: 16px; }
            .filter-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .save-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .save-bar > *,
            .save-bar .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="page">
    <div class="hero-card">
        <h2>体质健康测试录入</h2>
        <p>按班级、学年和学期批量录入体测数据，保存后由系统自动计算等级。</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="get" th:action="@{/teacher/physical-tests}" class="filter-card">
        <div class="filter-grid">
            <div class="form-group">
                <label>班级</label>
                <select name="classId" onchange="this.form.submit()">
                    <option value="">-- 选择班级 --</option>
                    <option th:each="cls : ${myClasses}"
                            th:value="${cls.id}"
                            th:text="${(cls.grade != null ? cls.grade.name + ' ' : '') + cls.name}"
                            th:selected="${classId != null and classId == cls.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>学年</label>
                <input type="text" name="academicYear" th:value="${academicYear}" placeholder="如 2025-2026">
            </div>
            <div class="form-group">
                <label>学期</label>
                <select name="semester">
                    <option value="上学期" th:selected="${semester == '上学期'}">上学期</option>
                    <option value="下学期" th:selected="${semester == '下学期'}">下学期</option>
                </select>
            </div>
            <div class="form-group filter-action">
                <span class="filter-label">操作</span>
                <button type="submit" class="btn btn-secondary">查询</button>
            </div>
        </div>
    </form>

    <th:block th:if="${classId != null and not #lists.isEmpty(students)}">
        <form method="post" th:action="@{/teacher/physical-tests/save-batch}" class="table-card">
            <input type="hidden" name="classId" th:value="${classId}">
            <input type="hidden" name="academicYear" th:value="${academicYear}">
            <input type="hidden" name="semester" th:value="${semester}">

            <div class="table-scroll">
                <table class="entry-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>姓名</th>
                        <th>学号</th>
                        <th>性别</th>
                        <th>测试日期</th>
                        <th>身高(cm)</th>
                        <th>体重(kg)</th>
                        <th>肺活量(mL)</th>
                        <th>50米跑(秒)</th>
                        <th>坐位体前屈(cm)</th>
                        <th>立定跳远(cm)</th>
                        <th class="col-male">引体向上(次)<br><small>男</small></th>
                        <th class="col-female">仰卧起坐(次/min)<br><small>女</small></th>
                        <th class="col-male">1000米跑(秒)<br><small>男</small></th>
                        <th class="col-female">800米跑(秒)<br><small>女</small></th>
                        <th>评级</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="stu, iter : ${students}" th:data-gender="${stu.gender}">
                        <td style="text-align:center;color:#94a3b8;font-size:.78rem;" th:text="${iter.count}"></td>
                        <td class="col-name">
                            <input type="hidden" name="studentIds" th:value="${stu.id}">
                            <span th:text="${stu.name}"></span>
                        </td>
                        <td class="col-no" th:text="${stu.studentNo}"></td>
                        <td style="text-align:center;" th:text="${stu.gender}"></td>
                        <td><input type="date" name="testDateList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].testDate : ''}"></td>
                        <td><input type="number" step="0.1" min="100" max="250" name="heightList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].height : ''}"></td>
                        <td><input type="number" step="0.1" min="20" max="200" name="weightList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].weight : ''}"></td>
                        <td><input type="number" min="500" max="9999" name="lungList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].lungCapacity : ''}"></td>
                        <td><input type="number" step="0.01" min="4" max="20" name="sprint50mList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].sprint50m : ''}"></td>
                        <td><input type="number" step="0.1" min="-20" max="60" name="sitReachList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].sitReach : ''}"></td>
                        <td><input type="number" step="0.1" min="50" max="400" name="jumpList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].standingJump : ''}"></td>
                        <td class="col-male"><input type="number" min="0" max="50" name="pullUpsList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].pullUps : ''}"></td>
                        <td class="col-female"><input type="number" min="0" max="100" name="sitUpsList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].sitUps : ''}"></td>
                        <td class="col-male"><input type="number" step="0.1" min="100" max="600" name="run1000mList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].run1000m : ''}"></td>
                        <td class="col-female"><input type="number" step="0.1" min="100" max="500" name="run800mList" th:value="${existingMap[stu.id] != null ? existingMap[stu.id].run800m : ''}"></td>
                        <td style="text-align:center;">
                            <span th:if="${existingMap[stu.id] != null}"
                                  th:text="${existingMap[stu.id].level}"
                                  th:class="'level-badge level-' + ${existingMap[stu.id].level}"></span>
                            <span th:unless="${existingMap[stu.id] != null}" style="color:#d1d5db;">-</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="save-bar">
                <button type="submit" class="btn btn-primary">保存全班记录</button>
                <span class="info-tip">
                    共 <strong th:text="${#lists.size(students)}"></strong> 名学生 · 学年 <strong th:text="${academicYear}"></strong> · <strong th:text="${semester}"></strong>。
                    空白项保持不变，已填写项会覆盖原记录。
                </span>
            </div>
        </form>
    </th:block>

    <div th:if="${classId == null}" class="empty-card">请先选择班级并填写学年后再查询。</div>
    <div th:if="${classId != null and #lists.isEmpty(students)}" class="empty-card">当前班级暂无学生。</div>
</div>

<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 陈胜松 版权所有</span>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('tbody tr[data-gender]').forEach(function (tr) {
        const gender = tr.dataset.gender;
        const blockCells = gender === '男'
            ? tr.querySelectorAll('td.col-female')
            : gender === '女'
                ? tr.querySelectorAll('td.col-male')
                : [];
        blockCells.forEach(function (td) {
            td.style.background = '#f1f5f9';
            const inp = td.querySelector('input');
            if (inp) {
                inp.value = '';
                inp.readOnly = true;
                inp.placeholder = '-';
                inp.style.cssText = 'background:#f1f5f9;color:#94a3b8;cursor:not-allowed';
            }
        });
    });
});
</script>
</body>
</html>
