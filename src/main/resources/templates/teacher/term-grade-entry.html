<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末成绩录入 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .filter-bar {
            background: #f8f9fa; padding: 1rem; border-radius: 8px;
            margin-bottom: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;
        }
        .filter-bar .form-group { display: flex; flex-direction: column; gap: .25rem; }
        .filter-bar label { font-size: .85rem; font-weight: 600; color: #555; }
        .filter-bar select, .filter-bar input[type=text] {
            padding: .4rem .7rem; border: 1px solid #ddd; border-radius: 4px; font-size: .9rem;
        }
        .table-scroll { overflow-x: auto; }
        .entry-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
        .entry-table th {
            background: #2c3e50; color: #fff; padding: .5rem .6rem;
            text-align: center; white-space: nowrap; position: sticky; top: 0; z-index: 1;
        }
        .entry-table td { padding: .35rem .4rem; border-bottom: 1px solid #eee; vertical-align: middle; }
        .entry-table tr:hover { background: #f8f9fa; }
        .entry-table input[type=number] {
            width: 80px; padding: .3rem .35rem; border: 1px solid #ccc; border-radius: 3px;
            font-size: .85rem; text-align: center;
        }
        .entry-table input[type=text] {
            width: 110px; padding: .3rem .35rem; border: 1px solid #ccc; border-radius: 3px; font-size: .85rem;
        }
        .entry-table input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 0 2px rgba(52,152,219,.2); }
        .col-name { font-weight: 600; min-width: 70px; }
        .col-no { font-family: monospace; font-size: .8rem; color: #666; }
        .level-badge {
            display: inline-block; font-size: .72rem; padding: 1px 5px;
            border-radius: 3px; color: #fff; white-space: nowrap;
        }
        .level-优秀 { background: #27ae60; }
        .level-良好 { background: #2980b9; }
        .level-及格 { background: #f39c12; }
        .level-不及格 { background: #e74c3c; }
        .save-bar {
            position: sticky; bottom: 0; background: #fff; padding: .8rem 1rem;
            border-top: 2px solid #e9ecef; display: flex; gap: 1rem; align-items: center;
            box-shadow: 0 -2px 8px rgba(0,0,0,.06);
        }
        .info-tip { font-size: .82rem; color: #888; }
        .score-formula { font-size: .78rem; color: #aaa; text-align: center; margin-top: .5rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2>期末成绩录入</h2>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <!-- 班级 / 学年 / 学期 选择 -->
    <form method="get" th:action="@{/teacher/term-grades}" class="filter-bar">
        <div class="form-group">
            <label>班级</label>
            <select name="classId" onchange="this.form.submit()">
                <option value="">-- 选择班级 --</option>
                <option th:each="cls : ${myClasses}"
                        th:value="${cls.id}"
                        th:text="${(cls.grade != null ? cls.grade.name + ' ' : '') + cls.name}"
                        th:selected="${classId != null and classId == cls.id}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>学年</label>
            <input type="text" name="academicYear" th:value="${academicYear}"
                   placeholder="如 2025-2026" style="width:120px">
        </div>
        <div class="form-group">
            <label>学期</label>
            <select name="semester">
                <option value="上学期" th:selected="${semester == '上学期'}">上学期</option>
                <option value="下学期" th:selected="${semester == '下学期'}">下学期</option>
            </select>
        </div>
        <button type="submit" class="btn btn-secondary">查询</button>
    </form>

    <!-- 录入表格 -->
    <th:block th:if="${classId != null and not #lists.isEmpty(students)}">
        <p class="score-formula">综合分 = 出勤40% + 技能40% + 理论20%（有空项时系统自动按比例重分配），保存后自动计算。</p>
        <form method="post" th:action="@{/teacher/term-grades/save-batch}">
            <input type="hidden" name="classId"      th:value="${classId}">
            <input type="hidden" name="academicYear" th:value="${academicYear}">
            <input type="hidden" name="semester"     th:value="${semester}">

            <div class="table-scroll">
                <table class="entry-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>姓名</th>
                            <th>学号</th>
                            <th>性别</th>
                            <th>出勤分<br><small style="font-weight:normal">0-100</small></th>
                            <th>技能分<br><small style="font-weight:normal">0-100</small></th>
                            <th>理论分<br><small style="font-weight:normal">0-100</small></th>
                            <th>备注</th>
                            <th>综合分</th>
                            <th>等级</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="stu, iter : ${students}">
                            <td style="text-align:center;color:#aaa;font-size:.78rem"
                                th:text="${iter.count}"></td>
                            <td class="col-name">
                                <input type="hidden" name="studentIds" th:value="${stu.id}">
                                <span th:text="${stu.name}"></span>
                            </td>
                            <td class="col-no" th:text="${stu.studentNo}"></td>
                            <td style="text-align:center" th:text="${stu.gender}"></td>
                            <td>
                                <input type="number" step="0.1" min="0" max="100"
                                       name="attendanceList" placeholder="—"
                                       th:value="${existingMap[stu.id] != null ? existingMap[stu.id].attendanceScore : ''}">
                            </td>
                            <td>
                                <input type="number" step="0.1" min="0" max="100"
                                       name="skillList" placeholder="—"
                                       th:value="${existingMap[stu.id] != null ? existingMap[stu.id].skillScore : ''}">
                            </td>
                            <td>
                                <input type="number" step="0.1" min="0" max="100"
                                       name="theoryList" placeholder="—"
                                       th:value="${existingMap[stu.id] != null ? existingMap[stu.id].theoryScore : ''}">
                            </td>
                            <td>
                                <input type="text" name="remarkList" placeholder="—"
                                       th:value="${existingMap[stu.id] != null ? existingMap[stu.id].remark : ''}">
                            </td>
                            <td style="text-align:center;font-weight:600">
                                <span th:if="${existingMap[stu.id] != null and existingMap[stu.id].totalScore != null}"
                                      th:text="${existingMap[stu.id].totalScore}"></span>
                                <span th:unless="${existingMap[stu.id] != null and existingMap[stu.id].totalScore != null}"
                                      style="color:#ddd">—</span>
                            </td>
                            <td style="text-align:center">
                                <span th:if="${existingMap[stu.id] != null and existingMap[stu.id].level != null}"
                                      th:text="${existingMap[stu.id].level}"
                                      th:class="'level-badge level-' + ${existingMap[stu.id].level}"></span>
                                <span th:unless="${existingMap[stu.id] != null and existingMap[stu.id].level != null}"
                                      style="color:#ddd;font-size:.78rem">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="save-bar">
                <button type="submit" class="btn btn-primary">💾 保存全班成绩</button>
                <span class="info-tip">
                    共 <strong th:text="${#lists.size(students)}"></strong> 名学生 &nbsp;·&nbsp;
                    学年 <strong th:text="${academicYear}"></strong> &nbsp;·&nbsp;
                    <strong th:text="${semester}"></strong>
                    &nbsp;·&nbsp; 空白项保持不变，已填项将覆盖原记录
                </span>
            </div>
        </form>
    </th:block>

    <div th:if="${classId == null}" class="empty-state" style="margin-top:2rem">
        <p>请先选择班级、填写学年后点击"查询"</p>
    </div>
    <div th:if="${classId != null and #lists.isEmpty(students)}" class="empty-state" style="margin-top:2rem">
        <p>该班级暂无学生</p>
    </div>
</div>
<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 陈胜松 版权所有</span>
</footer>
</body>
</html>
