<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .msg-wrap { max-width: 860px; margin: 24px auto; padding: 0 16px; }
        .hero-card { background: linear-gradient(135deg, #2563eb, #60a5fa); color: #fff; border-radius: 16px; padding: 20px 22px; box-shadow: 0 12px 28px rgba(37,99,235,.18); margin-bottom: 16px; }
        .hero-card h2 { margin: 0; font-size: 1.25rem; }
        .hero-card p { margin: 6px 0 0; opacity: .92; font-size: .88rem; line-height: 1.6; }
        .hero-badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px; background:rgba(255,255,255,.18); font-size:.78rem; font-weight:700; margin-left:10px; }
        .msg-card { background:#fff; border-radius:14px; box-shadow:0 6px 18px rgba(15,23,42,.06); margin-bottom:12px; overflow:hidden; border:1px solid #e8eef5; border-left:4px solid #d1d5db; }
        .msg-card.unread { border-left-color:#2563eb; }
        .msg-card.request-pending { border-left-color:#f59e0b; }
        .msg-card.request-approved { border-left-color:#16a34a; }
        .msg-card.request-rejected { border-left-color:#dc2626; }
        .msg-head { padding:14px 18px 12px; display:flex; align-items:center; gap:12px; cursor:pointer; }
        .msg-dot { width:8px; height:8px; border-radius:50%; background:#2563eb; flex-shrink:0; }
        .msg-dot.read { background:#cbd5e1; }
        .msg-from { font-weight:700; font-size:.9rem; color:#1f2937; }
        .msg-subject { font-size:.88rem; color:#475569; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .msg-time { font-size:.78rem; color:#94a3b8; flex-shrink:0; }
        .msg-body { padding:0 18px 14px; font-size:.88rem; color:#475569; line-height:1.7; white-space:pre-wrap; border-top:1px solid #eef2f7; display:none; }
        .msg-actions { padding:0 18px 14px; display:none; gap:8px; flex-wrap:wrap; }
        .badge-req { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.75rem; font-weight:700; }
        .badge-pending  { background:#fff7ed; color:#c2410c; }
        .badge-approved { background:#ecfdf5; color:#166534; }
        .badge-rejected { background:#fef2f2; color:#b91c1c; }
        .empty-card { background:#fff; border-radius:14px; border:1px dashed #d7e2f0; color:#64748b; text-align:center; padding:32px 20px; }
        @media (max-width: 768px) {
            .msg-wrap { margin: 16px auto; padding: 0 12px; }
            .hero-card { padding: 18px 16px; }
            .msg-head { padding: 12px 14px 10px; flex-wrap: wrap; }
            .msg-subject, .msg-time, .msg-actions .btn, .msg-actions form { width: 100%; }
            .msg-subject { white-space: normal; }
            .msg-body, .msg-actions { padding-left: 14px; padding-right: 14px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <a th:href="@{/teacher/profile}">个人主页</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="msg-wrap">
    <div class="hero-card">
        <h2>
            消息中心
            <span th:if="${unreadCount > 0}" class="hero-badge" th:text="${unreadCount} + ' 条未读'"></span>
        </h2>
        <p>查看学生消息、选课申请和处理结果。</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(messages)}" class="empty-card">当前暂无消息</div>

    <div th:each="msg : ${messages}" class="msg-card"
         th:classappend="${!msg.isRead} ? ' unread' :
                         (${msg.type == 'COURSE_REQUEST' and msg.status == 'PENDING'} ? ' request-pending' :
                         (${msg.type == 'COURSE_REQUEST' and msg.status == 'APPROVED'} ? ' request-approved' :
                         (${msg.type == 'COURSE_REQUEST' and msg.status == 'REJECTED'} ? ' request-rejected' : '')))">
        <div class="msg-head" th:onclick="|toggleMsg(${msg.id})|">
            <span class="msg-dot" th:classappend="${msg.isRead} ? ' read'"></span>
            <span class="msg-from" th:text="${msg.senderName}"></span>
            <span class="msg-subject" th:text="${msg.subject}"></span>
            <span th:if="${msg.type == 'COURSE_REQUEST'}" class="badge-req"
                  th:classappend="${msg.status == 'PENDING'} ? ' badge-pending' :
                                  (${msg.status == 'APPROVED'} ? ' badge-approved' : ' badge-rejected')"
                  th:text="${msg.status == 'PENDING'} ? '待处理' :
                            (${msg.status == 'APPROVED'} ? '已同意' : '已拒绝')"></span>
            <span class="msg-time" th:text="${#temporals.format(msg.sentAt,'MM-dd HH:mm')}"></span>
        </div>
        <div class="msg-body" th:id="'body-' + ${msg.id}" th:text="${msg.content}"></div>
        <div class="msg-actions" th:id="'actions-' + ${msg.id}">
            <form th:if="${!msg.isRead}" th:action="@{/teacher/messages/{id}/read(id=${msg.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary btn-sm">标记已读</button>
            </form>
            <form th:if="${msg.type == 'COURSE_REQUEST' and msg.status == 'PENDING'}"
                  th:action="@{/teacher/messages/{id}/approve(id=${msg.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary btn-sm">同意申请</button>
            </form>
            <form th:if="${msg.type == 'COURSE_REQUEST' and msg.status == 'PENDING'}"
                  th:action="@{/teacher/messages/{id}/reject(id=${msg.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-danger btn-sm">拒绝申请</button>
            </form>
        </div>
    </div>
</div>

<script>
function toggleMsg(id) {
    const body = document.getElementById('body-' + id);
    const actions = document.getElementById('actions-' + id);
    const open = body.style.display === 'block';
    body.style.display = open ? 'none' : 'block';
    actions.style.display = open ? 'none' : 'flex';
}
</script>
</body>
</html>
