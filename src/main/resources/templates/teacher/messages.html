<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .msg-wrap { max-width:800px; margin:28px auto; padding:0 16px; }
        .msg-card { background:#fff; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.08); margin-bottom:12px; overflow:hidden; border-left:4px solid #ddd; transition:border-color .2s; }
        .msg-card.unread { border-left-color:#4a90e2; }
        .msg-card.request-pending { border-left-color:#f39c12; }
        .msg-card.request-approved { border-left-color:#27ae60; }
        .msg-card.request-rejected { border-left-color:#e74c3c; }
        .msg-head { padding:14px 20px 10px; display:flex; align-items:center; gap:12px; cursor:pointer; }
        .msg-dot { width:8px; height:8px; border-radius:50%; background:#4a90e2; flex-shrink:0; }
        .msg-dot.read { background:transparent; }
        .msg-from { font-weight:600; font-size:.9rem; color:#333; }
        .msg-subject { font-size:.88rem; color:#555; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .msg-time { font-size:.78rem; color:#aaa; flex-shrink:0; }
        .msg-body { padding:0 20px 14px; font-size:.87rem; color:#555; line-height:1.6; white-space:pre-wrap; border-top:1px solid #f5f5f5; display:none; }
        .msg-actions { padding:0 20px 14px; display:none; gap:8px; flex-wrap:wrap; }
        .badge-req { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
        .badge-pending  { background:#fef3e2; color:#c87c0a; }
        .badge-approved { background:#eafaf1; color:#1a6e3a; }
        .badge-rejected { background:#fdf0f0; color:#9b2525; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <a th:href="@{/teacher/profile}">个人主页</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="msg-wrap">
    <div class="page-header">
        <h2>消息中心
            <span th:if="${unreadCount > 0}"
                  style="font-size:.8rem;background:#e74c3c;color:#fff;border-radius:20px;padding:2px 10px;vertical-align:middle;"
                  th:text="${unreadCount} + ' 条未读'"></span>
        </h2>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(messages)}" class="empty-state"><p>暂无消息</p></div>

    <div th:each="msg : ${messages}" class="msg-card"
         th:classappend="${!msg.isRead} ? ' unread' :
                         (${msg.type == 'COURSE_REQUEST' and msg.status == 'PENDING'} ? ' request-pending' :
                         (${msg.type == 'COURSE_REQUEST' and msg.status == 'APPROVED'} ? ' request-approved' :
                         (${msg.type == 'COURSE_REQUEST' and msg.status == 'REJECTED'} ? ' request-rejected' : '')))">
        <div class="msg-head" th:onclick="|toggleMsg(${msg.id})|">
            <span class="msg-dot" th:classappend="${msg.isRead} ? ' read'"></span>
            <span class="msg-from" th:text="${msg.senderName}"></span>
            <span class="msg-subject" th:text="${msg.subject}"></span>
            <span th:if="${msg.type == 'COURSE_REQUEST'}" class="badge-req"
                  th:classappend="${msg.status == 'PENDING'} ? ' badge-pending' :
                                  (${msg.status == 'APPROVED'} ? ' badge-approved' : ' badge-rejected')"
                  th:text="${msg.status == 'PENDING'} ? '待处理' :
                            (${msg.status == 'APPROVED'} ? '已同意' : '已拒绝')"></span>
            <span class="msg-time" th:text="${#temporals.format(msg.sentAt,'MM-dd HH:mm')}"></span>
        </div>
        <div class="msg-body" th:id="'body-' + ${msg.id}" th:text="${msg.content}"></div>
        <div class="msg-actions" th:id="'actions-' + ${msg.id}">
            <!-- 标记已读 -->
            <form th:if="${!msg.isRead}" th:action="@{/teacher/messages/{id}/read(id=${msg.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary btn-sm">标记已读</button>
            </form>
            <!-- 选课申请审批 -->
            <form th:if="${msg.type == 'COURSE_REQUEST' and msg.status == 'PENDING'}"
                  th:action="@{/teacher/messages/{id}/approve(id=${msg.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary btn-sm">同意申请</button>
            </form>
            <form th:if="${msg.type == 'COURSE_REQUEST' and msg.status == 'PENDING'}"
                  th:action="@{/teacher/messages/{id}/reject(id=${msg.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-danger btn-sm">拒绝申请</button>
            </form>
        </div>
    </div>
</div>

<script>
function toggleMsg(id) {
    const body = document.getElementById('body-' + id);
    const actions = document.getElementById('actions-' + id);
    const open = body.style.display === 'block';
    body.style.display = open ? 'none' : 'block';
    actions.style.display = open ? 'none' : 'flex';
}
</script>
</body>
</html>
