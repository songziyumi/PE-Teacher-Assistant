<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课名单 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
        .badge-round1   { background:#2980b9; color:#fff; }
        .badge-round2   { background:#27ae60; color:#fff; }
        .badge-closed   { background:#bdc3c7; color:#fff; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <span class="nav-user" th:text="${currentSchool?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2>选课活动一览</h2>
    </div>

    <div th:if="${#lists.isEmpty(events)}" style="text-align:center;color:#aaa;padding:40px 0;">
        暂无选课活动
    </div>

    <div th:each="event : ${events}" style="background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:18px 22px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <div>
                <h3 style="margin:0 0 4px;font-size:1rem;" th:text="${event.name}"></h3>
                <span style="font-size:.82rem;color:#888;">
                    第一轮：<th:block th:text="${event.round1Start} ? ${#temporals.format(event.round1Start,'MM-dd HH:mm')} : '—'"></th:block>
                    ～ <th:block th:text="${event.round1End} ? ${#temporals.format(event.round1End,'MM-dd HH:mm')} : '—'"></th:block>
                </span>
            </div>
            <span class="badge"
                  th:classappend="${event.status == 'ROUND1'} ? 'badge-round1' :
                                  (${event.status == 'ROUND2'} ? 'badge-round2' : 'badge-closed')"
                  th:text="${event.status == 'ROUND1'} ? '第一轮进行中' :
                            (${event.status == 'ROUND2'} ? '第二轮进行中' :
                            (${event.status == 'PROCESSING'} ? '结算中' :
                            (${event.status == 'DRAFT'} ? '草稿' : '已关闭')))">
            </span>
        </div>

        <!-- 该活动下本教师负责的课程 -->
        <div style="margin-top:12px;">
            <table class="table" style="margin:0;">
                <thead>
                    <tr><th>课程名称</th><th>总名额</th><th>已确认</th><th>操作</th></tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${coursesByEvent[event.id]}">
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.totalCapacity}"></td>
                        <td th:text="${c.currentCount}"></td>
                        <td>
                            <a th:href="@{/teacher/courses/{eid}/courses/{cid}/enrollments(eid=${event.id},cid=${c.id})}"
                               class="btn btn-secondary btn-xs">查看名单</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(coursesByEvent[event.id])}">
                        <td colspan="4" style="color:#aaa;font-size:.85rem;">本活动暂无您负责的课程</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
