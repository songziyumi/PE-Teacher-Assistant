<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级学生 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .wrap {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .stat {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .06);
            padding: 12px 16px;
            min-width: 160px;
        }
        .stat b {
            font-size: 20px;
            color: #1f2937;
        }
        .table-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
            overflow: hidden;
        }
        .table-card table {
            margin: 0;
        }
        .badge {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .male {
            background: #dbeafe;
            color: #1e40af;
        }
        .female {
            background: #fce7f3;
            color: #be185d;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            width: 560px;
            max-width: 94vw;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-head {
            background: #2563eb;
            color: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-body {
            padding: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .full {
            grid-column: 1 / -1;
        }
        .field label {
            display: block;
            margin-bottom: 4px;
            color: #4b5563;
            font-size: 13px;
            font-weight: 600;
        }
        .field input,
        .field select {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding-top: 12px;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="header">
        <h2 th:text="${(schoolClass.grade != null ? schoolClass.grade.name + ' ' : '') + schoolClass.name}">班级</h2>
        <span style="flex:1"></span>
        <a th:href="@{/attendance/class/{id}(id=${schoolClass.id})}" class="btn btn-primary">考勤录入</a>
        <a th:href="@{/dashboard}" class="btn btn-outline">返回首页</a>
    </div>

    <div class="stats">
        <div class="stat">总人数：<b th:text="${#lists.size(students)}">0</b></div>
        <div class="stat">已选课：<b th:text="${withElectiveCount}">0</b></div>
        <div class="stat">未选课：<b th:text="${noElectiveCount}">0</b></div>
    </div>

    <div class="table-card">
        <table class="table">
            <thead>
            <tr>
                <th>姓名</th>
                <th>学号</th>
                <th>性别</th>
                <th>学籍状态</th>
                <th>行政班</th>
                <th>选课班</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.name}">张三</td>
                <td th:text="${s.studentNo ?: '-'}">20240001</td>
                <td>
                    <span class="badge" th:classappend="${s.gender == '女'} ? 'female' : 'male'" th:text="${s.gender ?: '-'}">男</span>
                </td>
                <td th:text="${s.studentStatus ?: '在籍'}">在籍</td>
                <td th:text="${s.schoolClass != null ? ((s.schoolClass.grade != null ? s.schoolClass.grade.name + ' ' : '') + s.schoolClass.name) : '-'}">高一1班</td>
                <td th:text="${s.electiveClass ?: '未选课'}">篮球</td>
                <td>
                    <a th:href="@{/attendance/student/{id}(id=${s.id})}" class="btn btn-sm btn-outline">出勤记录</a>
                    <button type="button" class="btn btn-sm btn-secondary"
                            th:data-id="${s.id}"
                            th:data-name="${s.name}"
                            th:data-gender="${s.gender}"
                            th:data-studentno="${s.studentNo}"
                            th:data-studentstatus="${s.studentStatus ?: '在籍'}"
                            th:data-classid="${s.schoolClass != null ? s.schoolClass.id : ''}"
                            th:data-gradeid="${s.schoolClass != null && s.schoolClass.grade != null ? s.schoolClass.grade.id : ''}"
                            th:data-elective="${s.electiveClass}"
                            onclick="openEdit(this)">
                        编辑
                    </button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="7" style="text-align:center;color:#9ca3af;padding:30px 0">暂无学生</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-head">
            <strong>编辑学生</strong>
            <button type="button" class="btn-link" style="color:#fff" onclick="closeEdit()">关闭</button>
        </div>
        <form id="editForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="classId" th:value="${schoolClass.id}">
            <div class="modal-body">
                <div class="grid">
                    <div class="field">
                        <label>姓名</label>
                        <input type="text" id="editName" name="name" required>
                    </div>
                    <div class="field">
                        <label>性别</label>
                        <select id="editGender" name="gender">
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>学号</label>
                        <input type="text" id="editStudentNo" name="studentNo">
                    </div>
                    <div class="field">
                        <label>学籍状态</label>
                        <select id="editStatus" name="studentStatus">
                            <option th:each="status : ${studentStatuses}" th:value="${status}" th:text="${status}"></option>
                        </select>
                    </div>
                    <div class="field">
                        <label>行政班年级</label>
                        <select id="editAdminGrade" onchange="filterAdminClasses()">
                            <option value="">全部年级</option>
                            <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}"></option>
                        </select>
                    </div>
                    <div class="field">
                        <label>行政班</label>
                        <select id="editClassId" name="newClassId">
                            <option th:each="c : ${adminClasses}" th:value="${c.id}" th:attr="data-grade=${c.grade != null ? c.grade.id : ''}" th:text="${(c.grade != null ? c.grade.name + ' ' : '') + c.name}"></option>
                        </select>
                    </div>
                    <div class="field">
                        <label>选课班年级</label>
                        <select id="editElectiveGrade" onchange="filterElectiveClasses()">
                            <option value="">全部年级</option>
                            <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}"></option>
                        </select>
                    </div>
                    <div class="field">
                        <label>选课班</label>
                        <select id="editElective" name="electiveClass">
                            <option value="">不参加选课</option>
                            <option th:each="ec : ${electiveClasses}" th:value="${(ec.grade != null ? ec.grade.name + '/' : '') + ec.name}" th:attr="data-grade=${ec.grade != null ? ec.grade.id : ''}" th:text="${(ec.grade != null ? ec.grade.name + '/' : '') + ec.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-outline" onclick="closeEdit()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    function openEdit(btn) {
        document.getElementById('editForm').action = '/teacher/students/' + btn.dataset.id + '/edit';
        document.getElementById('editName').value = btn.dataset.name || '';
        document.getElementById('editGender').value = btn.dataset.gender || '男';
        document.getElementById('editStudentNo').value = btn.dataset.studentno || '';
        document.getElementById('editStatus').value = btn.dataset.studentstatus || '在籍';
        document.getElementById('editAdminGrade').value = btn.dataset.gradeid || '';
        filterAdminClasses();
        document.getElementById('editClassId').value = btn.dataset.classid || '';
        document.getElementById('editElective').value = btn.dataset.elective || '';
        document.getElementById('editModal').classList.add('active');
    }
    function closeEdit() {
        document.getElementById('editModal').classList.remove('active');
    }
    function filterAdminClasses() {
        const gradeId = document.getElementById('editAdminGrade').value;
        const classSel = document.getElementById('editClassId');
        Array.from(classSel.options).forEach(opt => {
            opt.hidden = gradeId ? opt.dataset.grade !== gradeId : false;
        });
        if (classSel.selectedOptions.length && classSel.selectedOptions[0].hidden) {
            const first = Array.from(classSel.options).find(o => !o.hidden);
            if (first) classSel.value = first.value;
        }
    }
    function filterElectiveClasses() {
        const gradeId = document.getElementById('editElectiveGrade').value;
        const sel = document.getElementById('editElective');
        Array.from(sel.options).forEach((opt, idx) => {
            if (idx === 0) {
                opt.hidden = false;
                return;
            }
            opt.hidden = gradeId ? opt.dataset.grade !== gradeId : false;
        });
        if (sel.selectedOptions.length && sel.selectedOptions[0].hidden) {
            sel.value = '';
        }
    }
    document.getElementById('editModal').addEventListener('click', function (e) {
        if (e.target === this) closeEdit();
    });
</script>
</body>
</html>
