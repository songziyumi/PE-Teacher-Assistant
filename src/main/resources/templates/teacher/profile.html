<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师个人主页 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page { max-width: 900px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,.08); padding: 20px; margin-bottom: 16px; }
        .header { display: flex; gap: 16px; align-items: center; }
        .avatar { width: 84px; height: 84px; border-radius: 50%; object-fit: cover; border: 2px solid #dbe4ff; }
        .avatar-fallback { width: 84px; height: 84px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: inline-flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; }
        .title h2 { margin: 0 0 4px; font-size: 22px; color: #1f2937; }
        .title p { margin: 0; color: #6b7280; font-size: 13px; }
        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 16px; }
        .stat-card { background: #f8faff; border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; text-decoration: none; display: block; transition: background .15s; }
        .stat-card:hover { background: #e8f0fe; }
        .stat-icon { font-size: 22px; margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-label { font-size: 12px; color: #6b7280; margin-top: 2px; }
        /* 区块标题行 */
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .section-title { font-size: 14px; font-weight: 700; color: #2563eb; margin: 0; }
        /* 查看模式信息行 */
        .info-table { width: 100%; border-collapse: collapse; }
        .info-table tr td { padding: 8px 4px; font-size: 14px; border-bottom: 1px solid #f3f4f6; }
        .info-table tr:last-child td { border-bottom: none; }
        .info-table td:first-child { color: #6b7280; width: 90px; }
        /* 编辑表单 */
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #4b5563; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 9px 10px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .full { grid-column: 1 / -1; }
        .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }
        /* 密码折叠行 */
        .pw-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 4px 0; user-select: none; }
        .pw-toggle span { font-size: 14px; font-weight: 600; color: #2563eb; }
        .pw-toggle .chevron { transition: transform .2s; display: inline-block; }
        .pw-toggle.open .chevron { transform: rotate(90deg); }
        /* 最近操作 */
        .activity-list { list-style: none; margin: 0; padding: 0; }
        .activity-list li { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
        .activity-list li:last-child { border-bottom: none; }
        .activity-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
        .dot-approve { background: #27ae60; }
        .dot-reject { background: #e74c3c; }
        .activity-time { margin-left: auto; color: #9ca3af; white-space: nowrap; font-size: 12px; }
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <a th:href="@{/teacher/messages}">消息</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="page">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- 头像 + 基本信息 + 统计卡片 -->
    <div class="card">
        <div class="header">
            <img th:if="${teacher.photoUrl != null}" class="avatar" th:src="${teacher.photoUrl}" alt="头像">
            <div th:if="${teacher.photoUrl == null}" class="avatar-fallback" th:text="${#strings.substring(teacher.name,0,1)}">T</div>
            <div class="title">
                <h2 th:text="${teacher.name}">教师姓名</h2>
                <p th:text="${teacher.role} + ' · ' + (${teacher.school != null ? teacher.school.name : ''})">TEACHER</p>
            </div>
        </div>
        <!-- 统计卡片（JS 渲染） -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card" style="cursor:default"><div class="stat-icon">📊</div><div class="stat-value" style="font-size:14px;color:#9ca3af">加载中…</div></div>
        </div>
    </div>

    <!-- 个人资料卡：查看 / 编辑模式 -->
    <div class="card">
        <div class="section-header">
            <p class="section-title">个人资料</p>
            <button type="button" id="editToggleBtn" class="btn btn-sm btn-outline" onclick="enterEditMode()">✏️ 编辑</button>
        </div>

        <!-- 查看模式 -->
        <div id="viewMode">
            <table class="info-table">
                <tr><td>性别</td><td th:text="${teacher.gender != null ? teacher.gender : '未设置'}">—</td></tr>
                <tr><td>出生年月</td><td th:text="${teacher.birthDate != null ? teacher.birthDate : '未设置'}">—</td></tr>
                <tr><td>专业特长</td><td th:text="${teacher.specialty != null ? teacher.specialty : '未设置'}">—</td></tr>
                <tr><td>邮箱</td><td th:text="${teacher.email != null ? teacher.email : '未设置'}">—</td></tr>
                <tr><td>自我介绍</td><td th:text="${teacher.bio != null ? teacher.bio : '未设置'}" style="white-space:pre-wrap">—</td></tr>
            </table>
        </div>

        <!-- 编辑模式（默认隐藏） -->
        <div id="editMode" style="display:none">
            <form th:action="@{/teacher/profile/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="grid">
                    <div class="form-group full">
                        <label>头像上传</label>
                        <input type="file" name="photo" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>性别</label>
                        <select name="gender">
                            <option value="" th:selected="${teacher.gender == null || teacher.gender == ''}">未填写</option>
                            <option value="男" th:selected="${teacher.gender == '男'}">男</option>
                            <option value="女" th:selected="${teacher.gender == '女'}">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>出生年月</label>
                        <input type="date" name="birthDate" th:value="${teacher.birthDate}">
                    </div>
                    <div class="form-group">
                        <label>专业特长</label>
                        <input type="text" name="specialty" th:value="${teacher.specialty}" placeholder="如：篮球、田径、羽毛球">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" name="email" th:value="${teacher.email}" placeholder="example@school.edu">
                    </div>
                    <div class="form-group full">
                        <label>自我介绍</label>
                        <textarea name="bio" placeholder="介绍你的教学理念、经验与擅长方向" th:text="${teacher.bio}"></textarea>
                    </div>
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-outline" onclick="cancelEditMode()">取消</button>
                    <button type="submit" class="btn btn-primary">保存资料</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 密码修改：默认折叠 -->
    <div class="card">
        <div class="pw-toggle" id="pwToggle" onclick="togglePassword()">
            <span>🔒 修改密码</span>
            <span class="chevron">›</span>
        </div>
        <div id="pwForm" style="display:none;margin-top:14px">
            <form th:action="@{/teacher/profile/change-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="grid">
                    <div class="form-group">
                        <label>当前密码</label>
                        <input type="password" name="oldPassword" required>
                    </div>
                    <div class="form-group">
                        <label>新密码</label>
                        <input type="password" name="newPassword" required placeholder="至少8位，包含字母和数字">
                    </div>
                    <div class="form-group">
                        <label>确认新密码</label>
                        <input type="password" name="confirmPassword" required>
                    </div>
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-outline" onclick="togglePassword()">取消</button>
                    <button type="submit" class="btn btn-primary">更新密码</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 最近操作（JS 渲染） -->
    <div class="card" id="activitiesCard" style="display:none">
        <p class="section-title" style="margin-bottom:10px">最近操作</p>
        <ul class="activity-list" id="activitiesList"></ul>
    </div>
</div>

<script>
// ===== 查看/编辑模式 =====
function enterEditMode() {
    document.getElementById('viewMode').style.display = 'none';
    document.getElementById('editMode').style.display = '';
    document.getElementById('editToggleBtn').style.display = 'none';
}
function cancelEditMode() {
    document.getElementById('editMode').style.display = 'none';
    document.getElementById('viewMode').style.display = '';
    document.getElementById('editToggleBtn').style.display = '';
}

// ===== 密码折叠 =====
function togglePassword() {
    const form = document.getElementById('pwForm');
    const toggle = document.getElementById('pwToggle');
    const open = form.style.display === 'none';
    form.style.display = open ? '' : 'none';
    toggle.classList.toggle('open', open);
}

// ===== 统计卡片 =====
const STAT_DEFS = [
    { key: 'classCount',           label: '带班数',   icon: '🏫', unit: '个', color: '#2563eb', href: '/dashboard' },
    { key: 'monthlyAttendanceCount', label: '本月考勤', icon: '✅', unit: '次', color: '#27ae60', href: null },
    { key: 'pendingRequestCount',  label: '待审批',   icon: '⏳', unit: '条', color: '#e67e22', href: '/teacher/courses' },
    { key: 'processedRequestCount',label: '已处理',   icon: '✔️', unit: '条', color: '#8e44ad', href: '/teacher/courses' },
];

function renderStats(data) {
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = '';
    STAT_DEFS.forEach(def => {
        const val = data[def.key] ?? 0;
        const el = def.href
            ? `<a class="stat-card" href="${def.href}">`
            : `<div class="stat-card" style="cursor:default">`;
        const close = def.href ? '</a>' : '</div>';
        grid.innerHTML += el
            + `<div class="stat-icon">${def.icon}</div>`
            + `<div class="stat-value" style="color:${def.color}">${val}<small style="font-size:13px;color:#9ca3af;font-weight:400"> ${def.unit}</small></div>`
            + `<div class="stat-label">${def.label}</div>`
            + close;
    });
}

function renderActivities(activities) {
    if (!activities || activities.length === 0) return;
    const card = document.getElementById('activitiesCard');
    const list = document.getElementById('activitiesList');
    card.style.display = '';
    activities.forEach(a => {
        const isApprove = a.action === 'APPROVE';
        const li = document.createElement('li');
        li.innerHTML = `<span class="activity-dot ${isApprove ? 'dot-approve' : 'dot-reject'}"></span>`
            + `<span>${isApprove ? '同意' : '拒绝'}了 <b>${a.studentName || '-'}</b> 申请${a.courseName ? ' ' + a.courseName : ''}`
            + (a.remark ? `<br><small style="color:#9ca3af">${a.remark}</small>` : '')
            + `</span>`
            + `<span class="activity-time">${a.time || ''}</span>`;
        list.appendChild(li);
    });
}

fetch('/teacher/profile/stats', {credentials: 'same-origin'})
    .then(r => r.json())
    .then(data => {
        renderStats(data);
        renderActivities(data.recentActivities);
    })
    .catch(() => {
        document.getElementById('statsGrid').innerHTML =
            '<div style="grid-column:1/-1;color:#9ca3af;font-size:13px">统计数据加载失败</div>';
    });

// 如果有 error/success flash 且 passwordError，展开密码区
(function() {
    const err = document.querySelector('.alert-error');
    if (err && err.textContent.includes('密码')) togglePassword();
})();
</script>
</body>
</html>
