<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-wrap { max-width:680px; margin:32px auto; padding:0 16px; }
        .profile-card { background:#fff; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.09); overflow:hidden; }
        .profile-header { background:linear-gradient(135deg,#4a90e2,#7bb8f5); padding:32px 32px 24px; display:flex; align-items:center; gap:24px; }
        .profile-avatar { width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,.6); background:#dfe6f0; flex-shrink:0; }
        .profile-avatar-placeholder { width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; font-size:2.2rem; flex-shrink:0; }
        .profile-header-info h2 { color:#fff; margin:0 0 4px; font-size:1.3rem; }
        .profile-header-info p { color:rgba(255,255,255,.85); margin:0; font-size:.88rem; }
        .profile-body { padding:28px 32px; }
        .form-section { margin-bottom:24px; }
        .form-section-title { font-weight:700; font-size:.88rem; color:#4a90e2; text-transform:uppercase; letter-spacing:.04em; margin-bottom:12px; padding-bottom:6px; border-bottom:2px solid #e8f0fd; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .form-grid.single { grid-template-columns:1fr; }
        .form-group label { display:block; font-size:.83rem; font-weight:600; color:#555; margin-bottom:.3rem; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:.48rem .75rem; border:1px solid #ddd; border-radius:7px; font-size:.9rem; box-sizing:border-box; font-family:inherit; }
        .form-group textarea { resize:vertical; min-height:100px; }
        .age-hint { font-size:.78rem; color:#aaa; margin-top:3px; }
        .photo-preview-wrap { display:flex; align-items:center; gap:16px; margin-bottom:12px; }
        .photo-preview { width:70px; height:70px; border-radius:50%; object-fit:cover; border:2px solid #ddd; background:#f4f6fb; }
        .photo-label { font-size:.83rem; color:#666; }
        .nav-links a { color:#4a90e2; text-decoration:none; font-size:.9rem; }
        .nav-links a + a { margin-left:16px; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <a th:href="@{/teacher/messages}">消息</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="profile-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <div class="profile-card">
        <div class="profile-header">
            <div th:if="${teacher.photoUrl != null}" class="profile-avatar-placeholder">
                <img th:src="${teacher.photoUrl}" alt="头像" class="profile-avatar" style="width:90px;height:90px;">
            </div>
            <div th:if="${teacher.photoUrl == null}" class="profile-avatar-placeholder">👤</div>
            <div class="profile-header-info">
                <h2 th:text="${teacher.name}"></h2>
                <p th:text="${teacher.role} + ' · ' + (${teacher.school?.name} ?: '')"></p>
            </div>
        </div>

        <div class="profile-body">
            <form th:action="@{/teacher/profile/save}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- 照片上传 -->
                <div class="form-section">
                    <div class="form-section-title">个人风采照片</div>
                    <div class="photo-preview-wrap">
                        <img th:if="${teacher.photoUrl != null}" th:src="${teacher.photoUrl}"
                             alt="当前照片" class="photo-preview" id="photoPreview">
                        <div th:if="${teacher.photoUrl == null}"
                             style="width:70px;height:70px;border-radius:50%;background:#f4f6fb;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:1.6rem;">👤</div>
                        <div>
                            <input type="file" name="photo" accept="image/*" id="photoInput"
                                   onchange="previewPhoto(this)" style="font-size:.85rem;">
                            <div class="photo-label">支持 JPG / PNG / WebP，建议正方形头像</div>
                        </div>
                    </div>
                </div>

                <!-- 基本信息 -->
                <div class="form-section">
                    <div class="form-section-title">基本信息</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>性别</label>
                            <select name="gender">
                                <option value="">未填写</option>
                                <option value="男" th:selected="${teacher.gender == '男'}">男</option>
                                <option value="女" th:selected="${teacher.gender == '女'}">女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>出生日期</label>
                            <input type="date" name="birthDate"
                                   th:value="${teacher.birthDate}" id="birthDate" onchange="calcAge()">
                            <div class="age-hint" id="ageHint"
                                 th:text="${teacher.birthDate != null} ? ('年龄：' + ${#dates.year(#dates.createNow())} + ' − ' + ${#temporals.year(teacher.birthDate)} + ' = 约 ' + (${#dates.year(#dates.createNow())} - ${#temporals.year(teacher.birthDate)}) + ' 岁') : ''"></div>
                        </div>
                        <div class="form-group">
                            <label>专业特长</label>
                            <input type="text" name="specialty" th:value="${teacher.specialty}"
                                   placeholder="如：篮球、田径、羽毛球">
                        </div>
                        <div class="form-group">
                            <label>电子邮箱</label>
                            <input type="email" name="email" th:value="${teacher.email}"
                                   placeholder="example@school.edu">
                        </div>
                    </div>
                </div>

                <!-- 个人简介 -->
                <div class="form-section">
                    <div class="form-section-title">个人简介</div>
                    <div class="form-grid single">
                        <div class="form-group">
                            <textarea name="bio" placeholder="介绍一下自己的教学理念、经历和擅长方向…" th:text="${teacher.bio}"></textarea>
                        </div>
                    </div>
                </div>

                <div style="text-align:right;">
                    <button type="submit" class="btn btn-primary">保存个人主页</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function previewPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            let preview = document.getElementById('photoPreview');
            if (!preview) {
                preview = document.createElement('img');
                preview.id = 'photoPreview';
                preview.className = 'photo-preview';
                input.closest('.photo-preview-wrap').prepend(preview);
                input.closest('.photo-preview-wrap').querySelector('div[style]')?.remove();
            }
            preview.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}
function calcAge() {
    const bd = document.getElementById('birthDate').value;
    const hint = document.getElementById('ageHint');
    if (bd) {
        const age = new Date().getFullYear() - new Date(bd).getFullYear();
        hint.textContent = '年龄：约 ' + age + ' 岁';
    } else {
        hint.textContent = '';
    }
}
</script>
</body>
</html>
