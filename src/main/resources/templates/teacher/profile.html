<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师个人主页 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
            padding: 20px;
            margin-bottom: 16px;
        }
        .header {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
        }
        .avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            background: #eef2ff;
            border: 2px solid #dbe4ff;
        }
        .avatar-fallback {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: #dbeafe;
            color: #1d4ed8;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
        }
        .title h2 {
            margin: 0 0 6px;
            font-size: 22px;
            color: #1f2937;
        }
        .title p {
            margin: 0;
            color: #6b7280;
            font-size: 13px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #2563eb;
            margin-bottom: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #4b5563;
            font-weight: 600;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 14px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .full {
            grid-column: 1 / -1;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
        }
        @media (max-width: 720px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <a th:href="@{/teacher/messages}">消息</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="page">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card">
        <div class="header">
            <img th:if="${teacher.photoUrl != null}" class="avatar" th:src="${teacher.photoUrl}" alt="头像">
            <div th:if="${teacher.photoUrl == null}" class="avatar-fallback" th:text="${#strings.substring(teacher.name,0,1)}">T</div>
            <div class="title">
                <h2 th:text="${teacher.name}">教师姓名</h2>
                <p th:text="${teacher.role} + ' · ' + (${teacher.school != null ? teacher.school.name : ''})">TEACHER</p>
            </div>
        </div>

        <form th:action="@{/teacher/profile/save}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="section-title">个人资料</div>
            <div class="grid">
                <div class="form-group full">
                    <label>头像上传</label>
                    <input type="file" name="photo" accept="image/*">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select name="gender">
                        <option value="" th:selected="${teacher.gender == null || teacher.gender == ''}">未填写</option>
                        <option value="男" th:selected="${teacher.gender == '男'}">男</option>
                        <option value="女" th:selected="${teacher.gender == '女'}">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>出生年月</label>
                    <input type="date" name="birthDate" th:value="${teacher.birthDate}">
                </div>
                <div class="form-group">
                    <label>专业特长</label>
                    <input type="text" name="specialty" th:value="${teacher.specialty}" placeholder="如：篮球、田径、羽毛球">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" th:value="${teacher.email}" placeholder="example@school.edu">
                </div>
                <div class="form-group full">
                    <label>自我介绍</label>
                    <textarea name="bio" placeholder="介绍你的教学理念、经验与擅长方向" th:text="${teacher.bio}"></textarea>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-primary">保存资料</button>
            </div>
        </form>
    </div>

    <div class="card">
        <form th:action="@{/teacher/profile/change-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="section-title">修改密码</div>
            <div class="grid">
                <div class="form-group">
                    <label>当前密码</label>
                    <input type="password" name="oldPassword" required>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="newPassword" required placeholder="至少8位，包含字母和数字">
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" name="confirmPassword" required>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn btn-primary">更新密码</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
