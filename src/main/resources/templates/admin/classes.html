<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年级班级管理 - 管理后台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .admin-wrap { max-width: 1180px; margin: 24px auto; padding: 0 16px 28px; }
        .hero-card {
            background: linear-gradient(135deg, #0f172a, #334155);
            color: #fff;
            border-radius: 18px;
            padding: 22px 24px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, .18);
            margin-bottom: 16px;
        }
        .hero-card h2 { margin: 0; font-size: 1.3rem; }
        .hero-card p { margin: 8px 0 0; opacity: .9; font-size: .9rem; line-height: 1.65; max-width: 720px; }
        .content-card {
            background: #fff;
            border: 1px solid #e8eef5;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .fold-section + .fold-section { border-top: 1px solid #eef2f7; }
        .fold-section summary {
            list-style: none;
            cursor: pointer;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
        }
        .fold-section summary::-webkit-details-marker { display: none; }
        .fold-section summary::after {
            content: '展开';
            color: #2563eb;
            font-size: .82rem;
            font-weight: 600;
        }
        .fold-section[open] summary::after { content: '收起'; }
        .fold-body { padding: 0 20px 20px; }
        .toolbar {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .search-bar,
        .class-search-form,
        .class-danger-form {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-bar input,
        .class-search-form input,
        .class-search-form select,
        .class-danger-form input,
        .modal-body input,
        .modal-body select {
            min-height: 42px;
            padding: 0 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: .92rem;
            background: #fff;
            box-sizing: border-box;
        }
        .class-search-form { flex: 1 1 720px; }
        .class-search-form > * { flex: 1 1 120px; min-width: 0; }
        .class-search-form .btn { flex: 0 0 auto; }
        .class-danger-form { flex: 0 1 auto; }
        .danger-verify-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            width: 100%;
        }
        .danger-verify-row .verify-code-tag {
            flex: 0 0 auto;
        }
        .danger-verify-row input[type="text"] {
            flex: 1 1 auto;
            min-width: 0;
        }
        .grade-add-form {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            margin-bottom: 12px;
        }
        .grade-add-form input {
            flex: 1 1 auto;
            min-width: 0;
        }
        .grade-add-form .btn {
            flex: 0 0 auto;
            white-space: nowrap;
        }
        .grade-table {
            width: 100%;
            table-layout: fixed;
        }
        .grade-table th,
        .grade-table td {
            vertical-align: middle;
        }
        .grade-name-col { width: auto; }
        .grade-action-col { width: 72px; }
        .grade-edit-form {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }
        .grade-edit-form input {
            flex: 1 1 auto;
            min-width: 0;
            max-width: 180px;
            min-height: 36px;
            padding: 0 8px;
            font-size: .86rem;
        }
        .grade-edit-form .btn,
        .grade-delete-form .btn {
            flex: 0 0 auto;
            min-height: 36px;
            padding: 0 8px;
            white-space: nowrap;
            font-size: .78rem;
        }
        .grade-empty {
            text-align: center;
            color: #94a3b8;
        }
        .verify-code-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            min-width: 82px;
            padding: 0 14px;
            border-radius: 10px;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            color: #334155;
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table { margin-bottom: 0; }
        .table td, .table th { white-space: nowrap; }
        .pagination {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .pagination a, .pagination span {
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: .82rem;
            text-decoration: none;
            color: #334155;
            background: #fff;
        }
        .pagination a:hover { border-color: #2563eb; background: #eff6ff; }
        .pagination .active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .pagination .disabled { color: #94a3b8; pointer-events: none; }
        .page-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .jump-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            white-space: nowrap;
            color: #475569;
            font-size: .82rem;
        }
        .jump-wrap input {
            width: 58px;
            min-height: 34px;
            padding: 0 8px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .46);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            width: 460px;
            max-width: calc(100vw - 20px);
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(15, 23, 42, .22);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: linear-gradient(135deg, #0f172a, #334155);
            color: #fff;
        }
        .modal-header h3 { margin: 0; font-size: 1rem; }
        .modal-close {
            border: none;
            background: none;
            color: rgba(255, 255, 255, .82);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-body {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 18px;
            border-top: 1px solid #eef2f7;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #475569;
            font-size: .84rem;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .admin-wrap { margin: 16px auto 24px; padding: 0 12px 24px; }
            .hero-card { padding: 18px 16px; }
            .fold-section summary,
            .fold-body { padding-left: 16px; padding-right: 16px; }
            .toolbar,
            .search-bar,
            .class-danger-form,
            .page-toolbar,
            .modal-footer {
                flex-direction: column;
                align-items: stretch;
            }
            .class-search-form,
            .class-danger-form { flex: none; }
            .class-search-form {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                align-items: center;
            }
            .class-search-form input,
            .class-search-form select {
                min-height: 38px;
                padding: 0 10px;
                font-size: .84rem;
            }
            .class-search-form .btn {
                min-height: 38px;
                font-size: .78rem;
                padding: 0 10px;
            }
            .class-danger-form {
                gap: 8px;
            }
            .danger-verify-row {
                width: 100%;
            }
            .danger-verify-row .verify-code-tag {
                width: auto;
                min-width: 74px;
            }
            .danger-verify-row input[type="text"] {
                width: auto;
                min-height: 38px;
                padding: 0 10px;
                font-size: .84rem;
            }
            .class-danger-form > *,
            .page-toolbar > *,
            .modal-footer > * {
                width: 100%;
                margin-left: 0;
            }
            .class-search-form > * {
                width: auto;
                min-width: 0;
                margin-left: 0;
            }
            .grade-add-form {
                flex-direction: row;
                align-items: center;
                gap: 6px;
            }
            .grade-add-form input {
                width: auto;
                min-height: 38px;
                padding: 0 10px;
            }
            .grade-add-form .btn {
                width: auto;
                min-height: 38px;
                padding: 0 10px;
                font-size: .78rem;
            }
            .grade-table {
                font-size: .88rem;
            }
            .grade-action-col {
                width: 64px;
            }
            .grade-table th,
            .grade-table td {
                padding: 9px 6px;
            }
            .grade-edit-form {
                gap: 5px;
            }
            .grade-edit-form input {
                max-width: 120px;
                min-height: 34px;
                padding: 0 6px;
                font-size: .8rem;
            }
            .grade-edit-form .btn,
            .grade-delete-form .btn {
                min-height: 34px;
                padding: 0 6px;
                font-size: .72rem;
            }
            .jump-wrap {
                margin-left: 0;
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">管理后台</div>
    <div class="nav-links">
        <a th:href="@{/admin}">后台首页</a>
        <a th:href="@{/dashboard}">工作台</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="admin-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="hero-card">
        <h2>年级班级管理</h2>
        <p>统一处理年级、班级和教师归属关系，支持筛选、分页、新增和批量清理等后台维护操作。</p>
    </div>

    <div class="content-card">
        <details class="fold-section">
            <summary>年级管理</summary>
            <div class="fold-body">
                <form th:action="@{/admin/grades/add}" method="post" class="grade-add-form">
                    <input type="text" name="name" placeholder="年级名称，如：高一" required>
                    <button type="submit" class="btn btn-primary">添加年级</button>
                </form>
                <div class="table-wrap">
                    <table class="table grade-table">
                        <thead>
                        <tr>
                            <th class="grade-name-col">年级名称</th>
                            <th class="grade-action-col">操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(grades)}">
                            <td colspan="2" class="grade-empty">当前暂无年级数据</td>
                        </tr>
                        <tr th:each="g : ${grades}">
                            <td>
                                <form th:action="@{/admin/grades/edit/{id}(id=${g.id})}" method="post" class="grade-edit-form">
                                    <input type="text" name="name" th:value="${g.name}" required>
                                    <button type="submit" class="btn btn-sm btn-secondary">保存</button>
                                </form>
                            </td>
                            <td>
                                <form th:action="@{/admin/grades/delete/{id}(id=${g.id})}" method="post" class="grade-delete-form"
                                      th:data-grade-name="${g.name}"
                                      onsubmit="return confirmDeleteGrade(this)">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-danger">删除</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </details>

        <details class="fold-section" open>
            <summary>班级管理</summary>
            <div class="fold-body">
                <div class="toolbar">
                    <form method="get" th:action="@{/admin/classes}" class="class-search-form">
                        <select name="type">
                            <option value="" th:selected="${type == ''}">全部类型</option>
                            <option value="行政班" th:selected="${type == '行政班'}">行政班</option>
                            <option value="选修课" th:selected="${type == '选修课'}">选修课</option>
                        </select>
                        <select name="gradeId">
                            <option value="" th:selected="${gradeId == null}">全部年级</option>
                            <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}"
                                    th:selected="${gradeId != null && gradeId == g.id}"></option>
                        </select>
                        <input type="text" name="name" th:value="${name}" placeholder="班级名称">
                        <button type="submit" class="btn btn-secondary">搜索</button>
                        <a th:href="@{/admin/classes}" class="btn btn-outline">重置</a>
                        <button type="button" class="btn btn-primary" onclick="openModal()">添加班级</button>
                    </form>

                    <form th:action="@{/admin/classes/delete-all}" method="post" class="class-danger-form"
                          onsubmit="return confirm('确认删除全部班级数据？此操作不可恢复！')">
                        <div class="danger-verify-row">
                        <span class="verify-code-tag" th:text="${deleteAllClassesCode}"></span>
                        <input type="text" name="verifyCode" inputmode="numeric" maxlength="5" placeholder="验证码">
                        </div>
                        <input type="hidden" name="returnType" th:value="${type}">
                        <input type="hidden" name="returnGradeId" th:value="${gradeId}">
                        <input type="hidden" name="returnName" th:value="${name}">
                        <input type="hidden" name="returnPage" th:value="${classPage.number}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-danger">删除全部</button>
                    </form>
                </div>

                <div class="table-wrap">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>类型</th>
                            <th>年级</th>
                            <th>班级</th>
                            <th>任课教师</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${classPage.content}">
                            <td>
                                <span th:if="${c.type == '选修课'}" class="badge badge-elective">选修课</span>
                                <span th:unless="${c.type == '选修课'}" class="badge badge-admin">行政班</span>
                            </td>
                            <td th:text="${c.grade != null ? c.grade.name : '-'}"></td>
                            <td th:text="${c.name}"></td>
                            <td th:text="${c.teacher != null ? c.teacher.name : '未分配'}"></td>
                            <td>
                                <a th:href="@{/admin/students/class/{id}(id=${c.id})}" class="btn btn-sm btn-primary">学生</a>
                                <form th:action="@{/admin/classes/delete/{id}(id=${c.id})}" method="post" style="display:inline"
                                      onsubmit="return confirm('确认删除？')">
                                    <input type="hidden" name="returnType" th:value="${type}">
                                    <input type="hidden" name="returnGradeId" th:value="${gradeId}">
                                    <input type="hidden" name="returnName" th:value="${name}">
                                    <input type="hidden" name="returnPage" th:value="${classPage.number}">
                                    <button type="submit" class="btn btn-sm btn-danger">删除</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <input type="hidden" id="pg-current" th:value="${classPage.number}">
                <input type="hidden" id="pg-total" th:value="${classPage.totalPages}">
                <input type="hidden" id="pg-type" th:value="${type}">
                <input type="hidden" id="pg-gradeId" th:value="${gradeId}">
                <input type="hidden" id="pg-name" th:value="${name}">

                <div class="page-toolbar" th:if="${classPage.totalPages > 0}">
                    <span style="font-size:.82rem;color:#475569;white-space:nowrap;"
                          th:text="'共 ' + ${classPage.totalElements} + ' 个班级，共 ' + ${classPage.totalPages} + ' 页'"></span>
                    <div class="pagination" id="pagination" th:if="${classPage.totalPages > 1}" style="flex:1;">
                        <a id="pg-prev">上一页</a>
                        <span id="pg-numbers"></span>
                        <a id="pg-next">下一页</a>
                    </div>
                    <span class="jump-wrap" th:if="${classPage.totalPages > 1}">
                        跳转到
                        <input type="number" id="pg-jump" min="1" th:max="${classPage.totalPages}" placeholder="页">
                        <button onclick="jumpPage()" class="btn btn-sm btn-outline" type="button">GO</button>
                    </span>
                </div>
            </div>
        </details>
    </div>
</div>

<script>
function confirmDeleteGrade(form) {
    var name = form.dataset.gradeName;
    return confirm('确认删除年级「' + name + '」？\n该年级下的所有班级、学生及考勤记录将一并删除，此操作不可恢复！');
}

(function() {
    const pg = document.getElementById('pagination');
    if (!pg) return;
    const current = parseInt(document.getElementById('pg-current').value, 10);
    const total = parseInt(document.getElementById('pg-total').value, 10);
    const type = document.getElementById('pg-type').value;
    const gradeId = document.getElementById('pg-gradeId').value;
    const name = document.getElementById('pg-name').value;

    function url(p) {
        const params = new URLSearchParams();
        if (type) params.set('type', type);
        if (gradeId) params.set('gradeId', gradeId);
        if (name) params.set('name', name);
        params.set('page', p);
        return '/admin/classes?' + params.toString();
    }

    const prev = document.getElementById('pg-prev');
    const next = document.getElementById('pg-next');
    if (current === 0) prev.classList.add('disabled');
    else prev.href = url(current - 1);
    if (current === total - 1) next.classList.add('disabled');
    else next.href = url(current + 1);

    const pages = new Set([0, total - 1]);
    for (let i = Math.max(0, current - 2); i <= Math.min(total - 1, current + 2); i++) pages.add(i);
    const sorted = [...pages].sort((a, b) => a - b);
    let html = '';
    let prev2 = -1;
    for (const p of sorted) {
        if (prev2 !== -1 && p - prev2 > 1) html += '<span style="padding:0 4px;color:#94a3b8;">…</span>';
        html += `<a href="${url(p)}" class="${p === current ? 'active' : ''}">${p + 1}</a>`;
        prev2 = p;
    }
    document.getElementById('pg-numbers').innerHTML = html;
})();

function jumpPage() {
    const total = parseInt(document.getElementById('pg-total').value, 10);
    const val = parseInt(document.getElementById('pg-jump').value, 10);
    if (isNaN(val) || val < 1 || val > total) return;
    const type = document.getElementById('pg-type').value;
    const gradeId = document.getElementById('pg-gradeId').value;
    const name = document.getElementById('pg-name').value;
    const params = new URLSearchParams();
    if (type) params.set('type', type);
    if (gradeId) params.set('gradeId', gradeId);
    if (name) params.set('name', name);
    params.set('page', val - 1);
    location.href = '/admin/classes?' + params.toString();
}
</script>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>添加班级</h3>
            <button class="modal-close" type="button" onclick="closeModal()">×</button>
        </div>
        <form th:action="@{/admin/classes/add}" method="post">
            <input type="hidden" name="returnType" th:value="${type}">
            <input type="hidden" name="returnGradeId" th:value="${gradeId}">
            <input type="hidden" name="returnName" th:value="${name}">
            <input type="hidden" name="returnPage" th:value="${classPage.number}">
            <div class="modal-body">
                <div class="form-group">
                    <label>班级类型</label>
                    <select name="type" required>
                        <option value="行政班">行政班</option>
                        <option value="选修课">选修课</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>年级</label>
                    <select name="gradeId">
                        <option value="">选择年级（可选）</option>
                        <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>班级名称</label>
                    <input type="text" name="name" placeholder="如：1班 或 篮球" required>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">确认添加</button>
            </div>
        </form>
    </div>
</div>

<script>
function openModal() {
    document.getElementById('addModal').classList.add('active');
}
function closeModal() {
    document.getElementById('addModal').classList.remove('active');
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});
</script>

<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 陈胜松 版权所有</span>
</footer>
</body>
</html>
