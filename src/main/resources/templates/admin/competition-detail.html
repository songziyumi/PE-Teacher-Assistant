<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛事详情</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .section { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:16px; margin-bottom:16px; }
        .grid-2 { display:grid; grid-template-columns: 1.2fr .8fr; gap:16px; }
        .form-inline { display:grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap:10px; margin-bottom:12px; }
        .form-inline input, .form-inline select, .form-inline textarea { width:100%; padding:8px 10px; border:1px solid #d1d5db; border-radius:6px; }
        .muted { color:#6b7280; font-size:13px; }
        .tabs { display:flex; gap:8px; margin-bottom:12px; }
        .tab-btn { border:1px solid #d1d5db; background:#fff; padding:8px 14px; border-radius:8px; cursor:pointer; }
        .tab-btn.active { background:#111827; color:#fff; border-color:#111827; }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }
        .row-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .message { min-height:20px; color:#6b7280; font-size:13px; margin-bottom:10px; }
        .message.success { color:#047857; }
        .message.error { color:#b91c1c; }
        .side-card { border:1px solid #e5e7eb; border-radius:10px; padding:12px; margin-top:12px; }
        .danger-link { color:#b91c1c; cursor:pointer; background:none; border:none; padding:0; }
        @media (max-width: 980px) { .grid-2, .form-inline { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin/competitions}">赛事列表</a>
        <a th:href="@{/admin}">管理后台</a>
        <span class="nav-user" th:text="${currentSchool != null ? currentSchool.name : (managedOrg != null ? managedOrg.name : '组织管理员')}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2 th:text="${competition.name}">赛事详情</h2>
    </div>

    <div class="section">
        <div class="muted">赛事编码：<span th:text="${competition.code}"></span></div>
        <div class="muted">级别：<span th:text="${competition.level}"></span>，状态：<span th:text="${competition.status}"></span></div>
        <div class="muted">主办组织：<span th:text="${competition.hostOrg != null ? competition.hostOrg.name : '-'}"></span></div>
        <div class="row-actions" style="margin-top:10px;">
            <select id="competitionStatusSelect">
                <option value="">切换状态</option>
                <option th:each="statusOption : ${competitionStatuses}" th:value="${statusOption.name()}" th:text="${statusOption.name()}"></option>
            </select>
            <button class="btn btn-secondary" type="button" onclick="changeCompetitionStatus()">更新状态</button>
            <span id="pageMsg" class="message"></span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn" th:classappend="${activeTab == 'events'} ? ' active'" onclick="switchTab('events', this)">项目</button>
        <button class="tab-btn" th:classappend="${activeTab == 'registrations'} ? ' active'" onclick="switchTab('registrations', this)">报名</button>
        <button class="tab-btn" th:classappend="${activeTab == 'results'} ? ' active'" onclick="switchTab('results', this)">成绩</button>
    </div>

    <div id="events" class="tab-pane section" th:classappend="${activeTab == 'events'} ? ' active'">
        <h3 style="margin-top:0;">赛事项目</h3>
        <form id="eventForm" class="form-inline">
            <input name="name" placeholder="项目名称" required>
            <input name="eventCode" placeholder="项目编码" required>
            <input name="genderLimit" placeholder="性别限制">
            <input name="teamOrIndividual" placeholder="INDIVIDUAL/TEAM" required>
            <input name="groupRule" placeholder="分组规则">
            <input name="maxEntriesPerSchool" placeholder="每校人数">
            <input name="maxEntriesPerDistrict" placeholder="每区人数">
            <div class="row-actions">
                <input name="sortOrder" placeholder="排序" value="10">
                <button type="submit" class="btn btn-primary">新增项目</button>
            </div>
        </form>
        <table class="table">
            <thead><tr><th>项目</th><th>编码</th><th>性别</th><th>类型</th><th>每校</th><th>每区</th></tr></thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(events)}"><td colspan="6" style="text-align:center;color:#6b7280;">暂无项目</td></tr>
            <tr th:each="event : ${events}">
                <td th:text="${event.name}"></td>
                <td th:text="${event.eventCode}"></td>
                <td th:text="${event.genderLimit}"></td>
                <td th:text="${event.teamOrIndividual}"></td>
                <td th:text="${event.maxEntriesPerSchool}"></td>
                <td th:text="${event.maxEntriesPerDistrict}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="registrations" class="tab-pane section" th:classappend="${activeTab == 'registrations'} ? ' active'">
        <div class="grid-2">
            <div>
                <div class="row-actions" style="justify-content:space-between; margin-bottom:12px;">
                    <h3 style="margin:0;">可见报名</h3>
                    <button class="btn btn-primary" type="button" th:if="${canCreateRegistration}" onclick="createRegistration()">创建报名草稿</button>
                </div>
                <table class="table">
                    <thead><tr><th>ID</th><th>学校</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(registrations)}"><td colspan="5" style="text-align:center;color:#6b7280;">暂无报名</td></tr>
                    <tr th:each="registration : ${registrations}">
                        <td th:text="${registration.id}"></td>
                        <td th:text="${registration.applicantSchool != null ? registration.applicantSchool.name : '-'}"></td>
                        <td th:text="${registration.status}"></td>
                        <td th:text="${registration.submittedAt != null ? #temporals.format(registration.submittedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                        <td>
                            <a class="btn btn-secondary btn-sm" th:href="@{/admin/competitions/{id}(id=${competition.id},registrationId=${registration.id},tab='registrations')}">查看</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div>
                <div th:if="${selectedRegistration != null}">
                    <h3 style="margin-top:0;">报名详情 #<span th:text="${selectedRegistration.id}"></span></h3>
                    <div class="muted">状态：<span th:text="${selectedRegistration.status}"></span></div>
                    <div class="muted">审批级别：<span th:text="${selectedRegistration.currentApprovalLevel}"></span></div>
                    <div class="muted" style="margin-bottom:10px;">学校：<span th:text="${selectedRegistration.applicantSchool != null ? selectedRegistration.applicantSchool.name : '-'}"></span></div>

                    <form id="itemForm" class="form-inline" th:if="${canCreateRegistration}">
                        <input type="hidden" name="registrationId" th:value="${selectedRegistration.id}">
                        <select name="studentId">
                            <option value="">选择学生</option>
                            <option th:each="student : ${students}" th:value="${student.id}" th:text="${student.name + ' (' + student.studentNo + ')'}"></option>
                        </select>
                        <select name="competitionEventId">
                            <option value="">选择项目</option>
                            <option th:each="event : ${events}" th:value="${event.id}" th:text="${event.name}"></option>
                        </select>
                        <input name="roleType" placeholder="ATHLETE">
                        <div class="row-actions">
                            <input name="seedResult" placeholder="种子成绩">
                            <button type="submit" class="btn btn-primary">添加条目</button>
                        </div>
                    </form>

                    <table class="table" style="margin-top:12px;">
                        <thead><tr><th>学生</th><th>项目</th><th>种子成绩</th><th>操作</th></tr></thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(registrationItems)}"><td colspan="4" style="text-align:center;color:#6b7280;">暂无条目</td></tr>
                        <tr th:each="item : ${registrationItems}">
                            <td th:text="${item.student.name + ' (' + item.student.studentNo + ')'}"></td>
                            <td th:text="${item.competitionEvent.name}"></td>
                            <td th:text="${item.seedResult}"></td>
                            <td>
                                <button type="button" class="danger-link" th:if="${canCreateRegistration}" th:attr="data-registration-id=${selectedRegistration.id},data-item-id=${item.id}" onclick="removeItem(this.dataset.registrationId, this.dataset.itemId)">删除</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="row-actions" style="margin-top:10px;">
                        <button type="button" class="btn btn-primary" th:if="${canCreateRegistration and (selectedRegistration.status.name() == 'DRAFT' or selectedRegistration.status.name() == 'DISTRICT_REJECTED' or selectedRegistration.status.name() == 'CITY_REJECTED')}" th:attr="data-id=${selectedRegistration.id}" onclick="submitRegistration(this.dataset.id)">提交报名</button>
                        <button type="button" class="btn btn-secondary" th:if="${canReviewAsDistrict and selectedRegistration.status.name() == 'SUBMITTED'}" th:attr="data-id=${selectedRegistration.id}" onclick="reviewRegistration(this.dataset.id, 'district-review', 'APPROVE')">区县通过</button>
                        <button type="button" class="btn btn-secondary" th:if="${canReviewAsDistrict and selectedRegistration.status.name() == 'SUBMITTED'}" th:attr="data-id=${selectedRegistration.id}" onclick="reviewRegistration(this.dataset.id, 'district-review', 'REJECT')">区县驳回</button>
                        <button type="button" class="btn btn-secondary" th:if="${canReviewAsCity and selectedRegistration.status.name() == 'DISTRICT_APPROVED'}" th:attr="data-id=${selectedRegistration.id}" onclick="reviewRegistration(this.dataset.id, 'city-review', 'APPROVE')">市级通过</button>
                        <button type="button" class="btn btn-secondary" th:if="${canReviewAsCity and selectedRegistration.status.name() == 'DISTRICT_APPROVED'}" th:attr="data-id=${selectedRegistration.id}" onclick="reviewRegistration(this.dataset.id, 'city-review', 'REJECT')">市级驳回</button>
                    </div>

                    <div class="side-card">
                        <div class="row-actions" style="justify-content:space-between; margin-bottom:8px;">
                            <strong>审批记录</strong>
                        </div>
                        <div th:if="${#lists.isEmpty(approvalRecords)}" class="muted">暂无审批记录</div>
                        <div th:each="record : ${approvalRecords}" class="muted" style="margin-bottom:8px;">
                            <div><span th:text="${record.approvalLevel}"></span> / <span th:text="${record.decision}"></span></div>
                            <div th:text="${record.approverName != null ? record.approverName : '-'} + ' / ' + ${record.approverOrgName != null ? record.approverOrgName : '-'}"></div>
                            <div th:text="${record.comment != null ? record.comment : '无备注'}"></div>
                        </div>
                    </div>
                </div>

                <div th:if="${selectedRegistration == null}" class="side-card muted">
                    选择一条报名记录后可查看条目、审批记录和审核操作。
                </div>
            </div>
        </div>
    </div>

    <div id="results" class="tab-pane section" th:classappend="${activeTab == 'results'} ? ' active'">
        <div class="row-actions" style="justify-content:space-between; margin-bottom:12px;">
            <h3 style="margin:0;">成绩录入与发布</h3>
            <div class="row-actions">
                <select id="resultEventFilter" onchange="filterResultsByEvent(this.value)">
                    <option value="">全部项目</option>
                    <option th:each="event : ${events}" th:value="${event.id}" th:selected="${selectedEventId != null and selectedEventId == event.id}" th:text="${event.name}"></option>
                </select>
                <button type="button" class="btn btn-secondary" onclick="publishResults()">发布当前成绩</button>
            </div>
        </div>
        <form id="resultForm" class="form-inline" th:if="${canEnterResults}">
            <select name="competitionEventId">
                <option value="">选择项目</option>
                <option th:each="event : ${events}" th:value="${event.id}" th:text="${event.name}"></option>
            </select>
            <select name="studentId">
                <option value="">选择学生</option>
                <option th:each="student : ${students}" th:value="${student.id}" th:text="${student.name + ' (' + student.studentNo + ')'}"></option>
            </select>
            <input name="resultValue" placeholder="成绩值" required>
            <input name="rankNo" placeholder="名次">
            <div class="row-actions">
                <input name="scorePoints" placeholder="积分">
                <button type="submit" class="btn btn-primary">保存成绩</button>
            </div>
        </form>
        <table class="table">
            <thead><tr><th>项目</th><th>学生</th><th>成绩</th><th>名次</th><th>积分</th><th>状态</th></tr></thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(results)}"><td colspan="6" style="text-align:center;color:#6b7280;">暂无成绩</td></tr>
            <tr th:each="result : ${results}">
                <td th:text="${result.competitionEvent.name}"></td>
                <td th:text="${result.student.name + ' (' + result.student.studentNo + ')'}"></td>
                <td th:text="${result.resultValue}"></td>
                <td th:text="${result.rankNo}"></td>
                <td th:text="${result.scorePoints}"></td>
                <td th:text="${result.recordStatus}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script th:inline="javascript">
    const activeTab = [[${activeTab}]];
    const competitionId = [[${competition.id}]];

    function setMessage(id, message, ok) {
        const node = document.getElementById(id);
        if (!node) return;
        node.textContent = message || '';
        node.className = 'message' + (message ? (ok ? ' success' : ' error') : '');
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-pane').forEach(function (pane) { pane.classList.remove('active'); });
        document.querySelectorAll('.tab-btn').forEach(function (item) { item.classList.remove('active'); });
        document.getElementById(id).classList.add('active');
        if (btn) {
            btn.classList.add('active');
        }
        const url = new URL(window.location.href);
        url.searchParams.set('tab', id);
        history.replaceState(null, '', url.toString());
    }

    if (activeTab) {
        const activeButton = Array.from(document.querySelectorAll('.tab-btn')).find(function (item) {
            return item.getAttribute('onclick') && item.getAttribute('onclick').includes("'" + activeTab + "'");
        });
        switchTab(activeTab, activeButton);
    }

    document.getElementById('eventForm')?.addEventListener('submit', async function (e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target).entries());
        const res = await fetch(window.location.pathname + '/events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.code === 200) {
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '新增项目失败', false);
        }
    });

    async function changeCompetitionStatus() {
        const select = document.getElementById('competitionStatusSelect');
        if (!select.value) return;
        const res = await fetch('/api/admin/competition/' + competitionId + '/status', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetStatus: select.value })
        });
        const json = await res.json();
        if (json.code === 200) {
            setMessage('pageMsg', '赛事状态已更新', true);
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '赛事状态更新失败', false);
        }
    }

    async function createRegistration() {
        const res = await fetch(window.location.pathname + '/registrations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ remark: '页面创建' })
        });
        const json = await res.json();
        if (json.code === 200) {
            window.location.href = window.location.pathname + '?registrationId=' + json.data.id + '&tab=registrations';
        } else {
            setMessage('pageMsg', json.message || '创建报名失败', false);
        }
    }

    document.getElementById('itemForm')?.addEventListener('submit', async function (e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target).entries());
        const registrationId = data.registrationId;
        delete data.registrationId;
        const res = await fetch('/api/admin/competition/registrations/' + registrationId + '/items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.code === 200) {
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '添加报名条目失败', false);
        }
    });

    async function removeItem(registrationId, itemId) {
        const res = await fetch('/api/admin/competition/registrations/' + registrationId + '/items/' + itemId, {
            method: 'DELETE'
        });
        const json = await res.json();
        if (json.code === 200) {
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '删除条目失败', false);
        }
    }

    async function submitRegistration(id) {
        const res = await fetch('/api/admin/competition/registrations/' + id + '/submit', { method: 'PUT' });
        const json = await res.json();
        if (json.code === 200) {
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '提交报名失败', false);
        }
    }

    async function reviewRegistration(id, action, decision) {
        const comment = window.prompt('请输入审核备注，可为空：', '') || '';
        const res = await fetch('/api/admin/competition/registrations/' + id + '/' + action, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ decision: decision, comment: comment })
        });
        const json = await res.json();
        if (json.code === 200) {
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '审核失败', false);
        }
    }

    document.getElementById('resultForm')?.addEventListener('submit', async function (e) {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target).entries());
        const res = await fetch(window.location.pathname + '/results', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.code === 200) {
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '保存成绩失败', false);
        }
    });

    function filterResultsByEvent(eventId) {
        const url = new URL(window.location.href);
        url.searchParams.set('tab', 'results');
        if (eventId) {
            url.searchParams.set('eventId', eventId);
        } else {
            url.searchParams.delete('eventId');
        }
        window.location.href = url.toString();
    }

    async function publishResults() {
        const eventId = document.getElementById('resultEventFilter').value;
        const res = await fetch(window.location.pathname + '/results/publish', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(eventId ? { eventId: eventId } : {})
        });
        const json = await res.json();
        if (json.code === 200) {
            window.location.reload();
        } else {
            setMessage('pageMsg', json.message || '发布成绩失败', false);
        }
    }
</script>
</body>
</html>
