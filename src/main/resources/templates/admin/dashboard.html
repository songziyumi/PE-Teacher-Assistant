<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .admin-wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
        .hero-card { background:linear-gradient(135deg,#0f172a,#334155); color:#fff; border-radius:18px; padding:22px 24px; box-shadow:0 14px 30px rgba(15,23,42,.18); margin-bottom:18px; }
        .hero-card h2 { margin:0; font-size:1.3rem; }
        .hero-card p { margin:8px 0 0; opacity:.9; font-size:.9rem; line-height:1.6; max-width:640px; }
        .admin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
        .admin-card { background:#fff; border-radius:14px; padding:20px 16px; text-align:center; box-shadow:0 6px 18px rgba(15,23,42,.06); transition:transform .2s, box-shadow .2s, border-color .2s; color:#1f2937; border:1px solid #e8eef5; }
        .admin-card:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(15,23,42,.1); text-decoration:none; }
        .admin-card-icon { width:48px; height:48px; border-radius:14px; background:#eff6ff; color:#2563eb; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:20px; font-weight:700; }
        .admin-card-title { font-size:14px; font-weight:700; }
        @media (max-width:768px) {
            .admin-wrap { margin:16px auto; padding:0 12px; }
            .hero-card { padding:18px 16px; }
            .admin-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">管理后台</div>
    <div class="nav-links">
        <a th:href="@{/dashboard}">首页</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="admin-wrap">
    <div class="hero-card">
        <h2>管理后台</h2>
        <p>集中处理班级、教师、学生、成绩、体测和选课相关管理任务。</p>
    </div>
    <div class="admin-grid">
        <a th:href="@{/admin/classes}" class="admin-card">
            <div class="admin-card-icon">班</div>
            <div class="admin-card-title">年级班级管理</div>
        </a>
        <a th:href="@{/admin/teachers}" class="admin-card">
            <div class="admin-card-icon">师</div>
            <div class="admin-card-title">教师管理</div>
        </a>
        <a th:href="@{/admin/students}" class="admin-card">
            <div class="admin-card-icon">生</div>
            <div class="admin-card-title">学生管理</div>
        </a>
        <a th:href="@{/admin/student-accounts}" class="admin-card">
            <div class="admin-card-icon">账</div>
            <div class="admin-card-title">学生账号管理</div>
        </a>
        <a th:href="@{/admin/stats}" class="admin-card">
            <div class="admin-card-icon">统</div>
            <div class="admin-card-title">考勤统计</div>
        </a>
        <a th:href="@{/admin/import}" class="admin-card">
            <div class="admin-card-icon">导</div>
            <div class="admin-card-title">数据导入</div>
        </a>
        <a th:href="@{/admin/physical-tests}" class="admin-card">
            <div class="admin-card-icon">测</div>
            <div class="admin-card-title">体质健康测试</div>
        </a>
        <a th:href="@{/admin/term-grades}" class="admin-card">
            <div class="admin-card-icon">绩</div>
            <div class="admin-card-title">期末成绩管理</div>
        </a>
        <a th:href="@{/admin/courses}" class="admin-card">
            <div class="admin-card-icon">课</div>
            <div class="admin-card-title">学生选课管理</div>
        </a>
        <a th:href="@{/admin/course-selection-diagnostics}" class="admin-card">
            <div class="admin-card-icon">诊</div>
            <div class="admin-card-title">抢课诊断面板</div>
        </a>
        <a th:href="@{/admin/teacher-permissions}" class="admin-card">
            <div class="admin-card-icon">权</div>
            <div class="admin-card-title">教师功能权限</div>
        </a>
    </div>
</div>
<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 体育教师助手</span>
</footer>
</body>
</html>
