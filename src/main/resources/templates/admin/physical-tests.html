<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体质健康测试 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.45); z-index: 1000;
            align-items: flex-start; justify-content: center;
            overflow-y: auto; padding: 24px 0;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff; border-radius: 12px; width: 680px;
            max-width: 96vw; box-shadow: 0 8px 32px rgba(0,0,0,.18);
            animation: modalIn .2s ease; margin: auto;
        }
        .modal-wide { width: 520px; }
        @keyframes modalIn {
            from { transform: translateY(-24px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; background: #4a90e2; border-radius: 12px 12px 0 0;
        }
        .modal-header h3 { font-size: 16px; color: #fff; margin: 0; }
        .modal-close {
            background: none; border: none; font-size: 22px;
            color: rgba(255,255,255,.8); cursor: pointer; line-height: 1; padding: 0 4px;
        }
        .modal-close:hover { color: #fff; }
        .modal-body { padding: 20px 24px; }
        .modal-footer {
            display: flex; justify-content: flex-end; gap: 10px;
            padding: 14px 24px; border-top: 1px solid #eee;
        }
        .form-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-grid3 .full, .form-grid2 .full { grid-column: 1 / -1; }
        .form-grid3 .span2 { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; color: #666; font-weight: 500; }
        .form-group input, .form-group select {
            padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; transition: border-color .2s; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #4a90e2; }
        .section-title {
            font-size: 12px; font-weight: 600; color: #4a90e2;
            border-bottom: 1px solid #e8f0fe; padding-bottom: 6px; margin: 14px 0 10px;
            grid-column: 1 / -1;
        }
        .search-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .search-bar input, .search-bar select {
            padding: 7px 11px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; outline: none; min-width: 0;
        }
        .search-bar input:focus, .search-bar select:focus { border-color: #4a90e2; }
        .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 14px; align-items: center; }
        .pagination a, .pagination span {
            padding: 5px 11px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; text-decoration: none; color: #333;
        }
        .pagination a:hover { background: #f0f4ff; border-color: #4a90e2; }
        .pagination .active { background: #4a90e2; color: #fff; border-color: #4a90e2; }
        .pagination .disabled { color: #bbb; pointer-events: none; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 12px; font-weight: 600;
        }
        .badge-excellent { background: #e6f7ee; color: #27ae60; }
        .badge-good      { background: #e8f4fd; color: #2980b9; }
        .badge-pass      { background: #fff8e1; color: #f39c12; }
        .badge-fail      { background: #fdecea; color: #e74c3c; }
        .hint { font-size: 11px; color: #999; margin-top: 2px; }
        .gender-male   { display: none; }
        .gender-female { display: none; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .page-toolbar { display:flex;align-items:center;margin-top:12px;gap:8px;flex-wrap:wrap; }
        @media (max-width: 768px) {
            .search-bar,
            .page-toolbar,
            .modal-footer,
            .form-grid3,
            .form-grid2 {
                display: flex;
                flex-direction: column;
            }
            .search-bar > *,
            .page-toolbar > *,
            .modal-footer > * {
                width: 100%;
            }
            .modal { width: calc(100vw - 20px); }
            .modal-header, .modal-body, .modal-footer { padding-left: 16px; padding-right: 16px; }
            .table-wrap + div[style*="margin-top:8px"] { flex-direction: column !important; align-items: stretch !important; }
            .table-wrap + div[style*="margin-top:8px"] form,
            .table-wrap + div[style*="margin-top:8px"] .btn { width: 100%; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin}">管理后台</a>
        <a th:href="@{/dashboard}">首页</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div class="page-header">
        <h2>体质健康测试</h2>
    </div>

    <!-- 搜索栏 -->
    <form method="get" th:action="@{/admin/physical-tests}" class="search-bar">
        <select name="gradeId" id="gradeSelect">
            <option value="" th:selected="${gradeId == null}">全部年级</option>
            <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}"
                    th:selected="${gradeId != null && gradeId == g.id}"></option>
        </select>
        <select name="classId" id="classSelect">
            <option value="" th:selected="${classId == null}">全部班级</option>
            <option th:each="c : ${classes}" th:value="${c.id}"
                    th:attr="data-grade=${c.grade != null ? c.grade.id : ''}"
                    th:text="${(c.grade != null ? c.grade.name + ' ' : '') + c.name}"
                    th:selected="${classId != null && classId == c.id}"></option>
        </select>
        <select name="academicYear">
            <option value="" th:selected="${academicYear == null || academicYear == ''}">全部学年</option>
            <option th:each="y : ${academicYears}" th:value="${y}" th:text="${y}"
                    th:selected="${academicYear != null && academicYear == y}"></option>
        </select>
        <select name="semester">
            <option value="" th:selected="${semester == null || semester == ''}">全部学期</option>
            <option value="上学期" th:selected="${'上学期' == semester}">上学期</option>
            <option value="下学期" th:selected="${'下学期' == semester}">下学期</option>
        </select>
        <input type="text" name="keyword" th:value="${keyword}" placeholder="姓名/学号">
        <button type="submit" class="btn btn-secondary">搜索</button>
        <a th:href="@{/admin/physical-tests}" class="btn btn-outline">重置</a>
        <button type="button" class="btn btn-primary" onclick="openAdd()">＋ 添加记录</button>
        <button type="button" class="btn btn-outline" onclick="openImport()">导入 Excel</button>
        <a th:href="@{/admin/physical-tests/export(gradeId=${gradeId},classId=${classId},academicYear=${academicYear},semester=${semester},keyword=${keyword})}"
           class="btn btn-outline">导出 Excel</a>
    </form>

    <!-- 数据表格 -->
    <div class="table-wrap">
    <table class="table">
        <thead>
            <tr>
                <th><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
                <th>学号</th><th>姓名</th><th>性别</th><th>班级</th>
                <th>学年/学期</th><th>身高</th><th>体重</th><th>BMI</th>
                <th>总分</th><th>等级</th><th>测试日期</th><th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${testPage.content}">
                <td><input type="checkbox" class="row-check" th:value="${t.id}"></td>
                <td th:text="${t.student.studentNo}"></td>
                <td th:text="${t.student.name}"></td>
                <td th:text="${t.student.gender}"></td>
                <td th:text="${t.student.schoolClass != null ? (t.student.schoolClass.grade != null ? t.student.schoolClass.grade.name + ' ' : '') + t.student.schoolClass.name : ''}"></td>
                <td th:text="${t.academicYear + ' ' + t.semester}"></td>
                <td th:text="${t.height != null ? t.height + ' cm' : '-'}"></td>
                <td th:text="${t.weight != null ? t.weight + ' kg' : '-'}"></td>
                <td th:text="${t.bmi != null ? t.bmi : '-'}"></td>
                <td th:text="${t.totalScore != null ? t.totalScore : '-'}"></td>
                <td>
                    <span th:if="${t.level != null}" th:text="${t.level}"
                          th:class="${'badge ' + ('优秀' == t.level ? 'badge-excellent' : ('良好' == t.level ? 'badge-good' : ('及格' == t.level ? 'badge-pass' : 'badge-fail')))}"></span>
                    <span th:if="${t.level == null}">-</span>
                </td>
                <td th:text="${t.testDate != null ? t.testDate : '-'}"></td>
                <td>
                    <button class="btn btn-sm btn-secondary" onclick="openEdit(this)"
                            th:data-id="${t.id}"
                            th:data-studentid="${t.student.id}"
                            th:data-gender="${t.student.gender}"
                            th:data-year="${t.academicYear}"
                            th:data-semester="${t.semester}"
                            th:data-date="${t.testDate}"
                            th:data-height="${t.height}"
                            th:data-weight="${t.weight}"
                            th:data-lung="${t.lungCapacity}"
                            th:data-sprint="${t.sprint50m}"
                            th:data-sitreach="${t.sitReach}"
                            th:data-jump="${t.standingJump}"
                            th:data-pullups="${t.pullUps}"
                            th:data-situps="${t.sitUps}"
                            th:data-run800="${t.run800m}"
                            th:data-run1000="${t.run1000m}"
                            th:data-remark="${t.remark}">编辑</button>
                    <form th:action="@{/admin/physical-tests/delete/{id}(id=${t.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('确认删除？')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-danger">删除</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${testPage.totalElements == 0}">
                <td colspan="13" style="text-align:center;color:#999;padding:24px">暂无数据</td>
            </tr>
        </tbody>
    </table>
    </div>

    <!-- 批量操作 -->
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <form id="batchDeleteForm" th:action="@{/admin/physical-tests/delete-batch}" method="post"
              onsubmit="return confirmBatch()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <span id="batchIds"></span>
            <button type="submit" class="btn btn-danger btn-sm">批量删除</button>
        </form>
    </div>

    <!-- 分页 -->
    <input type="hidden" id="pg-current"      th:value="${testPage.number}">
    <input type="hidden" id="pg-total"        th:value="${testPage.totalPages}">
    <input type="hidden" id="pg-gradeId"      th:value="${gradeId}">
    <input type="hidden" id="pg-classId"      th:value="${classId}">
    <input type="hidden" id="pg-academicYear" th:value="${academicYear}">
    <input type="hidden" id="pg-semester"     th:value="${semester}">
    <input type="hidden" id="pg-keyword"      th:value="${keyword}">

    <div class="page-toolbar" th:if="${testPage.totalPages > 0}">
        <span style="font-size:13px;color:#555;white-space:nowrap"
              th:text="'共 ' + ${testPage.totalElements} + ' 条记录，共 ' + ${testPage.totalPages} + ' 页'"></span>
        <div class="pagination" id="pagination" th:if="${testPage.totalPages > 1}" style="margin:0;flex:1;justify-content:center">
            <a id="pg-prev">上一页</a>
            <span id="pg-numbers"></span>
            <a id="pg-next">下一页</a>
        </div>
        <span style="font-size:13px;color:#555;white-space:nowrap;margin-left:auto" th:if="${testPage.totalPages > 1}">跳转到
            <input type="number" id="pg-jump" min="1" th:max="${testPage.totalPages}"
                   style="width:52px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:13px">
            <button onclick="jumpPage()" class="btn btn-sm btn-outline" style="padding:4px 10px">GO</button>
        </span>
    </div>
</div>

<!-- ===== 添加记录弹窗 ===== -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>添加体质测试记录</h3>
            <button class="modal-close" onclick="closeAdd()">×</button>
        </div>
        <form th:action="@{/admin/physical-tests/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <div class="form-grid3">
                    <!-- 基本信息 -->
                    <div class="section-title">基本信息</div>
                    <div class="form-group span2">
                        <label>学生 <span style="color:#e74c3c">*</span></label>
                        <select name="studentId" id="add-studentId" required onchange="onAddStudentChange(this)">
                            <option value="">请选择学生</option>
                            <option th:each="s : ${allStudents}" th:value="${s.id}"
                                    th:attr="data-gender=${s.gender}"
                                    th:text="${(s.schoolClass != null && s.schoolClass.grade != null ? s.schoolClass.grade.name + ' ' : '') + (s.schoolClass != null ? s.schoolClass.name + ' - ' : '') + s.name + (s.studentNo != null ? ' (' + s.studentNo + ')' : '')}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>测试日期</label>
                        <input type="date" name="testDate" id="add-testDate">
                    </div>
                    <div class="form-group">
                        <label>学年 <span style="color:#e74c3c">*</span></label>
                        <input type="text" name="academicYear" id="add-academicYear" placeholder="如 2025-2026" required>
                    </div>
                    <div class="form-group">
                        <label>学期 <span style="color:#e74c3c">*</span></label>
                        <select name="semester" required>
                            <option value="上学期">上学期</option>
                            <option value="下学期">下学期</option>
                        </select>
                    </div>
                    <!-- 形态指标 -->
                    <div class="section-title">形态指标</div>
                    <div class="form-group">
                        <label>身高 (cm)</label>
                        <input type="number" name="height" step="0.1" min="100" max="250" placeholder="如 175.0">
                    </div>
                    <div class="form-group">
                        <label>体重 (kg)</label>
                        <input type="number" name="weight" step="0.1" min="20" max="200" placeholder="如 65.0">
                    </div>
                    <div class="form-group">
                        <label>BMI</label>
                        <input type="text" id="add-bmi-preview" readonly placeholder="自动计算" style="background:#f8f8f8;color:#999">
                    </div>
                    <!-- 机能指标 -->
                    <div class="section-title">机能指标</div>
                    <div class="form-group">
                        <label>肺活量 (mL)</label>
                        <input type="number" name="lungCapacity" step="1" min="0" placeholder="如 4200">
                    </div>
                    <!-- 体能指标 -->
                    <div class="section-title">体能指标</div>
                    <div class="form-group">
                        <label>50米跑 (秒)</label>
                        <input type="number" name="sprint50m" step="0.01" min="0" placeholder="如 7.20">
                    </div>
                    <div class="form-group">
                        <label>坐位体前屈 (cm)</label>
                        <input type="number" name="sitReach" step="0.1" placeholder="如 18.0">
                    </div>
                    <div class="form-group">
                        <label>立定跳远 (cm)</label>
                        <input type="number" name="standingJump" step="0.1" min="0" placeholder="如 210">
                    </div>
                    <!-- 性别差异项 -->
                    <div class="form-group gender-male" id="add-pullups-group">
                        <label>引体向上 (个) <span style="color:#888;font-size:11px">男</span></label>
                        <input type="number" name="pullUps" step="1" min="0" placeholder="如 8">
                    </div>
                    <div class="form-group gender-male" id="add-run1000-group">
                        <label>1000米跑 (秒) <span style="color:#888;font-size:11px">男</span></label>
                        <input type="number" name="run1000m" step="0.1" min="0" placeholder="如 255">
                    </div>
                    <div class="form-group gender-female" id="add-situps-group">
                        <label>仰卧起坐 (个/分钟) <span style="color:#888;font-size:11px">女</span></label>
                        <input type="number" name="sitUps" step="1" min="0" placeholder="如 45">
                    </div>
                    <div class="form-group gender-female" id="add-run800-group">
                        <label>800米跑 (秒) <span style="color:#888;font-size:11px">女</span></label>
                        <input type="number" name="run800m" step="0.1" min="0" placeholder="如 231">
                    </div>
                    <!-- 备注 -->
                    <div class="form-group full">
                        <label>备注</label>
                        <input type="text" name="remark" placeholder="可选">
                    </div>
                </div>
                <p class="hint" style="margin-top:8px">保存后将自动按教育部2014标准计算总分与等级</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeAdd()">取消</button>
                <button type="submit" class="btn btn-primary">确认添加</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== 编辑记录弹窗 ===== -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h3>编辑体质测试记录</h3>
            <button class="modal-close" onclick="closeEdit()">×</button>
        </div>
        <form id="editForm" method="post" th:action="@{/admin/physical-tests/save}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" id="edit-id">
            <input type="hidden" name="studentId" id="edit-studentId">
            <div class="modal-body">
                <div class="form-grid3">
                    <div class="section-title">基本信息</div>
                    <div class="form-group full">
                        <label>学生</label>
                        <input type="text" id="edit-studentName" readonly style="background:#f8f8f8">
                    </div>
                    <div class="form-group">
                        <label>测试日期</label>
                        <input type="date" name="testDate" id="edit-testDate">
                    </div>
                    <div class="form-group">
                        <label>学年 <span style="color:#e74c3c">*</span></label>
                        <input type="text" name="academicYear" id="edit-year" required>
                    </div>
                    <div class="form-group">
                        <label>学期 <span style="color:#e74c3c">*</span></label>
                        <select name="semester" id="edit-semester" required>
                            <option value="上学期">上学期</option>
                            <option value="下学期">下学期</option>
                        </select>
                    </div>
                    <div class="section-title">形态指标</div>
                    <div class="form-group">
                        <label>身高 (cm)</label>
                        <input type="number" name="height" id="edit-height" step="0.1" min="100" max="250">
                    </div>
                    <div class="form-group">
                        <label>体重 (kg)</label>
                        <input type="number" name="weight" id="edit-weight" step="0.1" min="20" max="200">
                    </div>
                    <div class="form-group">
                        <label>BMI</label>
                        <input type="text" id="edit-bmi-preview" readonly style="background:#f8f8f8;color:#999">
                    </div>
                    <div class="section-title">机能指标</div>
                    <div class="form-group">
                        <label>肺活量 (mL)</label>
                        <input type="number" name="lungCapacity" id="edit-lung" step="1" min="0">
                    </div>
                    <div class="section-title">体能指标</div>
                    <div class="form-group">
                        <label>50米跑 (秒)</label>
                        <input type="number" name="sprint50m" id="edit-sprint" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label>坐位体前屈 (cm)</label>
                        <input type="number" name="sitReach" id="edit-sitreach" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>立定跳远 (cm)</label>
                        <input type="number" name="standingJump" id="edit-jump" step="0.1" min="0">
                    </div>
                    <div class="form-group" id="edit-pullups-group">
                        <label>引体向上 (个) <span style="color:#888;font-size:11px">男</span></label>
                        <input type="number" name="pullUps" id="edit-pullups" step="1" min="0">
                    </div>
                    <div class="form-group" id="edit-run1000-group">
                        <label>1000米跑 (秒) <span style="color:#888;font-size:11px">男</span></label>
                        <input type="number" name="run1000m" id="edit-run1000" step="0.1" min="0">
                    </div>
                    <div class="form-group" id="edit-situps-group">
                        <label>仰卧起坐 (个/分钟) <span style="color:#888;font-size:11px">女</span></label>
                        <input type="number" name="sitUps" id="edit-situps" step="1" min="0">
                    </div>
                    <div class="form-group" id="edit-run800-group">
                        <label>800米跑 (秒) <span style="color:#888;font-size:11px">女</span></label>
                        <input type="number" name="run800m" id="edit-run800" step="0.1" min="0">
                    </div>
                    <div class="form-group full">
                        <label>备注</label>
                        <input type="text" name="remark" id="edit-remark">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeEdit()">取消</button>
                <button type="submit" class="btn btn-primary">保存修改</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== 导入弹窗 ===== -->
<div class="modal-overlay" id="importModal">
    <div class="modal modal-wide">
        <div class="modal-header">
            <h3>Excel 批量导入</h3>
            <button class="modal-close" onclick="closeImport()">×</button>
        </div>
        <form th:action="@{/admin/physical-tests/import}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <div class="form-grid2">
                    <div class="form-group">
                        <label>学年 <span style="color:#e74c3c">*</span></label>
                        <input type="text" name="academicYear" placeholder="如 2025-2026" required>
                    </div>
                    <div class="form-group">
                        <label>学期 <span style="color:#e74c3c">*</span></label>
                        <select name="semester" required>
                            <option value="上学期">上学期</option>
                            <option value="下学期">下学期</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Excel 文件 (.xlsx) <span style="color:#e74c3c">*</span></label>
                        <input type="file" name="file" accept=".xlsx" required>
                    </div>
                </div>
                <p style="font-size:12px;color:#888;margin-top:10px">
                    按学号匹配学生，同学同学年学期重复记录将跳过。
                    <a th:href="@{/admin/physical-tests/template}" style="color:#4a90e2">下载导入模板</a>
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeImport()">取消</button>
                <button type="submit" class="btn btn-primary">开始导入</button>
            </div>
        </form>
    </div>
</div>

<script>
// ===== 年级联动班级 =====
(function() {
    const gradeSelect = document.getElementById('gradeSelect');
    const classSelect = document.getElementById('classSelect');
    const allOptions  = Array.from(classSelect.options).slice(1);

    function filterClasses() {
        const gid = gradeSelect.value;
        while (classSelect.options.length > 1) classSelect.remove(1);
        allOptions.forEach(opt => {
            if (!gid || opt.dataset.grade === gid) classSelect.add(opt.cloneNode(true));
        });
    }
    gradeSelect.addEventListener('change', () => { classSelect.value = ''; filterClasses(); });
    if (gradeSelect.value) filterClasses();
})();

// ===== BMI 预计算 =====
function calcBmi(heightId, weightId, bmiId) {
    const h = parseFloat(document.getElementById(heightId)?.closest('.modal-body')?.querySelector('[name="height"]')?.value);
    const w = parseFloat(document.getElementById(weightId)?.closest('.modal-body')?.querySelector('[name="weight"]')?.value);
    const el = document.getElementById(bmiId);
    if (!el) return;
    if (h > 0 && w > 0) {
        const bmi = (w / ((h / 100) ** 2)).toFixed(1);
        el.value = bmi;
    } else {
        el.value = '';
    }
}

document.querySelectorAll('[name="height"],[name="weight"]').forEach(el => {
    el.addEventListener('input', function() {
        const modal = this.closest('.modal');
        if (!modal) return;
        const isEdit = modal.querySelector('#edit-id') !== null;
        const hv = parseFloat(modal.querySelector('[name="height"]').value);
        const wv = parseFloat(modal.querySelector('[name="weight"]').value);
        const bmiEl = modal.querySelector(isEdit ? '#edit-bmi-preview' : '#add-bmi-preview');
        if (bmiEl && hv > 0 && wv > 0) {
            bmiEl.value = (wv / ((hv / 100) ** 2)).toFixed(1);
        } else if (bmiEl) {
            bmiEl.value = '';
        }
    });
});

// ===== 性别联动（显示/隐藏项目） =====
function setGenderFields(gender, prefix) {
    const male   = document.querySelectorAll('#' + prefix + 'pullups-group, #' + prefix + 'run1000-group');
    const female = document.querySelectorAll('#' + prefix + 'situps-group, #' + prefix + 'run800-group');
    if (gender === '男') {
        male.forEach(el => { el.style.display = ''; });
        female.forEach(el => { el.style.display = 'none'; });
    } else if (gender === '女') {
        male.forEach(el => { el.style.display = 'none'; });
        female.forEach(el => { el.style.display = ''; });
    } else {
        male.forEach(el => { el.style.display = ''; });
        female.forEach(el => { el.style.display = ''; });
    }
}

function onAddStudentChange(sel) {
    const gender = sel.selectedOptions[0]?.dataset?.gender || '';
    setGenderFields(gender, 'add-');
}

// ===== 弹窗控制 =====
function openAdd() {
    setGenderFields('', 'add-');
    document.getElementById('addModal').classList.add('active');
}
function closeAdd()   { document.getElementById('addModal').classList.remove('active'); }
function openImport() { document.getElementById('importModal').classList.add('active'); }
function closeImport(){ document.getElementById('importModal').classList.remove('active'); }

function openEdit(btn) {
    document.getElementById('edit-id').value        = btn.dataset.id;
    document.getElementById('edit-studentId').value = btn.dataset.studentid;
    document.getElementById('edit-studentName').value = btn.closest('tr').cells[2].textContent
        + ' (' + btn.closest('tr').cells[1].textContent + ')';
    document.getElementById('edit-year').value      = btn.dataset.year || '';
    document.getElementById('edit-semester').value  = btn.dataset.semester || '上学期';
    document.getElementById('edit-testDate').value  = btn.dataset.date !== 'null' ? btn.dataset.date : '';
    document.getElementById('edit-height').value    = btn.dataset.height !== 'null' ? btn.dataset.height : '';
    document.getElementById('edit-weight').value    = btn.dataset.weight !== 'null' ? btn.dataset.weight : '';
    document.getElementById('edit-lung').value      = btn.dataset.lung !== 'null' ? btn.dataset.lung : '';
    document.getElementById('edit-sprint').value    = btn.dataset.sprint !== 'null' ? btn.dataset.sprint : '';
    document.getElementById('edit-sitreach').value  = btn.dataset.sitreach !== 'null' ? btn.dataset.sitreach : '';
    document.getElementById('edit-jump').value      = btn.dataset.jump !== 'null' ? btn.dataset.jump : '';
    document.getElementById('edit-pullups').value   = btn.dataset.pullups !== 'null' ? btn.dataset.pullups : '';
    document.getElementById('edit-situps').value    = btn.dataset.situps !== 'null' ? btn.dataset.situps : '';
    document.getElementById('edit-run800').value    = btn.dataset.run800 !== 'null' ? btn.dataset.run800 : '';
    document.getElementById('edit-run1000').value   = btn.dataset.run1000 !== 'null' ? btn.dataset.run1000 : '';
    document.getElementById('edit-remark').value    = btn.dataset.remark !== 'null' ? btn.dataset.remark : '';
    // BMI 预览
    const h = parseFloat(btn.dataset.height), w = parseFloat(btn.dataset.weight);
    document.getElementById('edit-bmi-preview').value = (h > 0 && w > 0)
        ? (w / ((h / 100) ** 2)).toFixed(1) : '';
    // 性别联动
    setGenderFields(btn.dataset.gender, 'edit-');
    document.getElementById('editModal').classList.add('active');
}
function closeEdit() { document.getElementById('editModal').classList.remove('active'); }

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeAdd(); closeEdit(); closeImport(); }
});

// ===== 批量删除 =====
function toggleAll(cb) {
    document.querySelectorAll('.row-check').forEach(el => el.checked = cb.checked);
}
function confirmBatch() {
    const checked = Array.from(document.querySelectorAll('.row-check:checked'));
    if (checked.length === 0) { alert('请先勾选要删除的记录'); return false; }
    if (!confirm('确认删除选中的 ' + checked.length + ' 条记录？此操作不可恢复！')) return false;
    const form = document.getElementById('batchDeleteForm');
    // 清除旧 ids
    document.querySelectorAll('#batchIds input').forEach(el => el.remove());
    checked.forEach(cb => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'ids';
        input.value = cb.value;
        document.getElementById('batchIds').appendChild(input);
    });
    return true;
}

// ===== 分页 =====
(function() {
    const pg = document.getElementById('pagination');
    if (!pg) return;
    const current      = parseInt(document.getElementById('pg-current').value);
    const total        = parseInt(document.getElementById('pg-total').value);
    const gradeId      = document.getElementById('pg-gradeId').value;
    const classId      = document.getElementById('pg-classId').value;
    const academicYear = document.getElementById('pg-academicYear').value;
    const semester     = document.getElementById('pg-semester').value;
    const keyword      = document.getElementById('pg-keyword').value;

    function url(p) {
        const params = new URLSearchParams();
        if (gradeId)      params.set('gradeId', gradeId);
        if (classId)      params.set('classId', classId);
        if (academicYear) params.set('academicYear', academicYear);
        if (semester)     params.set('semester', semester);
        if (keyword)      params.set('keyword', keyword);
        params.set('page', p);
        return '/admin/physical-tests?' + params.toString();
    }
    const prev = document.getElementById('pg-prev');
    const next = document.getElementById('pg-next');
    if (current === 0) prev.classList.add('disabled'); else prev.href = url(current - 1);
    if (current === total - 1) next.classList.add('disabled'); else next.href = url(current + 1);
    const pages = new Set([0, total - 1]);
    for (let i = Math.max(0, current - 2); i <= Math.min(total - 1, current + 2); i++) pages.add(i);
    const sorted = [...pages].sort((a, b) => a - b);
    let html = '', prev2 = -1;
    for (const p of sorted) {
        if (prev2 !== -1 && p - prev2 > 1) html += '<span style="padding:0 4px;color:#bbb">…</span>';
        html += `<a href="${url(p)}" class="${p === current ? 'active' : ''}">${p + 1}</a>`;
        prev2 = p;
    }
    document.getElementById('pg-numbers').innerHTML = html;
})();

function jumpPage() {
    const total        = parseInt(document.getElementById('pg-total').value);
    const val          = parseInt(document.getElementById('pg-jump').value);
    if (isNaN(val) || val < 1 || val > total) return;
    const gradeId      = document.getElementById('pg-gradeId').value;
    const classId      = document.getElementById('pg-classId').value;
    const academicYear = document.getElementById('pg-academicYear').value;
    const semester     = document.getElementById('pg-semester').value;
    const keyword      = document.getElementById('pg-keyword').value;
    const params = new URLSearchParams();
    if (gradeId)      params.set('gradeId', gradeId);
    if (classId)      params.set('classId', classId);
    if (academicYear) params.set('academicYear', academicYear);
    if (semester)     params.set('semester', semester);
    if (keyword)      params.set('keyword', keyword);
    params.set('page', val - 1);
    location.href = '/admin/physical-tests?' + params.toString();
}
</script>
