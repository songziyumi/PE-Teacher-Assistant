<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报名名单 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:12px; width:440px; max-width:96vw; box-shadow:0 8px 32px rgba(0,0,0,.18); animation:modalIn .2s ease; }
        @keyframes modalIn { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:#4a90e2; border-radius:12px 12px 0 0; }
        .modal-header h3 { font-size:15px; color:#fff; margin:0; }
        .modal-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
        .modal-body { padding:20px; }
        .modal-footer { padding:14px 20px; border-top:1px solid #eee; display:flex; gap:.75rem; justify-content:flex-end; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:.85rem; font-weight:600; color:#555; margin-bottom:.3rem; }
        .form-group select { width:100%; padding:.45rem .7rem; border:1px solid #ddd; border-radius:6px; font-size:.9rem; }
        .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
        .badge-confirmed { background:#27ae60; color:#fff; }
        .badge-pending   { background:#f39c12; color:#fff; }
        .badge-fail      { background:#e74c3c; color:#fff; }
        .badge-cancelled { background:#bdc3c7; color:#fff; }
        .stat-row { display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
        .stat-chip { background:#f8f9fa; border-radius:8px; padding:8px 16px; font-size:.88rem; }
        .stat-chip strong { color:#4a90e2; font-size:1.1rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin/courses/{id}/detail(id=${event.id})}">← 返回活动</a>
        <span class="nav-user" th:text="${currentSchool?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2>
            <span th:text="${course.name}"></span>
            <span style="font-size:.85rem;color:#888;font-weight:400;">— 报名名单</span>
        </h2>
        <button class="btn btn-primary" onclick="openModal('addModal')">+ 手动加人</button>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- 统计 -->
    <div class="stat-row">
        <div class="stat-chip">总名额 <strong th:text="${course.totalCapacity}"></strong></div>
        <div class="stat-chip">已确认 <strong th:text="${course.currentCount}"></strong></div>
        <div class="stat-chip">剩余 <strong th:text="${course.totalCapacity - course.currentCount}"></strong></div>
        <div class="stat-chip">名额模式 <strong th:text="${course.capacityMode == 'GLOBAL'} ? '全局' : '按班'"></strong></div>
    </div>

    <!-- PER_CLASS 按班名额明细 -->
    <div th:if="${course.capacityMode == 'PER_CLASS' and not #lists.isEmpty(capacities)}"
         style="margin-bottom:16px;padding:12px 16px;background:#f8f9fa;border-radius:8px;">
        <p style="font-size:.85rem;font-weight:600;margin:0 0 8px;">各班名额</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <span th:each="cap : ${capacities}" style="font-size:.83rem;background:#fff;border:1px solid #eee;padding:4px 12px;border-radius:6px;">
                <th:block th:text="${cap.schoolClass.name}"></th:block>：
                <th:block th:text="${cap.currentCount}"></th:block>/<th:block th:text="${cap.maxCapacity}"></th:block>
            </span>
        </div>
    </div>

    <table class="table">
        <thead>
            <tr><th>学生姓名</th><th>学号</th><th>班级</th><th>志愿/轮次</th><th>状态</th><th>确认时间</th><th>操作</th></tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(enrollments)}">
                <td colspan="7" style="text-align:center;color:#aaa;">暂无报名记录</td>
            </tr>
            <tr th:each="sel : ${enrollments}">
                <td th:text="${sel.student.name}"></td>
                <td th:text="${sel.student.studentNo}"></td>
                <td th:text="${sel.student.schoolClass?.name ?: '—'}"></td>
                <td>
                    <span th:if="${sel.round == 1}" th:text="${sel.preference} + '志愿'"></span>
                    <span th:if="${sel.round == 2}">第二轮</span>
                    <span th:if="${sel.round == 0}">手动</span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${sel.status == 'CONFIRMED'} ? 'badge-confirmed' :
                                          (${sel.status == 'PENDING'} ? 'badge-pending' :
                                          (${sel.status == 'LOTTERY_FAIL'} ? 'badge-fail' : 'badge-cancelled'))"
                          th:text="${sel.status == 'CONFIRMED'} ? '已确认' :
                                    (${sel.status == 'PENDING'} ? '待结算' :
                                    (${sel.status == 'LOTTERY_FAIL'} ? '未中签' : '已取消'))">
                    </span>
                </td>
                <td th:text="${sel.confirmedAt} ? ${#temporals.format(sel.confirmedAt,'MM-dd HH:mm')} : '—'"></td>
                <td>
                    <form th:if="${sel.status == 'CONFIRMED'}"
                          th:action="@{/admin/courses/{eid}/courses/{cid}/enrollments/{sid}/remove(eid=${event.id},cid=${course.id},sid=${sel.id})}"
                          method="post" style="display:inline"
                          onsubmit="return confirm('确认移除该学生？')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-danger btn-xs">移除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- 手动加人弹窗 -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>手动加入学生</h3>
            <button class="modal-close" onclick="closeModal('addModal')">×</button>
        </div>
        <form th:action="@{/admin/courses/{eid}/courses/{cid}/enrollments/add(eid=${event.id},cid=${course.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <div class="form-group">
                    <label>选择学生</label>
                    <select name="studentId" required>
                        <option value="">— 请选择 —</option>
                        <option th:each="s : ${allStudents}" th:value="${s.id}"
                                th:text="${s.name} + ' (' + ${s.studentNo} + ')'"></option>
                    </select>
                    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-weight:500;">
                        <input type="checkbox" name="forceOverflow" value="true">
                        <span>强制超编（仅管理员手动加人时使用）</span>
                    </label>
                    <textarea name="forceReason"
                              placeholder="若勾选强制超编，请填写原因（必填）"
                              style="margin-top:8px;width:100%;min-height:72px;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:.9rem;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
                <button type="submit" class="btn btn-primary">加入</button>
            </div>
        </form>
    </div>
</div>

<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.addEventListener('DOMContentLoaded', function () {
    const form = document.querySelector('#addModal form');
    if (!form) return;
    const forceCheckbox = form.querySelector('input[name="forceOverflow"]');
    const reasonInput = form.querySelector('textarea[name="forceReason"]');

    form.addEventListener('submit', function (e) {
        if (forceCheckbox && forceCheckbox.checked && reasonInput && !reasonInput.value.trim()) {
            e.preventDefault();
            alert('勾选强制超编时必须填写原因');
        }
    });
});
</script>
</body>
</html>
