<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报名名单 - 管理后台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .admin-wrap { max-width: 1120px; margin: 24px auto; padding: 0 16px 28px; }
        .hero-card {
            background: linear-gradient(135deg, #0f172a, #334155);
            color: #fff;
            border-radius: 18px;
            padding: 22px 24px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, .18);
            margin-bottom: 16px;
        }
        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }
        .hero-card h2 { margin: 0; font-size: 1.28rem; }
        .hero-card p { margin: 8px 0 0; opacity: .9; font-size: .9rem; line-height: 1.65; }
        .hero-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .stat-row {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-chip {
            background: #fff;
            border: 1px solid #e8eef5;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
            color: #1f2937;
        }
        .stat-chip strong { display: block; font-size: 1.28rem; margin-top: 6px; }
        .helper-card,
        .table-card {
            background: #fff;
            border: 1px solid #e8eef5;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
            padding: 16px;
            margin-bottom: 16px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: .76rem;
            font-weight: 700;
        }
        .badge-confirmed { background: #dcfce7; color: #166534; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-fail { background: #fee2e2; color: #b91c1c; }
        .badge-cancelled { background: #e5e7eb; color: #475569; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.46);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 16px;
            width: 460px;
            max-width: 96vw;
            box-shadow: 0 18px 40px rgba(15,23,42,.22);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: linear-gradient(135deg,#0f172a,#334155);
            border-radius: 16px 16px 0 0;
        }
        .modal-header h3 { font-size: 1rem; color: #fff; margin: 0; }
        .modal-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .modal-body { padding: 18px; }
        .modal-footer { padding: 16px 18px; border-top: 1px solid #eee; display: flex; gap: .75rem; justify-content: flex-end; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: .85rem; font-weight: 600; color: #475569; margin-bottom: .4rem; }
        .form-group select, .form-group textarea {
            width: 100%;
            padding: .55rem .7rem;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: .9rem;
            box-sizing: border-box;
        }
        @media (max-width: 900px) {
            .stat-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 768px) {
            .admin-wrap { margin: 16px auto 24px; padding: 0 12px 24px; }
            .hero-card, .helper-card, .table-card, .modal-body { padding: 16px; }
            .hero-actions .btn, .modal-footer { width: 100%; }
            .modal-footer { flex-direction: column; align-items: stretch; }
            .modal-footer .btn { width: 100%; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">管理后台</div>
    <div class="nav-links">
        <a th:href="@{/admin/courses/{id}/detail(id=${event.id},tab='courses')}">返回活动</a>
        <span class="nav-user" th:text="${currentSchool?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="admin-wrap">
    <div class="hero-card">
        <div class="hero-top">
            <div>
                <h2><span th:text="${course.name}"></span> · 报名名单</h2>
                <p>查看课程报名、确认和手动加人情况，并支持管理员手动移除已确认学生。</p>
            </div>
            <div class="hero-actions">
                <button class="btn btn-primary" type="button" onclick="openModal('addModal')">手动加人</button>
            </div>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="stat-row">
        <div class="stat-chip">总名额<strong th:text="${course.totalCapacity}"></strong></div>
        <div class="stat-chip">已确认<strong th:text="${confirmedEnrollmentCount}"></strong></div>
        <div class="stat-chip">剩余<strong th:text="${remainingEnrollmentCapacity}"></strong></div>
        <div class="stat-chip" th:if="${overflowEnrollmentCount > 0}">超编<strong th:text="${overflowEnrollmentCount}"></strong></div>
        <div class="stat-chip">名额模式<strong th:text="${course.capacityMode == 'GLOBAL' ? '全局' : '按班'}"></strong></div>
    </div>

    <div th:if="${course.capacityMode == 'PER_CLASS' and not #lists.isEmpty(capacities)}" class="helper-card">
        <p style="margin:0 0 8px;font-size:.85rem;font-weight:700;color:#1f2937;">各班名额</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
            <span th:each="cap : ${capacities}" style="font-size:.83rem;background:#f8fafc;border:1px solid #e5e7eb;padding:6px 12px;border-radius:999px;">
                <th:block th:text="${cap.schoolClass.name}"></th:block>：
                <th:block th:text="${cap.currentCount}"></th:block>/<th:block th:text="${cap.maxCapacity}"></th:block>
            </span>
        </div>
    </div>

    <div class="table-card">
        <div class="table-wrap">
            <table class="table">
                <thead>
                <tr>
                    <th>学生姓名</th>
                    <th>学号</th>
                    <th>班级</th>
                    <th>志愿/轮次</th>
                    <th>状态</th>
                    <th>确认时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(enrollments)}">
                    <td colspan="7" style="text-align:center;color:#94a3b8;">暂无报名记录</td>
                </tr>
                <tr th:each="sel : ${enrollments}">
                    <td th:text="${sel.student.name}"></td>
                    <td th:text="${sel.student.studentNo}"></td>
                    <td th:text="${sel.student.schoolClass != null ? sel.student.schoolClass.name : '-'}"></td>
                    <td>
                        <span th:if="${sel.round == 1}" th:text="${sel.preference} + '志愿'"></span>
                        <span th:if="${sel.round == 2}">第二轮</span>
                        <span th:if="${sel.round == 0}">手动</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${sel.status == 'CONFIRMED'} ? 'badge-confirmed' :
                                              (${sel.status == 'PENDING'} ? 'badge-pending' :
                                              (${sel.status == 'LOTTERY_FAIL'} ? 'badge-fail' : 'badge-cancelled'))"
                              th:text="${sel.status == 'CONFIRMED' ? '已确认' :
                                        (sel.status == 'PENDING' ? '待结算' :
                                        (sel.status == 'LOTTERY_FAIL' ? '未中签' : '已取消'))}">
                        </span>
                    </td>
                    <td th:text="${sel.confirmedAt != null ? #temporals.format(sel.confirmedAt,'MM-dd HH:mm') : '-'}"></td>
                    <td>
                        <form th:if="${sel.status == 'CONFIRMED'}"
                              th:action="@{/admin/courses/{eid}/courses/{cid}/enrollments/{sid}/remove(eid=${event.id},cid=${course.id},sid=${sel.id})}"
                              method="post"
                              style="display:inline"
                              onsubmit="return confirm('确认移除该学生？')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-danger btn-xs">移除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>手动加入学生</h3>
            <button class="modal-close" type="button" onclick="closeModal('addModal')">×</button>
        </div>
        <form th:action="@{/admin/courses/{eid}/courses/{cid}/enrollments/add(eid=${event.id},cid=${course.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <div class="form-group">
                    <label>选择学生</label>
                    <select name="studentId" required>
                        <option value="">-- 请选择 --</option>
                        <option th:each="s : ${allStudents}" th:value="${s.id}"
                                th:text="${s.name + ' (' + s.studentNo + ')'}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;font-weight:500;">
                        <input type="checkbox" name="forceOverflow" value="true">
                        <span>强制超编</span>
                    </label>
                    <textarea name="forceReason" placeholder="若勾选强制超编，请填写原因（必填）"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
                <button type="submit" class="btn btn-primary">加入</button>
            </div>
        </form>
    </div>
</div>

<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.addEventListener('DOMContentLoaded', function () {
    const form = document.querySelector('#addModal form');
    if (!form) return;
    const forceCheckbox = form.querySelector('input[name="forceOverflow"]');
    const reasonInput = form.querySelector('textarea[name="forceReason"]');

    form.addEventListener('submit', function (e) {
        if (forceCheckbox && forceCheckbox.checked && reasonInput && !reasonInput.value.trim()) {
            e.preventDefault();
            alert('勾选强制超编时必须填写原因');
        }
    });
});
</script>
</body>
</html>
