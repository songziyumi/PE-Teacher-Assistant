<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:flex-start; justify-content:center; overflow-y:auto; padding:24px 0; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:12px; width:600px; max-width:96vw; box-shadow:0 8px 32px rgba(0,0,0,.18); animation:modalIn .2s ease; margin:auto; }
        .modal-wide { width:820px; }
        @keyframes modalIn { from{transform:translateY(-24px);opacity:0} to{transform:translateY(0);opacity:1} }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; background:#4a90e2; border-radius:12px 12px 0 0; }
        .modal-header h3 { font-size:16px; color:#fff; margin:0; }
        .modal-close { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }
        .modal-body { padding:24px; }
        .modal-footer { padding:16px 24px; border-top:1px solid #eee; display:flex; gap:.75rem; justify-content:flex-end; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
        .form-row.single { grid-template-columns:1fr; }
        .form-row.triple { grid-template-columns:1fr 1fr 1fr; }
        .form-group label { display:block; font-size:.85rem; font-weight:600; color:#555; margin-bottom:.3rem; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:.45rem .7rem; border:1px solid #ddd; border-radius:6px; font-size:.9rem; box-sizing:border-box; }
        .tab-bar { display:flex; gap:0; border-bottom:2px solid #e0e0e0; margin-bottom:20px; }
        .tab-btn { padding:10px 24px; border:none; background:none; font-size:.95rem; color:#888; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; }
        .tab-btn.active { color:#4a90e2; border-bottom-color:#4a90e2; font-weight:600; }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }
        .section-title { font-size:1rem; font-weight:600; color:#333; margin:0 0 12px; }
        .status-bar { display:flex; align-items:center; gap:12px; background:#f8f9fa; border-radius:8px; padding:14px 18px; margin-bottom:20px; flex-wrap:wrap; }
        .badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:.78rem; font-weight:600; }
        .badge-draft    { background:#f0f0f0; color:#888; }
        .badge-round1   { background:#2980b9; color:#fff; }
        .badge-processing { background:#f39c12; color:#fff; }
        .badge-round2   { background:#27ae60; color:#fff; }
        .badge-closed   { background:#bdc3c7; color:#fff; }
        .badge-active   { background:#27ae60; color:#fff; }
        .per-class-rows { display:none; }
        .per-class-row { display:grid; grid-template-columns:1fr 100px; gap:8px; align-items:center; margin-bottom:8px; }
        .per-class-row span { font-size:.88rem; }
        .student-search { margin-bottom:10px; }
        .student-search input { width:100%; padding:.45rem .7rem; border:1px solid #ddd; border-radius:6px; font-size:.88rem; box-sizing:border-box; }
        .student-checklist { max-height:280px; overflow-y:auto; border:1px solid #eee; border-radius:6px; padding:8px; }
        .student-check-item { display:flex; align-items:center; gap:8px; padding:5px 4px; border-radius:4px; font-size:.88rem; }
        .student-check-item:hover { background:#f5f5f5; }
        .select-all-bar { display:flex; gap:8px; margin-bottom:8px; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin/courses}">← 选课活动</a>
        <span class="nav-user" th:text="${currentSchool?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2 th:text="${event.name}">活动名称</h2>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- 状态栏 + 操作按钮 -->
    <div class="status-bar">
        <span class="badge"
              th:classappend="${event.status == 'DRAFT'} ? 'badge-draft' :
                              (${event.status == 'ROUND1'} ? 'badge-round1' :
                              (${event.status == 'PROCESSING'} ? 'badge-processing' :
                              (${event.status == 'ROUND2'} ? 'badge-round2' : 'badge-closed')))"
              th:text="${event.status == 'DRAFT'} ? '草稿' :
                        (${event.status == 'ROUND1'} ? '第一轮进行中' :
                        (${event.status == 'PROCESSING'} ? '结算中' :
                        (${event.status == 'ROUND2'} ? '第二轮进行中' : '已关闭')))">
        </span>
        <span style="font-size:.85rem;color:#666;">
            第一轮：<th:block th:text="${event.round1Start} ? ${#temporals.format(event.round1Start,'MM-dd HH:mm')} : '未设'"></th:block>
            ～ <th:block th:text="${event.round1End} ? ${#temporals.format(event.round1End,'MM-dd HH:mm')} : '未设'"></th:block>
            &nbsp;|&nbsp;
            第二轮：<th:block th:text="${event.round2Start} ? ${#temporals.format(event.round2Start,'MM-dd HH:mm')} : '未设'"></th:block>
            ～ <th:block th:text="${event.round2End} ? ${#temporals.format(event.round2End,'MM-dd HH:mm')} : '未设'"></th:block>
        </span>
        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
            <form th:if="${event.status == 'DRAFT'}" th:action="@{/admin/courses/events/{id}/start-round1(id=${event.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary btn-sm">开启第一轮</button>
            </form>
            <form th:if="${event.status == 'ROUND1'}" th:action="@{/admin/courses/events/{id}/process(id=${event.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('确认执行抽签结算？此操作不可撤销。')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary btn-sm">执行抽签结算</button>
            </form>
            <form th:if="${event.status == 'ROUND2'}" th:action="@{/admin/courses/events/{id}/close(id=${event.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary btn-sm">关闭活动</button>
            </form>
        </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('tabCourses', this)">课程管理</button>
        <button class="tab-btn" onclick="switchTab('tabStudents', this)">参与学生</button>
    </div>

    <!-- Tab: 课程管理 -->
    <div class="tab-pane active" id="tabCourses">
        <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
            <button class="btn btn-primary btn-sm" onclick="openModal('addCourseModal')">+ 新增课程</button>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>课程名称</th><th>授课教师</th><th>名额模式</th><th>名额</th><th>已确认</th><th>状态</th><th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(courses)}">
                    <td colspan="7" style="text-align:center;color:#aaa;">暂无课程</td>
                </tr>
                <tr th:each="c : ${courses}">
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.teacher?.name ?: '—'}"></td>
                    <td th:text="${c.capacityMode == 'GLOBAL'} ? '全局名额' : '按班名额'"></td>
                    <td th:text="${c.totalCapacity}"></td>
                    <td th:text="${c.currentCount}"></td>
                    <td>
                        <span class="badge" th:classappend="${c.status == 'ACTIVE'} ? 'badge-active' : 'badge-draft'"
                              th:text="${c.status == 'DRAFT'} ? '草稿' : (${c.status == 'ACTIVE'} ? '已发布' : '已关闭')"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/courses/{eid}/courses/{cid}/enrollments(eid=${event.id},cid=${c.id})}"
                           class="btn btn-secondary btn-xs">名单</a>
                        <form th:if="${c.status == 'DRAFT'}" th:action="@{/admin/courses/{eid}/courses/{cid}/activate(eid=${event.id},cid=${c.id})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-primary btn-xs">发布</button>
                        </form>
                        <form th:if="${c.status == 'ACTIVE'}" th:action="@{/admin/courses/{eid}/courses/{cid}/close(eid=${event.id},cid=${c.id})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-secondary btn-xs">下架</button>
                        </form>
                        <form th:action="@{/admin/courses/{eid}/courses/{cid}/delete(eid=${event.id},cid=${c.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('确认删除？')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-danger btn-xs">删除</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Tab: 参与学生 -->
    <div class="tab-pane" id="tabStudents">
        <p style="font-size:.88rem;color:#666;margin-bottom:12px;">
            当前参与学生 <strong th:text="${#lists.size(eventStudents)}">0</strong> 人。
            <span style="color:#e67e22;">若不设置名单，则本校所有学生均可参与。</span>
            学生初始密码=学号。
        </p>
        <form th:action="@{/admin/courses/{id}/students/save(id=${event.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
                <select id="gradeFilter" onchange="onGradeChange()" style="padding:.4rem .7rem;border:1px solid #ddd;border-radius:6px;font-size:.88rem;">
                    <option value="">全部年级</option>
                    <option th:each="g : ${allGrades}" th:value="${g.id}" th:text="${g.name}"></option>
                </select>
                <select id="classFilter" onchange="filterStudents()" style="padding:.4rem .7rem;border:1px solid #ddd;border-radius:6px;font-size:.88rem;">
                    <option value="">全部班级</option>
                    <option th:each="c : ${allClasses}" th:value="${c.id}"
                            th:attr="data-gradeid=${c.grade != null ? c.grade.id : ''}"
                            th:text="${c.name}"></option>
                </select>
                <input type="text" id="studentSearch" oninput="filterStudents()" placeholder="搜索学生姓名/学号"
                       style="padding:.4rem .7rem;border:1px solid #ddd;border-radius:6px;font-size:.88rem;width:180px;">
            </div>
            <div class="select-all-bar">
                <button type="button" class="btn btn-secondary btn-xs" onclick="selectAll()">全选（当前筛选）</button>
                <button type="button" class="btn btn-secondary btn-xs" onclick="selectNone()">取消全选</button>
            </div>
            <div class="student-checklist" id="studentChecklist">
                <div th:each="s : ${allStudents}" class="student-check-item"
                     th:attr="data-sname=${s.name},data-sno=${s.studentNo},data-classid=${s.schoolClass != null ? s.schoolClass.id : ''},data-gradeid=${s.schoolClass != null and s.schoolClass.grade != null ? s.schoolClass.grade.id : ''}">
                    <input type="checkbox" name="studentIds" th:value="${s.id}"
                           th:checked="${#lists.contains(eventStudents, s)}">
                    <span th:text="${s.name} + ' (' + ${s.studentNo} + ') ' + (${s.schoolClass?.name} ?: '')"></span>
                </div>
            </div>
            <div style="margin-top:12px;">
                <button type="submit" class="btn btn-primary">保存参与学生名单</button>
                <span style="font-size:.82rem;color:#aaa;margin-left:8px;">保存空名单=不限制参与学生</span>
            </div>
        </form>
    </div>
</div>

<!-- 新增课程弹窗 -->
<div class="modal-overlay" id="addCourseModal">
    <div class="modal modal-wide">
        <div class="modal-header">
            <h3>新增课程</h3>
            <button class="modal-close" onclick="closeModal('addCourseModal')">×</button>
        </div>
        <form th:action="@{/admin/courses/{id}/courses/save(id=${event.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>课程名称 *</label>
                        <input type="text" name="name" required placeholder="如：篮球">
                    </div>
                    <div class="form-group">
                        <label>授课教师</label>
                        <select name="teacherId">
                            <option value="">— 不指定 —</option>
                        </select>
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>课程简介</label>
                        <textarea name="description" rows="2" placeholder="选填"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>名额模式 *</label>
                        <select name="capacityMode" id="capacityModeAdd" onchange="toggleCapacityMode(this,'addCapacityRows','addPerClass')">
                            <option value="GLOBAL">全局名额（班级共享）</option>
                            <option value="PER_CLASS">按班名额</option>
                        </select>
                    </div>
                    <div class="form-group" id="addCapacityRows">
                        <label>总名额 *</label>
                        <input type="number" name="totalCapacity" min="1" value="30">
                    </div>
                </div>
                <!-- 按班名额配置 -->
                <div id="addPerClass" class="per-class-rows">
                    <p style="font-size:.83rem;color:#888;margin:0 0 8px;">为每个班级分别设置名额：</p>
                    <div th:each="c : ${allClasses}" class="per-class-row">
                        <input type="hidden" name="classIds" th:value="${c.id}">
                        <span th:text="${c.grade?.name} + ' ' + ${c.name}"></span>
                        <input type="number" name="classCapacities" min="0" value="0" style="width:80px;">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addCourseModal')">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
}

function toggleCapacityMode(sel, globalRowId, perClassId) {
    const isGlobal = sel.value === 'GLOBAL';
    document.getElementById(globalRowId).style.display = isGlobal ? '' : 'none';
    document.getElementById(perClassId).style.display = isGlobal ? 'none' : 'block';
}

function onGradeChange() {
    const gradeId = document.getElementById('gradeFilter').value;
    document.querySelectorAll('#classFilter option[data-gradeid]').forEach(opt => {
        if (!gradeId || opt.dataset.gradeid === gradeId) {
            opt.style.display = '';
        } else {
            opt.style.display = 'none';
        }
    });
    // 若当前选中的班级不属于新年级，则重置班级下拉
    const clsSel = document.getElementById('classFilter');
    const selected = clsSel.options[clsSel.selectedIndex];
    if (selected && selected.dataset.gradeid && gradeId && selected.dataset.gradeid !== gradeId) {
        clsSel.value = '';
    }
    filterStudents();
}

function filterStudents() {
    const grade = document.getElementById('gradeFilter').value;
    const cls   = document.getElementById('classFilter').value;
    const kw    = document.getElementById('studentSearch').value.toLowerCase();
    document.querySelectorAll('#studentChecklist .student-check-item').forEach(el => {
        const matchGrade = !grade || el.dataset.gradeid === grade;
        const matchClass = !cls   || el.dataset.classid === cls;
        const matchKw    = !kw    || (el.dataset.sname || '').toLowerCase().includes(kw)
                                  || (el.dataset.sno   || '').toLowerCase().includes(kw);
        el.style.display = (matchGrade && matchClass && matchKw) ? '' : 'none';
    });
}
function selectAll()  { document.querySelectorAll('#studentChecklist .student-check-item').forEach(item => { if(item.style.display !== 'none') item.querySelector('input[type=checkbox]').checked = true; }); }
function selectNone() { document.querySelectorAll('#studentChecklist input[type=checkbox]').forEach(cb => cb.checked = false); }
</script>
</body>
</html>
