<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 12px;
            width: 520px;
            max-width: 95vw;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .18);
            animation: modalIn .2s ease;
        }
        @keyframes modalIn {
            from { transform: translateY(-24px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: #4a90e2;
            border-radius: 12px 12px 0 0;
        }
        .modal-header h3 { font-size: 16px; color: #fff; margin: 0; }
        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            color: rgba(255, 255, 255, .8);
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
        }
        .modal-close:hover { color: #fff; }
        .modal-body { padding: 24px; }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 24px;
            border-top: 1px solid #eee;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-grid .full { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; color: #555; font-weight: 500; }
        .form-group input, .form-group select {
            padding: 8px 11px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color .2s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: #4a90e2; }
        .form-group select[multiple] { height: 140px; }
        .form-hint { font-size: 12px; color: #999; margin-top: 2px; }
        .type-badge {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .type-badge.teacher { background: #e8f0fe; color: #2f6fe4; }
        .type-badge.admin { background: #fff1df; color: #c26a00; }
        .teacher-filter-card { background:#f8f9fa;border:1px solid #e9ecef;border-radius:8px;padding:14px 18px;margin-bottom:16px; }
        .teacher-filter-layout { display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between; }
        .teacher-filter-form { display:flex;gap:12px;align-items:center;flex-wrap:wrap; }
        .teacher-filter-actions { display:flex;gap:8px;flex-shrink:0; }
        .teacher-pager { display:flex;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap;gap:10px;padding:0 2px; }
        .teacher-page-links { display:flex;gap:4px;align-items:center;flex-wrap:wrap; }
        .teacher-jump-form { display:flex;align-items:center;gap:6px; }
        @media (max-width: 768px) {
            .teacher-filter-layout,
            .teacher-filter-form,
            .teacher-filter-actions,
            .teacher-pager,
            .teacher-page-links,
            .teacher-jump-form {
                flex-direction: column;
                align-items: stretch;
            }
            .teacher-filter-layout > *,
            .teacher-filter-form > *,
            .teacher-filter-form > div,
            .teacher-filter-actions > *,
            .teacher-pager > *,
            .teacher-page-links > *,
            .teacher-jump-form > * {
                width: 100%;
            }
            .teacher-filter-form input,
            .teacher-jump-form input {
                width: 100% !important;
            }
            td .form-inline {
                flex-direction: column;
                align-items: stretch;
            }
            td .form-inline input,
            td .form-inline .btn,
            td .btn,
            td form {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin}">管理后台</a>
        <a th:href="@{/dashboard}">首页</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="page-header">
        <h2>教师管理</h2>
    </div>

    <div class="teacher-filter-card">
        <div class="teacher-filter-layout">
            <form th:action="@{/admin/teachers}" method="get" class="teacher-filter-form">
                <div style="display:flex;align-items:center;gap:6px">
                    <label style="font-size:13px;color:#555;white-space:nowrap;font-weight:500">姓名</label>
                    <input type="text" name="name" th:value="${searchName}" placeholder="搜索姓名"
                           style="padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:130px;outline:none">
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                    <label style="font-size:13px;color:#555;white-space:nowrap;font-weight:500">用户名</label>
                    <input type="text" name="username" th:value="${searchUsername}" placeholder="搜索用户名"
                           style="padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:130px;outline:none">
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                    <label style="font-size:13px;color:#555;white-space:nowrap;font-weight:500">手机号</label>
                    <input type="text" name="phone" th:value="${searchPhone}" placeholder="搜索手机号"
                           style="padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:140px;outline:none">
                </div>
                <button type="submit" class="btn btn-secondary" style="padding:7px 18px">搜索</button>
                <a th:href="@{/admin/teachers}" class="btn btn-outline" style="padding:7px 18px">清除</a>
            </form>
            <div class="teacher-filter-actions">
                <button class="btn btn-primary" type="button" onclick="openAddModal()">+ 添加账号</button>
                <form th:action="@{/admin/teachers/delete-all}" method="post" style="display:inline"
                      onsubmit="return confirm('确认删除全部教师数据？此操作不可恢复！')">
                    <button type="submit" class="btn btn-danger">删除全部</button>
                </form>
            </div>
        </div>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>用户名</th>
            <th>姓名</th>
            <th>手机号</th>
            <th>账号类型</th>
            <th>已分配班级</th>
            <th>重置密码</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${teachers}">
            <td th:text="${t.username}"></td>
            <td th:text="${t.name}"></td>
            <td th:text="${t.phone != null ? t.phone : '-'}"></td>
            <td>
                <span class="type-badge"
                      th:classappend="${t.courseAssignableTeacher} ? ' teacher' : ' admin'"
                      th:text="${t.accountTypeDisplay}"></span>
            </td>
            <td>
                <span th:each="label : ${teacherClassNames[t.id]}"
                      th:text="${label}"
                      style="display:inline-block;background:#e8f0fe;color:#4a90e2;border-radius:4px;padding:1px 7px;font-size:12px;margin:1px"></span>
                <span th:if="${teacherClassNames[t.id] == null}"
                      style="color:#bbb;font-size:13px">未分配</span>
            </td>
            <td>
                <form th:action="@{/admin/teachers/reset-password/{id}(id=${t.id})}" method="post" class="form-inline">
                    <input type="password" name="newPassword" placeholder="新密码" required>
                    <button type="submit" class="btn btn-sm btn-secondary">重置</button>
                </form>
            </td>
            <td style="white-space:nowrap">
                <button class="btn btn-sm btn-secondary" th:if="${t.courseAssignableTeacher}"
                        th:data-id="${t.id}" th:data-name="${t.name}"
                        onclick="openAssignModal(this.dataset.id, this.dataset.name)">分配班级</button>
                <form th:action="@{/admin/teachers/delete/{id}(id=${t.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('确认删除？')">
                    <button type="submit" class="btn btn-sm btn-danger"
                            th:disabled="${t.role == 'ADMIN'}">删除</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="teacher-pager">
        <div style="font-size:13px;color:#666">
            共 <strong th:text="${teacherPage.totalElements}"></strong> 条记录，
            每页 15 条，第 <strong th:text="${teacherPage.number + 1}"></strong> /
            <strong th:text="${teacherPage.totalPages > 0 ? teacherPage.totalPages : 1}"></strong> 页
        </div>
        <div class="teacher-page-links" th:if="${teacherPage.totalPages > 1}">
            <a th:if="${!teacherPage.first}"
               th:href="@{/admin/teachers(page=${teacherPage.number - 1},name=${searchName},username=${searchUsername},phone=${searchPhone})}"
               class="btn btn-sm btn-outline">‹ 上一页</a>
            <span th:if="${teacherPage.first}" class="btn btn-sm btn-outline" style="opacity:.4;cursor:default">‹ 上一页</span>
            <th:block th:each="i : ${#numbers.sequence(0, teacherPage.totalPages - 1)}">
                <a th:if="${i != teacherPage.number}"
                   th:href="@{/admin/teachers(page=${i},name=${searchName},username=${searchUsername},phone=${searchPhone})}"
                   th:text="${i + 1}" class="btn btn-sm btn-outline"></a>
                <span th:if="${i == teacherPage.number}"
                      th:text="${i + 1}" class="btn btn-sm btn-primary" style="cursor:default"></span>
            </th:block>
            <a th:if="${!teacherPage.last}"
               th:href="@{/admin/teachers(page=${teacherPage.number + 1},name=${searchName},username=${searchUsername},phone=${searchPhone})}"
               class="btn btn-sm btn-outline">下一页 ›</a>
            <span th:if="${teacherPage.last}" class="btn btn-sm btn-outline" style="opacity:.4;cursor:default">下一页 ›</span>
        </div>
        <form th:action="@{/admin/teachers}" method="get"
              class="teacher-jump-form"
              onsubmit="handlePageJump(event, this)">
            <input type="hidden" name="name" th:value="${searchName}">
            <input type="hidden" name="username" th:value="${searchUsername}">
            <input type="hidden" name="phone" th:value="${searchPhone}">
            <input type="hidden" name="page" id="jumpPageVal" value="0">
            <span style="font-size:13px;color:#666">跳转到</span>
            <input type="number" id="jumpInput" min="1"
                   th:max="${teacherPage.totalPages > 0 ? teacherPage.totalPages : 1}"
                   style="width:58px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;text-align:center"
                   placeholder="页码">
            <span style="font-size:13px;color:#666">页</span>
            <button type="submit" class="btn btn-sm btn-secondary">跳转</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>添加账号</h3>
            <button class="modal-close" type="button" onclick="closeAddModal()">×</button>
        </div>
        <form th:action="@{/admin/teachers/add}" method="post">
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>姓名 <span style="color:#e74c3c">*</span></label>
                        <input type="text" name="name" placeholder="请输入姓名" required>
                    </div>
                    <div class="form-group">
                        <label>手机号 <span style="color:#e74c3c">*</span></label>
                        <input type="tel" name="phone" placeholder="请输入手机号（同时作为用户名）" required>
                    </div>
                    <div class="form-group">
                        <label>账号类型 <span style="color:#e74c3c">*</span></label>
                        <select name="accountType">
                            <option value="TEACHER">教师</option>
                            <option value="ORG_ADMIN">组织管理员</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>组织管理员类型</label>
                        <select name="orgAdminType">
                            <option value="">- 非组织管理员 -</option>
                            <option value="CITY" th:if="${!restrictOrgAdminTypesToSchool}">市级</option>
                            <option value="DISTRICT" th:if="${!restrictOrgAdminTypesToSchool}">县区</option>
                            <option value="SCHOOL">学校</option>
                        </select>
                        <span class="form-hint">仅当账号类型为“组织管理员”时生效</span>
                    </div>
                    <div class="form-group full">
                        <label>初始密码 <span style="color:#e74c3c">*</span></label>
                        <input type="password" name="password" placeholder="请输入初始密码" required>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeAddModal()">取消</button>
                <button type="submit" class="btn btn-primary">确认添加</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="assignModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="assignTitle">分配班级</h3>
            <button class="modal-close" type="button" onclick="closeAssignModal()">×</button>
        </div>
        <form id="assignForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <div class="form-group">
                    <label>选择班级</label>
                    <select name="classIds" id="assignClassSelect" multiple>
                        <option th:each="c : ${classes}" th:value="${c.id}"
                                th:text="${(c.grade != null ? c.grade.name + ' ' : '') + c.name + ' [' + c.type + ']'}"></option>
                    </select>
                    <span class="form-hint">按住 Ctrl 可多选；不选任何班级则清空分配</span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeAssignModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const teacherClassIds = /*[[${teacherClassIds}]]*/ {};
</script>

<script>
function openAddModal() {
    document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
    document.getElementById('addModal').classList.remove('active');
}

function handlePageJump(event, form) {
    const input = document.getElementById('jumpInput');
    const value = parseInt(input.value, 10);
    const max = parseInt(input.max, 10);
    if (!value || value < 1 || value > max) {
        event.preventDefault();
        return;
    }
    document.getElementById('jumpPageVal').value = value - 1;
}

function openAssignModal(teacherId, teacherName) {
    document.getElementById('assignTitle').textContent = '分配班级 - ' + teacherName;
    document.getElementById('assignForm').action = '/admin/teachers/assign/' + teacherId;
    const select = document.getElementById('assignClassSelect');
    const assigned = teacherClassIds[String(teacherId)] || [];
    Array.from(select.options).forEach(option => {
        option.selected = assigned.includes(parseInt(option.value, 10));
    });
    document.getElementById('assignModal').classList.add('active');
}

function closeAssignModal() {
    document.getElementById('assignModal').classList.remove('active');
}

document.addEventListener('keydown', event => {
    if (event.key === 'Escape') {
        closeAddModal();
        closeAssignModal();
    }
});
</script>

<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 陈胜杰 版权所有</span>
</footer>
</body>
</html>
