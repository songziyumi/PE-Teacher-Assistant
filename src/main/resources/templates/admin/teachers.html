<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理 - 管理后台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f4f6fb; }
        .admin-wrap { max-width: 1240px; margin: 24px auto; padding: 0 16px 28px; }
        .hero-card {
            background: linear-gradient(135deg, #0f172a, #334155);
            color: #fff;
            border-radius: 18px;
            padding: 22px 24px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, .18);
            margin-bottom: 16px;
        }
        .hero-card h2 { margin: 0; font-size: 1.3rem; }
        .hero-card p { margin: 8px 0 0; opacity: .9; font-size: .9rem; line-height: 1.65; max-width: 760px; }
        .toolbar-card,
        .table-card {
            background: #fff;
            border: 1px solid #e8eef5;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
            padding: 16px;
            margin-bottom: 16px;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }
        .filter-grid input,
        .filter-grid select,
        .modal-body input,
        .modal-body select,
        .modal-body textarea,
        .teacher-jump-form input {
            width: 100%;
            min-height: 42px;
            padding: 0 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: .92rem;
            background: #fff;
            box-sizing: border-box;
        }
        .filter-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 12px;
        }
        .table-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .table-head h3 {
            margin: 0;
            font-size: 1rem;
            color: #1f2937;
        }
        .table-head p {
            margin: 4px 0 0;
            color: #64748b;
            font-size: .84rem;
        }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .type-badge {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: .76rem;
            font-weight: 700;
        }
        .type-badge.teacher { background: #dbeafe; color: #1d4ed8; }
        .type-badge.admin { background: #fef3c7; color: #92400e; }
        .class-tag {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 0 8px;
            border-radius: 999px;
            background: #eff6ff;
            color: #2563eb;
            font-size: .76rem;
            font-weight: 600;
            margin: 2px 4px 2px 0;
        }
        .inline-password {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .inline-password input {
            flex: 1 1 120px;
            min-height: 36px;
            padding: 0 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        .pager {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .page-links {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .teacher-jump-form {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .teacher-jump-form input {
            width: 64px;
            min-height: 34px;
            padding: 0 8px;
            text-align: center;
        }
        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
        .full { grid-column: 1 / -1; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: .84rem;
            color: #475569;
            font-weight: 600;
        }
        .form-group select[multiple] {
            height: 148px;
            padding: 10px 12px;
        }
        .form-hint {
            font-size: .76rem;
            color: #94a3b8;
            margin-top: 4px;
            line-height: 1.6;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .46);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            width: 560px;
            max-width: calc(100vw - 20px);
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(15, 23, 42, .22);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: linear-gradient(135deg, #0f172a, #334155);
            color: #fff;
        }
        .modal-header h3 { margin: 0; font-size: 1rem; }
        .modal-close {
            border: none;
            background: none;
            color: rgba(255, 255, 255, .82);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-body { padding: 18px; }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 18px;
            border-top: 1px solid #eef2f7;
        }
        @media (max-width: 1100px) {
            .filter-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 768px) {
            .admin-wrap { margin: 16px auto 24px; padding: 0 12px 24px; }
            .hero-card,
            .toolbar-card,
            .table-card,
            .modal-body { padding: 16px; }
            .filter-grid,
            .form-grid { grid-template-columns: 1fr; }
            .filter-actions,
            .pager,
            .page-links,
            .teacher-jump-form,
            .modal-footer,
            .inline-password {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-actions > *,
            .pager > *,
            .page-links > *,
            .teacher-jump-form > *,
            .modal-footer > *,
            .inline-password > * {
                width: 100%;
            }
            .full { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">管理后台</div>
    <div class="nav-links">
        <a th:href="@{/admin}">后台首页</a>
        <a th:href="@{/dashboard}">工作台</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="admin-wrap">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="hero-card">
        <h2>教师管理</h2>
        <p>管理教师与组织管理员账号，支持筛选、重置密码、分配班级和新建账号。</p>
    </div>

    <div class="toolbar-card">
        <form th:action="@{/admin/teachers}" method="get" class="filter-grid">
            <input type="text" name="name" th:value="${searchName}" placeholder="搜索姓名">
            <input type="text" name="username" th:value="${searchUsername}" placeholder="搜索用户名">
            <input type="text" name="phone" th:value="${searchPhone}" placeholder="搜索手机号">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button type="submit" class="btn btn-secondary">搜索</button>
                <a th:href="@{/admin/teachers}" class="btn btn-outline">清空</a>
            </div>
        </form>

        <div class="filter-actions">
            <button class="btn btn-primary" type="button" onclick="openAddModal()">添加账号</button>
            <form th:action="@{/admin/teachers/delete-all}" method="post" style="display:inline"
                  onsubmit="return confirm('确认删除全部教师数据？此操作不可恢复。')">
                <button type="submit" class="btn btn-danger">删除全部</button>
            </form>
        </div>
    </div>

    <div class="table-card">
        <div class="table-head">
            <div>
                <h3>教师列表</h3>
                <p>支持重置密码、查看班级归属和教师班级分配。</p>
            </div>
        </div>

        <div class="table-wrap">
            <table class="table">
                <thead>
                <tr>
                    <th>用户名</th>
                    <th>姓名</th>
                    <th>手机号</th>
                    <th>账号类型</th>
                    <th>已分配班级</th>
                    <th>重置密码</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${teachers}">
                    <td th:text="${t.username}"></td>
                    <td th:text="${t.name}"></td>
                    <td th:text="${t.phone != null ? t.phone : '-'}"></td>
                    <td>
                        <span class="type-badge"
                              th:classappend="${t.courseAssignableTeacher} ? ' teacher' : ' admin'"
                              th:text="${t.accountTypeDisplay}"></span>
                    </td>
                    <td>
                        <span th:each="label : ${teacherClassNames[t.id]}"
                              th:text="${label}"
                              class="class-tag"></span>
                        <span th:if="${teacherClassNames[t.id] == null}" style="color:#94a3b8;font-size:.84rem;">未分配</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/teachers/reset-password/{id}(id=${t.id})}" method="post" class="inline-password">
                            <input type="password" name="newPassword" placeholder="新密码" required>
                            <button type="submit" class="btn btn-sm btn-secondary">重置</button>
                        </form>
                    </td>
                    <td style="white-space:nowrap;">
                        <button class="btn btn-sm btn-secondary" type="button" th:if="${t.courseAssignableTeacher}"
                                th:data-id="${t.id}" th:data-name="${t.name}"
                                onclick="openAssignModal(this.dataset.id, this.dataset.name)">分配班级</button>
                        <form th:action="@{/admin/teachers/delete/{id}(id=${t.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('确认删除？')">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    th:disabled="${t.role == 'ADMIN'}">删除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pager">
            <div style="font-size:.82rem;color:#475569;">
                共 <strong th:text="${teacherPage.totalElements}"></strong> 条记录，
                第 <strong th:text="${teacherPage.number + 1}"></strong> /
                <strong th:text="${teacherPage.totalPages > 0 ? teacherPage.totalPages : 1}"></strong> 页
            </div>

            <div class="page-links" th:if="${teacherPage.totalPages > 1}">
                <a th:if="${!teacherPage.first}"
                   th:href="@{/admin/teachers(page=${teacherPage.number - 1},name=${searchName},username=${searchUsername},phone=${searchPhone})}"
                   class="btn btn-sm btn-outline">上一页</a>
                <span th:if="${teacherPage.first}" class="btn btn-sm btn-outline" style="opacity:.4;cursor:default;">上一页</span>
                <th:block th:each="i : ${#numbers.sequence(0, teacherPage.totalPages - 1)}">
                    <a th:if="${i != teacherPage.number}"
                       th:href="@{/admin/teachers(page=${i},name=${searchName},username=${searchUsername},phone=${searchPhone})}"
                       th:text="${i + 1}" class="btn btn-sm btn-outline"></a>
                    <span th:if="${i == teacherPage.number}"
                          th:text="${i + 1}" class="btn btn-sm btn-primary" style="cursor:default;"></span>
                </th:block>
                <a th:if="${!teacherPage.last}"
                   th:href="@{/admin/teachers(page=${teacherPage.number + 1},name=${searchName},username=${searchUsername},phone=${searchPhone})}"
                   class="btn btn-sm btn-outline">下一页</a>
                <span th:if="${teacherPage.last}" class="btn btn-sm btn-outline" style="opacity:.4;cursor:default;">下一页</span>
            </div>

            <form th:action="@{/admin/teachers}" method="get"
                  class="teacher-jump-form"
                  onsubmit="handlePageJump(event, this)">
                <input type="hidden" name="name" th:value="${searchName}">
                <input type="hidden" name="username" th:value="${searchUsername}">
                <input type="hidden" name="phone" th:value="${searchPhone}">
                <input type="hidden" name="page" id="jumpPageVal" value="0">
                <span style="font-size:.82rem;color:#475569;">跳转到</span>
                <input type="number" id="jumpInput" min="1"
                       th:max="${teacherPage.totalPages > 0 ? teacherPage.totalPages : 1}"
                       placeholder="页码">
                <button type="submit" class="btn btn-sm btn-secondary">跳转</button>
            </form>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>添加账号</h3>
            <button class="modal-close" type="button" onclick="closeAddModal()">×</button>
        </div>
        <form th:action="@{/admin/teachers/add}" method="post">
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" name="name" placeholder="请输入姓名" required>
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" name="phone" placeholder="请输入手机号，同时作为用户名" required>
                    </div>
                    <div class="form-group">
                        <label>账号类型</label>
                        <select name="accountType">
                            <option value="TEACHER">教师</option>
                            <option value="ORG_ADMIN">组织管理员</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>组织管理员类型</label>
                        <select name="orgAdminType">
                            <option value="">- 非组织管理员 -</option>
                            <option value="CITY" th:if="${!restrictOrgAdminTypesToSchool}">市级</option>
                            <option value="DISTRICT" th:if="${!restrictOrgAdminTypesToSchool}">区县级</option>
                            <option value="SCHOOL">学校级</option>
                        </select>
                        <span class="form-hint">仅当账号类型为“组织管理员”时生效。</span>
                    </div>
                    <div class="form-group full">
                        <label>初始密码</label>
                        <input type="password" name="password" placeholder="请输入初始密码" required>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeAddModal()">取消</button>
                <button type="submit" class="btn btn-primary">确认添加</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="assignModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="assignTitle">分配班级</h3>
            <button class="modal-close" type="button" onclick="closeAssignModal()">×</button>
        </div>
        <form id="assignForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <div class="form-group">
                    <label>选择班级</label>
                    <select name="classIds" id="assignClassSelect" multiple>
                        <option th:each="c : ${classes}" th:value="${c.id}"
                                th:text="${(c.grade != null ? c.grade.name + ' ' : '') + c.name + ' [' + c.type + ']'}"></option>
                    </select>
                    <span class="form-hint">按住 Ctrl 可多选；不选任何班级表示清空当前分配。</span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeAssignModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const teacherClassIds = /*[[${teacherClassIds}]]*/ {};
</script>

<script>
function openAddModal() {
    document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
    document.getElementById('addModal').classList.remove('active');
}

function handlePageJump(event) {
    const input = document.getElementById('jumpInput');
    const value = parseInt(input.value, 10);
    const max = parseInt(input.max, 10);
    if (!value || value < 1 || value > max) {
        event.preventDefault();
        return;
    }
    document.getElementById('jumpPageVal').value = value - 1;
}

function openAssignModal(teacherId, teacherName) {
    document.getElementById('assignTitle').textContent = '分配班级 - ' + teacherName;
    document.getElementById('assignForm').action = '/admin/teachers/assign/' + teacherId;
    const select = document.getElementById('assignClassSelect');
    const assigned = teacherClassIds[String(teacherId)] || [];
    Array.from(select.options).forEach(option => {
        option.selected = assigned.includes(parseInt(option.value, 10));
    });
    document.getElementById('assignModal').classList.add('active');
}

function closeAssignModal() {
    document.getElementById('assignModal').classList.remove('active');
}

document.addEventListener('keydown', event => {
    if (event.key === 'Escape') {
        closeAddModal();
        closeAssignModal();
    }
});
</script>

<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 陈胜松 版权所有</span>
</footer>
</body>
</html>
