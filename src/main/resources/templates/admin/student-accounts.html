<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生账号管理 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .filters {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px;
        }
        .filters input, .filters select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #f8fafc;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-unset { background: #f3f4f6; color: #6b7280; }
        .status-pending { background: #fff7ed; color: #c2410c; }
        .status-active { background: #ecfdf5; color: #047857; }
        .status-disabled { background: #fef2f2; color: #b91c1c; }
        .status-locked { background: #eff6ff; color: #1d4ed8; }
        .subtext {
            color: #6b7280;
            font-size: 12px;
        }
        .table-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
        }
        .pagination a, .pagination span {
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            text-decoration: none;
            color: #374151;
        }
        .pagination .active {
            background: #4a90e2;
            color: #fff;
            border-color: #4a90e2;
        }
        @media (max-width: 980px) {
            .filters {
                grid-template-columns: repeat(2, minmax(140px, 1fr));
            }
        }
        @media (max-width: 640px) {
            .filters {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin}">管理后台</a>
        <a th:href="@{/dashboard}">首页</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="page-header">
        <h2>学生账号管理</h2>
    </div>

    <form method="get" th:action="@{/admin/student-accounts}" class="filters">
        <select name="gradeId">
            <option value="" th:selected="${gradeId == null}">全部年级</option>
            <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}"
                    th:selected="${gradeId != null && gradeId == g.id}"></option>
        </select>
        <select name="classId">
            <option value="" th:selected="${classId == null}">全部班级</option>
            <option th:each="c : ${classes}" th:value="${c.id}"
                    th:text="${(c.grade != null ? c.grade.name + ' ' : '') + c.name}"
                    th:selected="${classId != null && classId == c.id}"></option>
        </select>
        <select name="accountStatus">
            <option value="" th:selected="${accountStatus == null || accountStatus == ''}">全部账号状态</option>
            <option value="UNGENERATED" th:selected="${accountStatus == 'UNGENERATED'}">未生成</option>
            <option value="PENDING" th:selected="${accountStatus == 'PENDING'}">未激活</option>
            <option value="ACTIVE" th:selected="${accountStatus == 'ACTIVE'}">正常</option>
            <option value="DISABLED" th:selected="${accountStatus == 'DISABLED'}">已禁用</option>
            <option value="LOCKED" th:selected="${accountStatus == 'LOCKED'}">已锁定</option>
        </select>
        <input type="text" name="keyword" th:value="${keyword}" placeholder="姓名或学号">
        <input type="hidden" name="size" th:value="${size}">
        <button type="submit" class="btn btn-secondary">搜索</button>
        <a th:href="@{/admin/student-accounts}" class="btn btn-outline">重置</a>
    </form>

    <form id="batchForm" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="gradeId" th:value="${gradeId}">
        <input type="hidden" name="classId" th:value="${classId}">
        <input type="hidden" name="keyword" th:value="${keyword}">
        <input type="hidden" name="accountStatus" th:value="${accountStatus}">

        <div class="actions">
            <button type="button" class="btn btn-primary" onclick="submitBatch('/admin/student-accounts/generate')">批量生成账号</button>
            <button type="button" class="btn btn-secondary" onclick="submitBatch('/admin/student-accounts/reset-password')">批量重置密码</button>
            <button type="button" class="btn btn-secondary" onclick="submitBatch('/admin/student-accounts/enable')">批量启用</button>
            <button type="button" class="btn btn-danger" onclick="submitBatch('/admin/student-accounts/disable')">批量禁用</button>
            <button type="button" class="btn btn-outline" onclick="submitBatch('/admin/student-accounts/export', 'get')">导出账号</button>
            <span class="subtext">导出内容包含初始密码，请妥善保管；学生首次登录后必须修改密码。</span>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>姓名</th>
                <th>学号</th>
                <th>班级</th>
                <th>账号</th>
                <th>账号状态</th>
                <th>激活</th>
                <th>已改密</th>
                <th>最后登录</th>
                <th>最近重置</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="11" style="text-align:center;color:#6b7280;">暂无学生账号数据</td>
            </tr>
            <tr th:each="row : ${rows}">
                <td><input type="checkbox" name="studentIds" th:value="${row.studentId}"></td>
                <td th:text="${row.name}"></td>
                <td th:text="${row.studentNo != null && row.studentNo != '' ? row.studentNo : '-'}"></td>
                <td th:text="${(row.gradeName != null ? row.gradeName : '') + ' ' + (row.className != null ? row.className : '')}"></td>
                <td th:text="${row.loginId == '' ? '-' : row.loginId}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="${row.status == '未生成'} ? ' status-unset' :
                                          (${row.status == '未激活'} ? ' status-pending' :
                                          (${row.status == '正常'} ? ' status-active' :
                                          (${row.status == '已禁用'} ? ' status-disabled' : ' status-locked')))"
                          th:text="${row.status}"></span>
                </td>
                <td th:text="${row.activated ? '是' : '否'}"></td>
                <td th:text="${row.passwordChanged ? '是' : '否'}"></td>
                <td th:text="${row.lastLoginAt != null ? #temporals.format(row.lastLoginAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                <td th:text="${row.lastPasswordResetAt != null ? #temporals.format(row.lastPasswordResetAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                <td>
                    <div class="table-actions">
                        <button type="button" class="btn btn-sm btn-primary"
                                th:if="${row.loginId == ''}"
                                th:attr="data-id=${row.studentId}"
                                onclick="submitSingle('/admin/student-accounts/generate', this.dataset.id)">生成账号</button>
                        <button type="button" class="btn btn-sm btn-secondary"
                                th:if="${row.loginId != ''}"
                                th:attr="data-id=${row.studentId}"
                                onclick="submitSingle('/admin/student-accounts/reset-password', this.dataset.id)">重置密码</button>
                        <button type="button" class="btn btn-sm btn-secondary"
                                th:if="${row.loginId != '' && !row.enabled}"
                                th:attr="data-id=${row.studentId}"
                                onclick="submitSingle('/admin/student-accounts/enable', this.dataset.id)">启用</button>
                        <button type="button" class="btn btn-sm btn-danger"
                                th:if="${row.loginId != '' && row.enabled}"
                                th:attr="data-id=${row.studentId}"
                                onclick="submitSingle('/admin/student-accounts/disable', this.dataset.id)">禁用</button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </form>

    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${page > 0}"
           th:href="@{/admin/student-accounts(page=${page - 1},size=${size},gradeId=${gradeId},classId=${classId},keyword=${keyword},accountStatus=${accountStatus})}">上一页</a>
        <span th:unless="${page > 0}">上一页</span>
        <span class="active" th:text="${page + 1}"></span>
        <span>/</span>
        <span th:text="${totalPages}"></span>
        <a th:if="${page + 1 < totalPages}"
           th:href="@{/admin/student-accounts(page=${page + 1},size=${size},gradeId=${gradeId},classId=${classId},keyword=${keyword},accountStatus=${accountStatus})}">下一页</a>
        <span th:unless="${page + 1 < totalPages}">下一页</span>
    </div>
</div>

<script>
const selectAll = document.getElementById('selectAll');
if (selectAll) {
    selectAll.addEventListener('change', function () {
        document.querySelectorAll('input[name="studentIds"]').forEach(item => {
            item.checked = selectAll.checked;
        });
    });
}

function submitBatch(action, method = 'post') {
    const form = document.getElementById('batchForm');
    form.action = action;
    form.method = method;
    form.submit();
}

function submitSingle(action, studentId) {
    const form = document.getElementById('batchForm');
    document.querySelectorAll('input[name="studentIds"]').forEach(item => item.checked = false);
    const target = document.querySelector('input[name="studentIds"][value="' + studentId + '"]');
    if (target) {
        target.checked = true;
    }
    form.action = action;
    form.method = 'post';
    form.submit();
}
</script>
</body>
</html>
