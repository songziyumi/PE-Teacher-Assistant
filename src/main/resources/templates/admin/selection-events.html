<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课活动管理 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:flex-start; justify-content:center; overflow-y:auto; padding:24px 0; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:12px; width:560px; max-width:96vw; box-shadow:0 8px 32px rgba(0,0,0,.18); animation:modalIn .2s ease; margin:auto; }
        @keyframes modalIn { from{transform:translateY(-24px);opacity:0} to{transform:translateY(0);opacity:1} }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; background:#4a90e2; border-radius:12px 12px 0 0; }
        .modal-header h3 { font-size:16px; color:#fff; margin:0; }
        .modal-close { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }
        .modal-body { padding:24px; }
        .modal-footer { padding:16px 24px; border-top:1px solid #eee; display:flex; gap:.75rem; justify-content:flex-end; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
        .form-row.single { grid-template-columns:1fr; }
        .form-group label { display:block; font-size:.85rem; font-weight:600; color:#555; margin-bottom:.3rem; }
        .form-group input, .form-group select { width:100%; padding:.45rem .7rem; border:1px solid #ddd; border-radius:6px; font-size:.9rem; box-sizing:border-box; }
        .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.78rem; font-weight:600; }
        .badge-draft    { background:#f0f0f0; color:#888; }
        .badge-round1   { background:#2980b9; color:#fff; }
        .badge-processing { background:#f39c12; color:#fff; }
        .badge-round2   { background:#27ae60; color:#fff; }
        .badge-closed   { background:#bdc3c7; color:#fff; }
        .event-card { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:20px 24px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .event-info h3 { margin:0 0 6px; font-size:1.05rem; }
        .event-meta { font-size:.83rem; color:#888; }
        .event-actions { display:flex; gap:8px; flex-wrap:wrap; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin}">管理后台</a>
        <span class="nav-user" th:text="${currentSchool?.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2>选课活动管理</h2>
        <div style="display:flex;gap:8px;">
            <a th:href="@{/admin/student-accounts}" class="btn btn-secondary">学生账号管理</a>
            <button class="btn btn-primary" onclick="openModal('addModal')">+ 新建活动并设置参与学生</button>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(events)}" class="empty-state">
        <p>暂无选课活动，点击右上角新建</p>
    </div>

    <div th:each="event : ${events}" class="event-card">
        <div class="event-info">
            <h3 th:text="${event.name}"></h3>
            <div class="event-meta">
                第一轮：<span th:text="${event.round1Start} ? ${#temporals.format(event.round1Start,'MM-dd HH:mm')} : '未设置'"></span>
                ～ <span th:text="${event.round1End} ? ${#temporals.format(event.round1End,'MM-dd HH:mm')} : '未设置'"></span>
                &nbsp;|&nbsp;
                第二轮：<span th:text="${event.round2Start} ? ${#temporals.format(event.round2Start,'MM-dd HH:mm')} : '未设置'"></span>
                ～ <span th:text="${event.round2End} ? ${#temporals.format(event.round2End,'MM-dd HH:mm')} : '未设置'"></span>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <span class="badge"
                  th:classappend="${event.status == 'DRAFT'} ? 'badge-draft' :
                                  (${event.status == 'ROUND1'} ? 'badge-round1' :
                                  (${event.status == 'PROCESSING'} ? 'badge-processing' :
                                  (${event.status == 'ROUND2'} ? 'badge-round2' : 'badge-closed')))"
                  th:text="${event.status == 'DRAFT'} ? '草稿' :
                            (${event.status == 'ROUND1'} ? '第一轮进行中' :
                            (${event.status == 'PROCESSING'} ? '结算中' :
                            (${event.status == 'ROUND2'} ? '第二轮进行中' : '已关闭')))">
            </span>
            <!-- 抽签进度显示 -->
            <span th:if="${event.status == 'PROCESSING' and event.lotteryNote != null}"
                  th:id="'lottery-note-' + ${event.id}"
                  style="font-size:.78rem;color:#f39c12;font-weight:600;"
                  th:text="${event.lotteryNote}"></span>
            <span th:if="${event.status == 'PROCESSING'}"
                  style="display:block;font-size:.76rem;color:#6b7280;margin-top:4px;">
                当前规则：先结算第一志愿，再结算第二志愿
            </span>
            <div class="event-actions">
                <a th:href="@{/admin/courses/{id}/detail(id=${event.id})}" class="btn btn-secondary btn-sm">管理</a>
                <button class="btn btn-secondary btn-sm edit-btn"
                        th:data-id="${event.id}"
                        th:data-name="${event.name}"
                        th:data-r1s="${event.round1Start}"
                        th:data-r1e="${event.round1End}"
                        th:data-r2s="${event.round2Start}"
                        th:data-r2e="${event.round2End}">编辑</button>
                <form th:action="@{/admin/courses/events/{id}/delete(id=${event.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('确认删除此活动？')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger btn-sm">删除</button>
                </form>
                <span th:if="${event.status != 'DRAFT'}"
                      style="display:inline-block;margin-left:4px;font-size:.74rem;color:#6b7280;">
                    仅草稿活动可删除
                </span>
            </div>
        </div>
    </div>
</div>

<!-- 新建活动弹窗 -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>新建选课活动</h3>
            <button class="modal-close" onclick="closeModal('addModal')">×</button>
        </div>
        <form th:action="@{/admin/courses/events/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <p style="margin:0 0 12px;color:#666;font-size:.86rem;">
                    先填写活动基础信息，保存后会进入“参与学生”步骤，再配置课程和名额。
                </p>
                <div class="form-row single">
                    <div class="form-group">
                        <label>活动名称 *</label>
                        <input type="text" name="name" required placeholder="如：2026年春季体育选课">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>第一轮开始时间</label>
                        <input type="datetime-local" name="round1Start">
                    </div>
                    <div class="form-group">
                        <label>第一轮结束时间</label>
                        <input type="datetime-local" name="round1End">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>第二轮开始时间</label>
                        <input type="datetime-local" name="round2Start">
                    </div>
                    <div class="form-group">
                        <label>第二轮结束时间</label>
                        <input type="datetime-local" name="round2End">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
                <button type="submit" class="btn btn-primary">下一步：参与学生</button>
            </div>
        </form>
    </div>
</div>

<!-- 编辑活动弹窗 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h3>编辑活动</h3>
            <button class="modal-close" onclick="closeModal('editModal')">×</button>
        </div>
        <form th:action="@{/admin/courses/events/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" id="editId">
            <div class="modal-body">
                <div class="form-row single">
                    <div class="form-group">
                        <label>活动名称 *</label>
                        <input type="text" name="name" id="editName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>第一轮开始时间</label>
                        <input type="datetime-local" name="round1Start" id="editR1S">
                    </div>
                    <div class="form-group">
                        <label>第一轮结束时间</label>
                        <input type="datetime-local" name="round1End" id="editR1E">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>第二轮开始时间</label>
                        <input type="datetime-local" name="round2Start" id="editR2S">
                    </div>
                    <div class="form-group">
                        <label>第二轮结束时间</label>
                        <input type="datetime-local" name="round2End" id="editR2E">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('editModal')">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// 编辑按钮：从 data-* 属性读值
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.edit-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.getElementById('editId').value   = btn.dataset.id;
            document.getElementById('editName').value = btn.dataset.name;
            function fmt(v) { return (v && v !== 'null') ? v.substring(0, 16) : ''; }
            document.getElementById('editR1S').value = fmt(btn.dataset.r1s);
            document.getElementById('editR1E').value = fmt(btn.dataset.r1e);
            document.getElementById('editR2S').value = fmt(btn.dataset.r2s);
            document.getElementById('editR2E').value = fmt(btn.dataset.r2e);
            openModal('editModal');
        });
    });

    // 轮询抽签进度（每10秒）
    const processingNotes = document.querySelectorAll('[id^="lottery-note-"]');
    if (processingNotes.length > 0) {
        processingNotes.forEach(function(noteEl) {
            const eventId = noteEl.id.replace('lottery-note-', '');
            const poll = setInterval(function() {
                fetch('/admin/courses/events/' + eventId + '/lottery-status')
                    .then(r => r.json())
                    .then(data => {
                        noteEl.textContent = data.note || '';
                        if (data.status !== 'PROCESSING') {
                            clearInterval(poll);
                            // 自动刷新页面以更新状态徽章
                            setTimeout(() => location.reload(), 1500);
                        }
                    })
                    .catch(() => {});
            }, 10000);
        });
    }
});
</script>
</body>
</html>
