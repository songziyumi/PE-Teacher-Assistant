<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课活动管理 - 管理后台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .admin-wrap { max-width:1160px; margin:24px auto; padding:0 16px 28px; }
        .hero-card {
            background:linear-gradient(135deg,#0f172a,#334155);
            color:#fff; border-radius:18px; padding:22px 24px; box-shadow:0 14px 30px rgba(15,23,42,.18); margin-bottom:16px;
        }
        .hero-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .hero-card h2 { margin:0; font-size:1.3rem; }
        .hero-card p { margin:8px 0 0; opacity:.9; font-size:.9rem; line-height:1.65; max-width:760px; }
        .hero-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .event-card {
            background:#fff; border:1px solid #e8eef5; border-radius:16px; box-shadow:0 8px 24px rgba(15,23,42,.05);
            padding:18px; margin-bottom:16px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap;
        }
        .event-info h3 { margin:0 0 8px; font-size:1.05rem; color:#1f2937; }
        .event-meta { font-size:.83rem; color:#64748b; line-height:1.7; }
        .badge { display:inline-flex; align-items:center; min-height:28px; padding:0 10px; border-radius:999px; font-size:.76rem; font-weight:700; }
        .badge-draft { background:#f3f4f6; color:#6b7280; }
        .badge-round1 { background:#dbeafe; color:#1d4ed8; }
        .badge-processing { background:#fef3c7; color:#92400e; }
        .badge-round2 { background:#dcfce7; color:#166534; }
        .badge-closed { background:#e5e7eb; color:#475569; }
        .event-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-start; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,.46); z-index:1000; align-items:flex-start; justify-content:center; overflow-y:auto; padding:24px 0; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:16px; width:580px; max-width:96vw; box-shadow:0 18px 40px rgba(15,23,42,.22); margin:auto; }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; background:linear-gradient(135deg,#0f172a,#334155); border-radius:16px 16px 0 0; }
        .modal-header h3 { font-size:1rem; color:#fff; margin:0; }
        .modal-close { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }
        .modal-body { padding:18px; }
        .modal-footer { padding:16px 18px; border-top:1px solid #eee; display:flex; gap:.75rem; justify-content:flex-end; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
        .form-row.single { grid-template-columns:1fr; }
        .form-group label { display:block; font-size:.85rem; font-weight:600; color:#475569; margin-bottom:.35rem; }
        .form-group input { width:100%; padding:.55rem .7rem; border:1px solid #d1d5db; border-radius:10px; font-size:.9rem; box-sizing:border-box; }
        @media (max-width: 768px) {
            .admin-wrap { margin:16px auto 24px; padding:0 12px 24px; }
            .hero-card, .event-card, .modal-body { padding:16px; }
            .hero-actions, .event-actions, .modal-footer { width:100%; flex-direction:column; align-items:stretch; }
            .hero-actions .btn, .event-actions .btn, .event-actions form, .modal-footer .btn { width:100%; }
            .form-row { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">管理后台</div>
    <div class="nav-links">
        <a th:href="@{/admin}">后台首页</a>
        <span class="nav-user" th:text="${currentSchool != null ? currentSchool.name : ''}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>

<div class="admin-wrap">
    <div class="hero-card">
        <div class="hero-top">
            <div>
                <h2>选课活动管理</h2>
                <p>创建并维护选课活动，控制轮次时间、参与学生、课程配置和活动状态。</p>
            </div>
            <div class="hero-actions">
                <a th:href="@{/admin/course-selection-diagnostics}" class="btn btn-secondary">抢课诊断面板</a>
                <a th:href="@{/admin/student-accounts}" class="btn btn-secondary">学生账号管理</a>
                <button class="btn btn-primary" onclick="openModal('addModal')">新建活动并设置参与学生</button>
            </div>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(events)}" class="empty-state">
        <p>暂无选课活动，点击上方按钮新建。</p>
    </div>

    <div th:each="event : ${events}" class="event-card">
        <div class="event-info">
            <h3 th:text="${event.name}"></h3>
            <div class="event-meta">
                第一轮：<span th:text="${event.round1Start != null ? #temporals.format(event.round1Start,'MM-dd HH:mm') : '未设置'}"></span>
                ~<span th:text="${event.round1End != null ? #temporals.format(event.round1End,'MM-dd HH:mm') : '未设置'}"></span>
            </div>
            <div class="event-meta">
                第二轮：<span th:text="${event.round2Start != null ? #temporals.format(event.round2Start,'MM-dd HH:mm') : '未设置'}"></span>
                ~<span th:text="${event.round2End != null ? #temporals.format(event.round2End,'MM-dd HH:mm') : '未设置'}"></span>
            </div>
            <div class="event-meta">
                第三轮：<span th:text="${event.round3Start != null ? #temporals.format(event.round3Start,'MM-dd HH:mm') : '-'}"></span>
                ~<span th:text="${event.round3End != null ? #temporals.format(event.round3End,'MM-dd HH:mm') : '-'}"></span>
            </div>
            <div class="event-meta" th:if="${event.status == 'ROUND1' and event.round1End != null}" style="margin-top:6px;">
                自动抽签时间：<span th:text="${#temporals.format(event.round1End.plusMinutes(5),'MM-dd HH:mm')}"></span>
            </div>
        </div>
        <div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
                <span class="badge" th:classappend="${event.adminDisplayStatusBadgeClass}" th:text="${event.adminDisplayStatusText}"></span>
                <span th:if="${event.status == 'PROCESSING' and event.lotteryNote != null}"
                      th:id="|lottery-note-${event.id}|" style="font-size:.78rem;color:#92400e;font-weight:700;" th:text="${event.lotteryNote}"></span>
            </div>
            <div class="event-actions">
                <a th:href="@{/admin/courses/{id}/detail(id=${event.id})}" class="btn btn-secondary btn-sm">管理</a>
                <button class="btn btn-secondary btn-sm edit-btn"
                        th:data-id="${event.id}" th:data-name="${event.name}"
                        th:data-r1s="${event.round1Start}" th:data-r1e="${event.round1End}"
                        th:data-r2s="${event.round2Start}" th:data-r2e="${event.round2End}"
                        th:data-r3s="${event.round3Start}" th:data-r3e="${event.round3End}">编辑</button>
                <form th:action="@{/admin/courses/events/{id}/delete(id=${event.id})}" method="post"
                      onsubmit="return confirm('确认删除这个选课活动吗？此操作会同时删除课程、参与名单、志愿和选课记录，且不可恢复。')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger btn-sm">删除</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>新建选课活动</h3>
            <button class="modal-close" onclick="closeModal('addModal')">×</button>
        </div>
        <form th:action="@{/admin/courses/events/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <p style="margin:0 0 12px;color:#64748b;font-size:.86rem;">先保存活动基础信息，再进入“参与学生”步骤继续配置。</p>
                <div class="form-row single">
                    <div class="form-group">
                        <label>活动名称</label>
                        <input type="text" name="name" required placeholder="如：2026年春季体育选课">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>第一轮开始时间</label><input type="datetime-local" name="round1Start"></div>
                    <div class="form-group"><label>第一轮结束时间</label><input type="datetime-local" name="round1End"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>第二轮开始时间</label><input type="datetime-local" name="round2Start"></div>
                    <div class="form-group"><label>第二轮结束时间</label><input type="datetime-local" name="round2End"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>第三轮开始时间</label><input type="datetime-local" name="round3Start"></div>
                    <div class="form-group"><label>第三轮结束时间</label><input type="datetime-local" name="round3End"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
                <button type="submit" class="btn btn-primary">下一步：参与学生</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h3>编辑活动</h3>
            <button class="modal-close" onclick="closeModal('editModal')">×</button>
        </div>
        <form th:action="@{/admin/courses/events/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" id="editId">
            <div class="modal-body">
                <div class="form-row single">
                    <div class="form-group">
                        <label>活动名称</label>
                        <input type="text" name="name" id="editName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>第一轮开始时间</label><input type="datetime-local" name="round1Start" id="editR1S"></div>
                    <div class="form-group"><label>第一轮结束时间</label><input type="datetime-local" name="round1End" id="editR1E"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>第二轮开始时间</label><input type="datetime-local" name="round2Start" id="editR2S"></div>
                    <div class="form-group"><label>第二轮结束时间</label><input type="datetime-local" name="round2End" id="editR2E"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>第三轮开始时间</label><input type="datetime-local" name="round3Start" id="editR3S"></div>
                    <div class="form-group"><label>第三轮结束时间</label><input type="datetime-local" name="round3End" id="editR3E"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('editModal')">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.edit-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.getElementById('editId').value = btn.dataset.id;
            document.getElementById('editName').value = btn.dataset.name;
            function fmt(v) { return (v && v !== 'null') ? v.substring(0, 16) : ''; }
            document.getElementById('editR1S').value = fmt(btn.dataset.r1s);
            document.getElementById('editR1E').value = fmt(btn.dataset.r1e);
            document.getElementById('editR2S').value = fmt(btn.dataset.r2s);
            document.getElementById('editR2E').value = fmt(btn.dataset.r2e);
            document.getElementById('editR3S').value = fmt(btn.dataset.r3s);
            document.getElementById('editR3E').value = fmt(btn.dataset.r3e);
            openModal('editModal');
        });
    });

    const processingNotes = document.querySelectorAll('[id^="lottery-note-"]');
    if (processingNotes.length > 0) {
        processingNotes.forEach(function(noteEl) {
            const eventId = noteEl.id.replace('lottery-note-', '');
            const poll = setInterval(function() {
                fetch('/admin/courses/events/' + eventId + '/lottery-status')
                    .then(r => r.json())
                    .then(data => {
                        noteEl.textContent = data.note || '';
                        if (data.status !== 'PROCESSING') {
                            clearInterval(poll);
                            setTimeout(() => location.reload(), 1500);
                        }
                    })
                    .catch(() => {});
            }, 10000);
        });
    }
});
</script>
</body>
</html>
