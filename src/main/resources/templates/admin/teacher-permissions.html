<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师功能权限 - 体育教师助手</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .perm-section { margin-bottom: 28px; }
        .perm-section h4 { margin: 0 0 12px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 6px; }
        .perm-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .perm-row:last-child { border-bottom: none; }
        .perm-label { flex: 1; font-size: 15px; }
        .perm-desc { flex: 2; font-size: 13px; color: #7f8c8d; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .3s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(24px); }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb;
            padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🏃 体育教师助手</div>
    <div class="nav-links">
        <a th:href="@{/admin}">管理后台</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-link">退出</button>
        </form>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <h2>教师功能权限配置</h2>
        <p style="color:#7f8c8d;margin-top:4px;">控制本校教师在手机端可使用的功能和可编辑的字段（开启=允许，关闭=禁止）</p>
    </div>

    <div th:if="${successMsg}" class="alert-success" th:text="${successMsg}"></div>

    <form th:action="@{/admin/teacher-permissions}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="card" style="padding:24px;">

            <!-- 学生信息编辑 -->
            <div class="perm-section">
                <h4>学生信息编辑</h4>
                <div class="perm-row">
                    <span class="perm-label">姓名</span>
                    <span class="perm-desc">允许教师修改学生姓名</span>
                    <label class="switch">
                        <input type="checkbox" name="editStudentName" value="true"
                               th:checked="${perm.editStudentName}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">性别</span>
                    <span class="perm-desc">允许教师修改学生性别</span>
                    <label class="switch">
                        <input type="checkbox" name="editStudentGender" value="true"
                               th:checked="${perm.editStudentGender}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">学号</span>
                    <span class="perm-desc">允许教师修改学生学号</span>
                    <label class="switch">
                        <input type="checkbox" name="editStudentNo" value="true"
                               th:checked="${perm.editStudentNo}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">学籍状态</span>
                    <span class="perm-desc">允许教师修改学生学籍状态（在籍/休学/毕业等）</span>
                    <label class="switch">
                        <input type="checkbox" name="editStudentStatus" value="true"
                               th:checked="${perm.editStudentStatus}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">行政班</span>
                    <span class="perm-desc">允许教师调整学生所在行政班</span>
                    <label class="switch">
                        <input type="checkbox" name="editStudentClass" value="true"
                               th:checked="${perm.editStudentClass}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">选修班</span>
                    <span class="perm-desc">允许教师分配/修改学生选修班</span>
                    <label class="switch">
                        <input type="checkbox" name="editStudentElectiveClass" value="true"
                               th:checked="${perm.editStudentElectiveClass}">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- 功能模块 -->
            <div class="perm-section">
                <h4>功能模块</h4>
                <div class="perm-row">
                    <span class="perm-label">考勤录入</span>
                    <span class="perm-desc">允许教师在手机端录入考勤</span>
                    <label class="switch">
                        <input type="checkbox" name="attendanceEdit" value="true"
                               th:checked="${perm.attendanceEdit}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">体测录入</span>
                    <span class="perm-desc">允许教师在手机端录入体质健康测试数据</span>
                    <label class="switch">
                        <input type="checkbox" name="physicalTestEdit" value="true"
                               th:checked="${perm.physicalTestEdit}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">成绩录入</span>
                    <span class="perm-desc">允许教师在手机端录入期末成绩</span>
                    <label class="switch">
                        <input type="checkbox" name="termGradeEdit" value="true"
                               th:checked="${perm.termGradeEdit}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perm-row">
                    <span class="perm-label">批量操作</span>
                    <span class="perm-desc">允许教师对学生进行批量修改（批量改学籍、选修班等）</span>
                    <label class="switch">
                        <input type="checkbox" name="batchOperation" value="true"
                               th:checked="${perm.batchOperation}">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:16px;">
                保存设置
            </button>
        </div>
    </form>
</div>
<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 陈胜松 版权所有</span>
</footer>
</body>
</html>
