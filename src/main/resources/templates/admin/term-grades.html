<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末成绩管理 - 管理后台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background:#f4f6fb; }
        .admin-wrap { max-width:1260px; margin:24px auto; padding:0 16px 28px; }
        .hero-card, .toolbar-card, .table-card { background:#fff; border:1px solid #e8eef5; border-radius:16px; box-shadow:0 8px 24px rgba(15,23,42,.05); }
        .hero-card { background:linear-gradient(135deg,#0f172a,#334155); color:#fff; padding:22px 24px; border:none; box-shadow:0 14px 30px rgba(15,23,42,.18); margin-bottom:16px; }
        .hero-card h2 { margin:0; font-size:1.3rem; }
        .hero-card p { margin:8px 0 0; opacity:.9; font-size:.9rem; line-height:1.65; max-width:760px; }
        .toolbar-card, .table-card { padding:16px; margin-bottom:16px; }
        .search-form { display:grid; gap:12px; }
        .search-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
        .search-grid input, .search-grid select, .form-row input, .form-row select, .form-row textarea { width:100%; min-height:42px; padding:0 12px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; }
        .search-actions, .batch-bar, .pagination { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .score-hint { font-size:.78rem; color:#64748b; margin-top:6px; line-height:1.7; }
        .badge-excellent { background:#27ae60; color:#fff; }
        .badge-good { background:#2980b9; color:#fff; }
        .badge-pass { background:#f39c12; color:#fff; }
        .badge-fail { background:#e74c3c; color:#fff; }
        .table-wrap { overflow:auto; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,.46); z-index:1000; align-items:flex-start; justify-content:center; overflow-y:auto; padding:24px 0; }
        .modal-overlay.active { display:flex; }
        .modal { background:#fff; border-radius:16px; width:520px; max-width:96vw; box-shadow:0 18px 40px rgba(15,23,42,.22); margin:auto; }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; background:linear-gradient(135deg,#0f172a,#334155); border-radius:16px 16px 0 0; }
        .modal-header h3 { font-size:1rem; color:#fff; margin:0; }
        .modal-close { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }
        .modal-body { padding:18px; }
        .modal-footer { padding:16px 18px; border-top:1px solid #eee; display:flex; gap:.75rem; justify-content:flex-end; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
        .form-row.single { grid-template-columns:1fr; }
        .form-group label { display:block; font-size:.85rem; font-weight:600; color:#475569; margin-bottom:.35rem; }
        .muted-inline { font-size:.82rem; color:#64748b; }
        @media (max-width: 1100px) { .search-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
        @media (max-width:768px) {
            .admin-wrap { margin:16px auto 24px; padding:0 12px 24px; }
            .hero-card, .toolbar-card, .table-card, .modal-body { padding:16px; }
            .search-grid, .form-row { grid-template-columns:1fr; }
            .search-actions, .batch-bar, .pagination, .modal-footer { flex-direction:column; align-items:stretch; }
            .search-actions > *, .batch-bar > *, .pagination > *, .modal-footer > * { width:100%; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">管理后台</div>
    <div class="nav-links">
        <a th:href="@{/admin}">后台首页</a>
        <a th:href="@{/dashboard}">工作台</a>
        <span class="nav-user" th:if="${currentSchool != null}" th:text="${currentSchool.name}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline"><button type="submit" class="btn-link">退出</button></form>
    </div>
</nav>
<div class="admin-wrap">
    <div class="hero-card">
        <h2>期末成绩管理</h2>
        <p>支持按年级、班级和学期筛选成绩记录，进行编辑、批量删除，以及 Excel 导入导出。</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="toolbar-card">
        <form id="searchForm" method="get" th:action="@{/admin/term-grades}" class="search-form">
            <div class="search-grid">
                <select name="gradeId">
                    <option value="" th:selected="${gradeId == null}">全部年级</option>
                    <option th:each="g : ${grades}" th:value="${g.id}" th:text="${g.name}" th:selected="${gradeId != null and gradeId == g.id}"></option>
                </select>
                <select name="classId">
                    <option value="" th:selected="${classId == null}">全部班级</option>
                    <option th:each="c : ${classes}" th:value="${c.id}" th:text="${(c.grade != null ? c.grade.name + ' ' : '') + c.name}" th:selected="${classId != null and classId == c.id}"></option>
                </select>
                <select name="academicYear">
                    <option value="" th:selected="${academicYear == ''}">全部学年</option>
                    <option th:each="y : ${academicYears}" th:value="${y}" th:text="${y}" th:selected="${academicYear == y}"></option>
                </select>
                <select name="semester">
                    <option value="" th:selected="${semester == ''}">全部学期</option>
                    <option value="上学期" th:selected="${'上学期' == semester}">上学期</option>
                    <option value="下学期" th:selected="${'下学期' == semester}">下学期</option>
                </select>
                <input type="text" name="keyword" th:value="${keyword}" placeholder="姓名 / 学号">
            </div>
            <div class="search-actions">
                <button type="submit" class="btn btn-secondary">搜索</button>
                <a th:href="@{/admin/term-grades}" class="btn btn-outline">重置</a>
                <button type="button" class="btn btn-outline" onclick="openImport()">导入 Excel</button>
                <a th:href="@{/admin/term-grades/template}" class="btn btn-outline">下载模板</a>
                <a th:href="@{/admin/term-grades/export(gradeId=${gradeId},classId=${classId},academicYear=${academicYear},semester=${semester},keyword=${keyword})}" class="btn btn-outline">导出 Excel</a>
            </div>
        </form>
    </div>

    <div class="table-card">
        <form id="batchForm" th:action="@{/admin/term-grades/delete-batch}" method="post" onsubmit="return collectBatchIds()">
            <div class="batch-bar" style="margin-bottom:12px;">
                <span class="muted-inline">可勾选多条记录后批量删除</span>
                <span id="batchIds"></span>
                <button type="submit" class="btn btn-danger btn-sm">批量删除</button>
            </div>
            <div class="table-wrap">
                <table class="table">
                    <thead><tr><th><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th><th>学号</th><th>姓名</th><th>性别</th><th>班级</th><th>学年 / 学期</th><th>出勤分</th><th>技能分</th><th>理论分</th><th>综合分</th><th>等级</th><th>操作</th></tr></thead>
                    <tbody>
                    <tr th:each="g : ${gradePage.content}">
                        <td><input type="checkbox" class="row-check" th:value="${g.id}"></td>
                        <td th:text="${g.student.studentNo}"></td>
                        <td th:text="${g.student.name}"></td>
                        <td th:text="${g.student.gender}"></td>
                        <td th:text="${g.student.schoolClass != null ? (g.student.schoolClass.grade != null ? g.student.schoolClass.grade.name + ' ' : '') + g.student.schoolClass.name : ''}"></td>
                        <td th:text="${g.academicYear + ' ' + g.semester}"></td>
                        <td th:text="${g.attendanceScore != null ? g.attendanceScore : '-'}"></td>
                        <td th:text="${g.skillScore != null ? g.skillScore : '-'}"></td>
                        <td th:text="${g.theoryScore != null ? g.theoryScore : '-'}"></td>
                        <td><strong th:text="${g.totalScore != null ? g.totalScore : '-'}"></strong></td>
                        <td><span th:if="${g.level != null}" th:text="${g.level}" th:class="${'badge ' + ('优秀' == g.level ? 'badge-excellent' : '良好' == g.level ? 'badge-good' : '及格' == g.level ? 'badge-pass' : 'badge-fail')}"></span><span th:unless="${g.level != null}">-</span></td>
                        <td>
                            <button class="btn btn-sm btn-secondary" type="button" onclick="openEdit(this)" th:data-id="${g.id}" th:data-studentid="${g.student.id}" th:data-studentname="${g.student.name}" th:data-studentno="${g.student.studentNo}" th:data-year="${g.academicYear}" th:data-semester="${g.semester}" th:data-attendance="${g.attendanceScore}" th:data-skill="${g.skillScore}" th:data-theory="${g.theoryScore}" th:data-remark="${g.remark}">编辑</button>
                            <form th:action="@{/admin/term-grades/delete/{id}(id=${g.id})}" method="post" style="display:inline" onsubmit="return confirm('确认删除这条记录吗？')"><button type="submit" class="btn btn-sm btn-danger">删除</button></form>
                        </td>
                    </tr>
                    <tr th:if="${gradePage.content.isEmpty()}"><td colspan="12" style="text-align:center;color:#94a3b8;padding:2rem">暂无记录</td></tr>
                    </tbody>
                </table>
            </div>
        </form>

        <div class="pagination" th:if="${gradePage.totalPages > 1}" style="margin-top:16px;">
            <a th:each="i : ${#numbers.sequence(0, gradePage.totalPages - 1)}" th:href="@{/admin/term-grades(gradeId=${gradeId},classId=${classId},academicYear=${academicYear},semester=${semester},keyword=${keyword},page=${i})}" th:text="${i + 1}" th:class="${i == gradePage.number ? 'page-link active' : 'page-link'}"></a>
        </div>
    </div>
</div>

<div id="editOverlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-header"><h3 id="editTitle">编辑成绩</h3><button class="modal-close" onclick="closeEdit()">&times;</button></div>
        <form id="editForm" th:action="@{/admin/term-grades/save}" method="post">
            <div class="modal-body">
                <input type="hidden" name="id" id="editId"><input type="hidden" name="studentId" id="editStudentId">
                <div class="form-row single"><div class="form-group"><label>学生</label><input type="text" id="editStudentInfo" disabled style="background:#f5f5f5"></div></div>
                <div class="form-row"><div class="form-group"><label>学年</label><input type="text" name="academicYear" id="editYear" placeholder="例如：2025-2026" required></div><div class="form-group"><label>学期</label><select name="semester" id="editSemester"><option value="上学期">上学期</option><option value="下学期">下学期</option></select></div></div>
                <div class="form-row"><div class="form-group"><label>出勤分（0-100）</label><input type="number" step="0.1" min="0" max="100" name="attendanceScore" id="editAttendance" placeholder="留空则不计入"></div><div class="form-group"><label>技能分（0-100）</label><input type="number" step="0.1" min="0" max="100" name="skillScore" id="editSkill" placeholder="留空则不计入"></div></div>
                <div class="form-row"><div class="form-group"><label>理论分（0-100）</label><input type="number" step="0.1" min="0" max="100" name="theoryScore" id="editTheory" placeholder="留空则不计入"></div><div class="form-group"><label>备注</label><input type="text" name="remark" id="editRemark"></div></div>
                <p class="score-hint">综合分 = 出勤 40% + 技能 40% + 理论 20%，有空项时按比例重分配，系统自动计算。</p>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeEdit()">取消</button><button type="submit" class="btn btn-primary">保存</button></div>
        </form>
    </div>
</div>

<div id="importOverlay" class="modal-overlay">
    <div class="modal" style="width:420px">
        <div class="modal-header"><h3>导入 Excel</h3><button class="modal-close" onclick="closeImport()">&times;</button></div>
        <form th:action="@{/admin/term-grades/import}" method="post" enctype="multipart/form-data">
            <div class="modal-body">
                <p style="font-size:.88rem;color:#555;margin-bottom:1rem">请先 <a th:href="@{/admin/term-grades/template}" style="color:#4a90e2">下载导入模板</a> 填写后上传。列顺序：学号 | 学年 | 学期 | 出勤分 | 技能分 | 理论分 | 备注。</p>
                <div class="form-group"><label>选择文件（.xlsx）</label><input type="file" name="file" accept=".xlsx" required></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeImport()">取消</button><button type="submit" class="btn btn-primary">开始导入</button></div>
        </form>
    </div>
</div>

<footer class="site-footer">
    <th:block th:replace="~{fragments/footer :: version}"></th:block>
    <span class="footer-sep">|</span>
    <span>© 2026 陈胜杰 版权所有</span>
</footer>

<script>
function openEdit(btn) {
    document.getElementById('editId').value = btn.dataset.id;
    document.getElementById('editStudentId').value = btn.dataset.studentid;
    document.getElementById('editStudentInfo').value = (btn.dataset.studentno || '') + ' ' + btn.dataset.studentname;
    document.getElementById('editYear').value = btn.dataset.year || '';
    document.getElementById('editSemester').value = btn.dataset.semester || '上学期';
    document.getElementById('editAttendance').value = btn.dataset.attendance !== 'null' ? (btn.dataset.attendance || '') : '';
    document.getElementById('editSkill').value = btn.dataset.skill !== 'null' ? (btn.dataset.skill || '') : '';
    document.getElementById('editTheory').value = btn.dataset.theory !== 'null' ? (btn.dataset.theory || '') : '';
    document.getElementById('editRemark').value = btn.dataset.remark !== 'null' ? (btn.dataset.remark || '') : '';
    document.getElementById('editOverlay').classList.add('active');
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('active'); }
function openImport() { document.getElementById('importOverlay').classList.add('active'); }
function closeImport() { document.getElementById('importOverlay').classList.remove('active'); }
function toggleAll(cb) { document.querySelectorAll('.row-check').forEach(function (c) { c.checked = cb.checked; }); }
function collectBatchIds() {
    const ids = [...document.querySelectorAll('.row-check:checked')].map(function (c) { return c.value; });
    if (!ids.length) { alert('请先勾选记录'); return false; }
    if (!confirm('确认删除选中的 ' + ids.length + ' 条记录吗？')) return false;
    const container = document.getElementById('batchIds');
    container.innerHTML = '';
    ids.forEach(function (id) { const inp = document.createElement('input'); inp.type = 'hidden'; inp.name = 'ids'; inp.value = id; container.appendChild(inp); });
    return true;
}
document.querySelectorAll('.modal-overlay').forEach(function (o) { o.addEventListener('click', function (e) { if (e.target === o) o.classList.remove('active'); }); });
</script>
</body>
</html>
