app:
  version: 5.0
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: 86400000
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    transport: ${APP_MAIL_TRANSPORT:smtp}
    product-name: ${APP_MAIL_PRODUCT_NAME:体育教师助手}
    from: ${APP_MAIL_FROM:no-reply@example.com}
    base-url: ${APP_MAIL_BASE_URL:http://localhost:8080}
    dispatch-enabled: ${APP_MAIL_DISPATCH_ENABLED:true}
    dispatch-batch-size: ${APP_MAIL_DISPATCH_BATCH_SIZE:20}
    dispatch-fixed-delay-ms: ${APP_MAIL_DISPATCH_FIXED_DELAY_MS:30000}
    max-retry-count: ${APP_MAIL_MAX_RETRY_COUNT:3}
    retry-delay-minutes: ${APP_MAIL_RETRY_DELAY_MINUTES:5}
    verify-email-expire-minutes: ${APP_MAIL_VERIFY_EXPIRE_MINUTES:30}
    reset-password-expire-minutes: ${APP_MAIL_RESET_EXPIRE_MINUTES:30}
    verify-email-limit-per-account: ${APP_MAIL_VERIFY_LIMIT_PER_ACCOUNT:3}
    verify-email-limit-per-ip: ${APP_MAIL_VERIFY_LIMIT_PER_IP:10}
    reset-password-limit-per-account: ${APP_MAIL_RESET_LIMIT_PER_ACCOUNT:3}
    reset-password-limit-per-ip: ${APP_MAIL_RESET_LIMIT_PER_IP:10}
    ses-api:
      secret-id: ${APP_MAIL_SES_API_SECRET_ID:}
      secret-key: ${APP_MAIL_SES_API_SECRET_KEY:}
      region: ${APP_MAIL_SES_API_REGION:ap-guangzhou}
      endpoint: ${APP_MAIL_SES_API_ENDPOINT:ses.tencentcloudapi.com}
      reply-to-address: ${APP_MAIL_SES_API_REPLY_TO_ADDRESS:}
      trigger-type: ${APP_MAIL_SES_API_TRIGGER_TYPE:1}
      verify-email-template-id: ${APP_MAIL_SES_API_VERIFY_EMAIL_TEMPLATE_ID:0}
      reset-password-template-id: ${APP_MAIL_SES_API_RESET_PASSWORD_TEMPLATE_ID:0}

# 服务器档位切换说明：
# 1. 默认启用 server-low
# 2. 低配服务器：--spring.profiles.active=server-low
# 3. 高配服务器：--spring.profiles.active=server-high
# 4. 如需与本地配置叠加：--spring.profiles.active=local,server-high

spring:
  mail:
    # 腾讯云 SES SMTP 常用主机：
    # - 中国大陆（广州）：gz-smtp.qcloudmail.com
    # - 中国香港：smtp.qcloudmail.com
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: ${SPRING_MAIL_PROTOCOL:smtp}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
            required: ${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:true}
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT:10000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:10000}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  thymeleaf:
    encoding: UTF-8
    cache: false
  messages:
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    com.pe: INFO
---
spring:
  config:
    activate:
      on-profile: server-low
  datasource:
    hikari:
      pool-name: PeAssistantHikariLow
      maximum-pool-size: 12
      minimum-idle: 3
      connection-timeout: 1500
      idle-timeout: 600000
      max-lifetime: 1800000
  task:
    execution:
      thread-name-prefix: async-low-
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 120
        keep-alive: 60s

server:
  tomcat:
    threads:
      max: 100
      min-spare: 10
    accept-count: 300
    max-connections: 1000
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 2KB

---
spring:
  config:
    activate:
      on-profile: server-high
  datasource:
    hikari:
      pool-name: PeAssistantHikariHigh
      maximum-pool-size: 24
      minimum-idle: 6
      connection-timeout: 1200
      idle-timeout: 600000
      max-lifetime: 1800000
  task:
    execution:
      thread-name-prefix: async-high-
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 300
        keep-alive: 60s

server:
  tomcat:
    threads:
      max: 180
      min-spare: 20
    accept-count: 800
    max-connections: 2000
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 2KB
